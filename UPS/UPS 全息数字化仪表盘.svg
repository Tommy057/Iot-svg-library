<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹光晕 -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- 背景科技网格 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
  </defs>

  <!-- 1. 全局背景与网格 -->
  <rect width="1600" height="900" fill="#0B1120" />
  <rect width="1600" height="900" fill="url(#grid)" />

  <!-- ==================== 2. 全屏整体外边框 (COMMAND FRAME) ==================== -->
  <g fill="none" stroke="#3B82F6" stroke-width="2">
    <!-- 主体封边线 -->
    <path d="M 40 20 L 1560 20 L 1580 40 L 1580 860 L 1560 880 L 40 880 L 20 860 L 20 40 Z" stroke-opacity="0.3" />
    <!-- 四角加强筋 (霓虹青) -->
    <path d="M 20 120 L 20 40 L 40 20 L 120 20" stroke="#0EA5E9" stroke-width="4" filter="url(#neonGlow)" />
    <path d="M 1480 20 L 1560 20 L 1580 40 L 1580 120" stroke="#0EA5E9" stroke-width="4" filter="url(#neonGlow)" />
    <path d="M 20 780 L 20 860 L 40 880 L 120 880" stroke="#0EA5E9" stroke-width="4" filter="url(#neonGlow)" />
    <path d="M 1480 880 L 1560 880 L 1580 860 L 1580 780" stroke="#0EA5E9" stroke-width="4" filter="url(#neonGlow)" />
    
    <!-- 顶部状态扫描条 -->
    <line x1="200" y1="20" x2="400" y2="20" stroke="#0EA5E9" stroke-width="2">
        <animate attributeName="x1" values="200;1200;200" dur="8s" repeatCount="indefinite" />
        <animate attributeName="x2" values="400;1400;400" dur="8s" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- 标题区 -->
  <g transform="translate(800, 50)">
    <text font-family="Microsoft YaHei" font-size="28" font-weight="bold" fill="#F8FAFC" text-anchor="middle" letter-spacing="8">UPS 全息能源监测指挥中心</text>
    <rect x="-150" y="15" width="300" height="2" fill="#0EA5E9" fill-opacity="0.5" />
  </g>

  <!-- ==================== 3. 左侧：动力源舱 (更饱满处理) ==================== -->
  <g transform="translate(60, 120)">
    <path d="M 0 30 L 30 0 L 380 0 L 410 30 L 410 650 L 380 680 L 0 680 Z" fill="#1E293B" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.3" />
    
    <!-- 电池主槽 -->
    <rect x="65" y="60" width="280" height="420" rx="10" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.2" />
    <rect x="75" y="70" width="260" height="400" rx="4" fill="#10B981" fill-opacity="0.6" filter="url(#neonGlow)">
        <animate attributeName="fill-opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite" />
    </rect>
    
    <!-- 巨大电量数值 -->
    <text x="205" y="560" font-family="Arial" font-size="84" font-weight="bold" fill="#10B981" text-anchor="middle" filter="url(#neonGlow)">100<tspan font-size="24">%</tspan></text>
    
    <!-- 电池环境参数 -->
    <g transform="translate(40, 610)" font-family="Microsoft YaHei" font-size="16">
        <rect width="330" height="40" fill="#0F172A" fill-opacity="0.8" />
        <text x="15" y="26" fill="#94A3B8">电池电压:</text> <text x="150" y="26" fill="#F8FAFC">432.00 V</text>
        <text x="190" y="26" fill="#94A3B8">温度:</text> <text x="315" y="26" fill="#F8FAFC" text-anchor="end">24.5 ℃</text>
    </g>
  </g>

  <!-- ==================== 4. 中间：实时负载矩阵 (输入/输出) ==================== -->
  <g transform="translate(500, 120)">
    <!-- 输入面板 -->
    <g>
      <path d="M 0 0 L 480 0 L 510 30 L 510 320 L 0 320 Z" fill="#1E293B" fill-opacity="0.8" stroke="#0EA5E9" stroke-opacity="0.4" />
      <text x="20" y="35" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC">输入端遥测 / INPUT</text>
      
      <g transform="translate(20, 70)">
        <!-- 矩阵格 -->
        <rect width="145" height="100" fill="#0F172A" /> <text x="15" y="30" font-size="12" fill="#94A3B8">R相输入电压</text> <text x="15" y="75" font-family="Arial" font-size="32" fill="#0EA5E9" font-weight="bold">231<tspan font-size="14">V</tspan></text>
        <rect x="155" width="145" height="100" fill="#0F172A" /> <text x="170" y="30" font-size="12" fill="#94A3B8">S相输入电压</text> <text x="170" y="75" font-family="Arial" font-size="32" fill="#0EA5E9" font-weight="bold">231<tspan font-size="14">V</tspan></text>
        <rect x="310" width="145" height="100" fill="#0F172A" /> <text x="325" y="30" font-size="12" fill="#94A3B8">T相输入电压</text> <text x="325" y="75" font-family="Arial" font-size="32" fill="#0EA5E9" font-weight="bold">233<tspan font-size="14">V</tspan></text>
        
        <g transform="translate(0, 115)">
            <rect width="455" height="100" fill="#0F172A" stroke="#10B981" stroke-opacity="0.2" />
            <text x="20" y="40" font-size="14" fill="#94A3B8">输入频率 / 系统状态</text>
            <text x="20" y="80" font-family="Arial" font-size="42" fill="#10B981" font-weight="bold">50.00 <tspan font-size="18">Hz</tspan></text>
            <text x="435" y="75" font-family="Microsoft YaHei" font-size="36" fill="#10B981" font-weight="bold" text-anchor="end">运行正常</text>
        </g>
      </g>
    </g>

    <!-- 输出面板 -->
    <g transform="translate(0, 360)">
      <path d="M 0 30 L 30 0 L 510 0 L 510 320 L 0 320 Z" fill="#1E293B" fill-opacity="0.8" stroke="#F59E0B" stroke-opacity="0.4" />
      <text x="40" y="40" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC">输出端载荷 / OUTPUT</text>
      
      <g transform="translate(20, 70)">
        <text font-size="12" fill="#94A3B8">PHASE LOAD RATE (R/S/T)</text>
        <g transform="translate(0, 20)">
           <text y="50" font-family="Arial" font-size="54" font-weight="bold" fill="#F59E0B">4.0<tspan font-size="18">%</tspan></text>
           <text x="160" y="50" font-family="Arial" font-size="54" font-weight="bold" fill="#F59E0B">4.0<tspan font-size="18">%</tspan></text>
           <text x="320" y="50" font-family="Arial" font-size="54" font-weight="bold" fill="#F59E0B">7.0<tspan font-size="18">%</tspan></text>
        </g>
        <rect y="85" width="470" height="2" fill="#F59E0B" fill-opacity="0.2" />
        <text y="130" font-family="Microsoft YaHei" font-size="20" fill="#94A3B8">供电模式：<tspan fill="#F8FAFC" font-weight="bold">主路供电在线</tspan></text>
        <circle cx="450" cy="122" r="8" fill="#10B981" filter="url(#neonGlow)" />
      </g>
    </g>
  </g>

  <!-- ==================== 5. 右侧：旁路与额定墙 (解决字体小、空洞问题) ==================== -->
  <g transform="translate(1040, 120)">
    <!-- 旁路仓 -->
    <path d="M 0 0 L 500 0 L 520 20 L 520 250 L 0 250 Z" fill="#1E293B" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.4" />
    <text x="20" y="35" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#3B82F6">旁路监测 / BYPASS</text>
    <g transform="translate(20, 70)" font-family="Arial" font-size="18">
        <text y="30" fill="#94A3B8">R相旁路电压: <tspan fill="#F8FAFC" font-weight="bold" font-size="24">230.0 V</tspan></text>
        <text y="70" fill="#94A3B8">S相旁路电压: <tspan fill="#F8FAFC" font-weight="bold" font-size="24">231.0 V</tspan></text>
        <text y="110" fill="#94A3B8">T相旁路电压: <tspan fill="#F8FAFC" font-weight="bold" font-size="24">233.0 V</tspan></text>
        <text y="150" fill="#94A3B8">旁路平均频率: <tspan fill="#F8FAFC" font-weight="bold" font-size="24">50.0 Hz</tspan></text>
    </g>

    <!-- 额定信息墙 (完全重构) -->
    <g transform="translate(0, 280)">
        <rect width="520" height="400" fill="#0F172A" fill-opacity="0.9" stroke="#334155" stroke-width="2" />
        <path d="M 0 0 L 150 0 L 170 30 L 0 30 Z" fill="#3B82F6" fill-opacity="0.3" />
        <text x="15" y="21" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#3B82F6">硬件额定档案</text>
        
        <!-- 栅格化数据分布 -->
        <g transform="translate(20, 60)" font-family="Microsoft YaHei">
            <!-- Row 1 -->
            <text y="20" font-size="14" fill="#64748B">电池额定电压</text>
            <text y="50" font-size="24" font-weight="bold" fill="#F8FAFC">384 V</text>
            
            <text x="250" y="20" font-size="14" fill="#64748B">整流额定信息</text>
            <text x="250" y="50" font-size="20" font-weight="bold" fill="#F8FAFC">220/380V 3P4W</text>

            <!-- Row 2 -->
            <g transform="translate(0, 80)">
                <text y="20" font-size="14" fill="#64748B">额定输入频率</text>
                <text y="50" font-size="24" font-weight="bold" fill="#F8FAFC">50 Hz</text>
                <text x="250" y="20" font-size="14" fill="#64748B">旁路额定信息</text>
                <text x="250" y="50" font-size="20" font-weight="bold" fill="#F8FAFC">220/380V 3P4W</text>
            </g>

            <!-- Row 3 -->
            <g transform="translate(0, 160)">
                <text y="20" font-size="14" fill="#64748B">额定输出信息</text>
                <text y="50" font-size="20" font-weight="bold" fill="#F8FAFC">220V / 3P4W</text>
                <text x="250" y="20" font-size="14" fill="#64748B">额定旁路频率</text>
                <text x="250" y="50" font-size="24" font-weight="bold" fill="#F8FAFC">50 Hz</text>
            </g>

            <!-- Row 4 (Highlight) -->
            <g transform="translate(0, 260)">
                <rect width="480" height="60" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-dasharray="4,2" />
                <text x="20" y="38" font-size="16" fill="#F8FAFC">系统总额定功率 (TOTAL POWER)</text>
                <text x="460" y="42" font-family="Arial" font-size="36" font-weight="bold" fill="#F8FAFC" text-anchor="end">120 <tspan font-size="18">KVA</tspan></text>
            </g>
        </g>
    </g>
  </g>

</svg>