<svg width="160" height="200" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 柔和阴影 -->
        <filter id="soft_glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feOffset dx="0" dy="2" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <!-- 蓝宝石镜片渐变 -->
        <radialGradient id="lens_blue" cx="50%" cy="35%" r="80%">
            <stop offset="0%" stop-color="#60A5FA" />
            <stop offset="100%" stop-color="#1E3A8A" />
        </radialGradient>
    </defs>

    <!-- 1. 底部激光定位线 (模拟 CAD 绿线，但在蓝态下为浅蓝) -->
    <path d="M80 50 L80 180" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4 2" opacity="0.4" />
    <circle cx="80" cy="180" r="3" fill="#3B82F6" opacity="0.6" />

    <!-- 2. 探测波纹 (静默) -->
    <circle cx="80" cy="50" r="45" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.2" />

    <!-- 3. 晶钻探测头主体 -->
    <g filter="url(#soft_glow)">
        <circle cx="80" cy="50" r="30" fill="white" />
        <circle cx="80" cy="50" r="25" fill="url(#lens_blue)" />
        <!-- 镜面反光 -->
        <path d="M68 42 Q80 30 92 42" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.3" />
    </g>

    <!-- 4. 状态标签区 -->
    <g transform="translate(40, 95)">
        <rect width="80" height="20" rx="10" fill="#EFF6FF" stroke="#DBEAFE" stroke-width="1" />
        <text x="40" y="14" font-family="Arial-Bold" font-size="10" fill="#1E40AF" text-anchor="middle" font-weight="bold">VACANT | 无人</text>
    </g>
</svg>