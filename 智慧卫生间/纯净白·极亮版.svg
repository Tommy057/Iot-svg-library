<svg width="120" height="240" viewBox="0 0 120 240" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 强力霓虹发光 -->
        <filter id="ultra_glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <!-- 蓝宝石(空闲)渐变 -->
        <linearGradient id="gem_v" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60A5FA" />
            <stop offset="100%" stop-color="#1E40AF" />
        </linearGradient>
        <!-- 琥珀金(有人)渐变 -->
        <linearGradient id="gem_o" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FBBF24" />
            <stop offset="100%" stop-color="#B45309" />
        </linearGradient>
    </defs>

    <!-- 1. 底部雷达落点 (压在 CAD 卫生间中心) -->
    <g transform="translate(60, 220)">
        <!-- 扩散的雷达波纹 -->
        <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#3B82F6" stroke-width="2">
            <animate attributeName="rx" values="10;50" dur="2s" repeatCount="indefinite" />
            <animate attributeName="ry" values="3;15" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite" />
        </ellipse>
        <!-- 核心落点 -->
        <ellipse cx="0" cy="0" rx="10" ry="4" fill="#3B82F6" filter="url(#ultra_glow)" />
    </g>

    <!-- 2. 垂直全息导线 (连接落点与悬浮塔) -->
    <line x1="60" y1="220" x2="60" y2="160" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 2" />

    <!-- 3. 悬浮能量块矩阵 (垂直堆叠) -->
    <!-- 厕位 03 (最顶层) -->
    <g transform="translate(35, 40)">
        <rect width="50" height="30" rx="4" fill="url(#gem_v)" stroke="white" stroke-width="1" filter="url(#ultra_glow)" />
        <text x="25" y="20" font-family="Arial Black" font-size="12" fill="white" text-anchor="middle">#03</text>
    </g>

    <!-- 厕位 02 (中间层) -->
    <g transform="translate(35, 75)">
        <!-- 有人状态：显示琥珀金且带有呼吸动效 -->
        <rect width="50" height="30" rx="4" fill="url(#gem_o)" stroke="white" stroke-width="1" filter="url(#ultra_glow)">
            <animate attributeName="fill-opacity" values="1;0.6;1" dur="1s" repeatCount="indefinite" />
        </rect>
        <text x="25" y="20" font-family="Arial Black" font-size="12" fill="white" text-anchor="middle">#02</text>
    </g>

    <!-- 厕位 01 (最底层) -->
    <g transform="translate(35, 110)">
        <rect width="50" height="30" rx="4" fill="url(#gem_v)" stroke="white" stroke-width="1" filter="url(#ultra_glow)" />
        <text x="25" y="20" font-family="Arial Black" font-size="12" fill="white" text-anchor="middle">#01</text>
    </g>

    <!-- 4. 顶部总览标识 (最醒目的地方) -->
    <g transform="translate(30, 5)">
        <rect width="60" height="20" rx="10" fill="#1E293B" />
        <text x="30" y="14" font-family="Arial-Bold" font-size="10" fill="#6EE7B7" text-anchor="middle">WC-MALE</text>
    </g>
</svg>