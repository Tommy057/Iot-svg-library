<svg width="1200" height="1100" viewBox="0 0 1200 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 深度科技背景渐变 -->
    <radialGradient id="ds_bg_grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1A2B45" />
      <stop offset="100%" stop-color="#040914" />
    </radialGradient>

    <!-- 2. "有人" 红宝石质感 (增强亮度和对比度) -->
    <radialGradient id="ds_grad_red" cx="50%" cy="50%" r="50%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#FF5A5A" />
      <stop offset="65%" stop-color="#E60000" />
      <stop offset="100%" stop-color="#4D0000" />
    </radialGradient>

    <!-- 3. "无人" 祖母绿质感 -->
    <radialGradient id="ds_grad_green" cx="50%" cy="50%" r="50%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#6FFF7E" />
      <stop offset="65%" stop-color="#00A323" />
      <stop offset="100%" stop-color="#003D0D" />
    </radialGradient>

    <!-- 4. 统计数字发光效果 -->
    <filter id="ds_text_glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 5. 球体顶部强光 -->
    <linearGradient id="ds_top_shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- 6. 卡片边框微弱发光 -->
    <filter id="ds_card_edge_glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#0072FF" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景层 -->
  <rect width="1200" height="1100" fill="url(#ds_bg_grad)"/>
  
  <!-- 装饰网格 (增加科技细节) -->
  <path d="M0 0 H 1200 M0 200 H 1200 M0 400 H 1200 M0 600 H 1200 M0 800 H 1200 M0 1000 H 1200" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
  <path d="M0 0 V 1100 M200 0 V 1100 M400 0 V 1100 M600 0 V 1100 M800 0 V 1100 M1000 0 V 1100" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>

  <!-- 1. 顶部标题 (带有发光效果) -->
  <g filter="url(#ds_text_glow)">
    <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF">18F 智慧厕卫状态监测云看板</text>
    <rect x="400" y="90" width="400" height="3" rx="1.5" fill="#0072FF" fill-opacity="0.5"/>
  </g>

  <!-- 2. 全局统计看板 (数据高亮) -->
  <g transform="translate(150, 140)">
    <rect width="900" height="120" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#ds_card_edge_glow)"/>
    <g transform="translate(50, 35)">
      <text font-size="14" fill="#8A9FBF">总点位数</text>
      <text y="50" font-size="48" font-weight="bold" fill="#FFFFFF">30</text>
    </g>
    <g transform="translate(350, 35)">
      <text font-size="14" fill="#FF5A5A">当前占用</text>
      <text y="50" font-size="48" font-weight="bold" fill="#FF5A5A" filter="url(#ds_text_glow)">10</text>
    </g>
    <g transform="translate(650, 35)">
      <text font-size="14" fill="#6FFF7E">当前空闲</text>
      <text y="50" font-size="48" font-weight="bold" fill="#6FFF7E" filter="url(#ds_text_glow)">20</text>
    </g>
  </g>

  <!-- ================= 3. 区域详情：18楼北 ================= -->
  <g transform="translate(60, 300)">
    <rect width="1080" height="360" rx="30" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#ds_card_edge_glow)"/>
    <text x="30" y="40" font-size="22" font-weight="bold" fill="#00A2FF">18楼北区域 (North Wing)</text>
    
    <!-- 男卫 01 -->
    <g transform="translate(30, 70)">
      <text font-size="18" fill="#FFFFFF" font-weight="bold">男卫 01</text>
      <rect x="100" y="-18" width="100" height="26" rx="6" fill="#FF5A5A" fill-opacity="0.15"/>
      <text x="110" y="1" font-size="14" fill="#FF5A5A">占用: 4/10</text>
      
      <g transform="translate(0, 40)">
        <!-- 点位列表 -->
        <g transform="translate(45, 45)"> <circle r="38" fill="url(#ds_grad_red)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#ds_top_shine)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">1#有人</text> </g>
        <g transform="translate(135, 45)"> <circle r="38" fill="url(#ds_grad_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#ds_top_shine)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">2#无人</text> </g>
        <g transform="translate(225, 45)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">3#无人</text> </g>
        <g transform="translate(315, 45)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">4#有人</text> </g>
        <g transform="translate(405, 45)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">5#无人</text> </g>
        <g transform="translate(45, 175)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">6#</text> </g>
        <g transform="translate(135, 175)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">7#</text> </g>
        <g transform="translate(225, 175)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">8#</text> </g>
        <g transform="translate(315, 175)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">9#</text> </g>
        <g transform="translate(405, 175)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">10#</text> </g>
      </g>
    </g>

    <!-- 分割线 -->
    <line x1="535" y1="80" x2="535" y2="320" stroke="#FFFFFF" stroke-opacity="0.1"/>

    <!-- 女卫 01 -->
    <g transform="translate(560, 70)">
      <text font-size="18" fill="#FF69B4" font-weight="bold">女卫 01</text>
      <rect x="100" y="-18" width="100" height="26" rx="6" fill="#FF5A5A" fill-opacity="0.15"/>
      <text x="110" y="1" font-size="14" fill="#FF5A5A">占用: 2/8</text>
      <g transform="translate(0, 40)">
        <g transform="translate(55, 45)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">11#</text> </g>
        <g transform="translate(165, 45)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">12#</text> </g>
        <g transform="translate(275, 45)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">13#</text> </g>
        <g transform="translate(385, 45)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">14#</text> </g>
        <g transform="translate(55, 175)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">15#</text> </g>
        <g transform="translate(165, 175)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">16#</text> </g>
        <g transform="translate(275, 175)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">17#</text> </g>
        <g transform="translate(385, 175)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">18#</text> </g>
      </g>
    </g>
  </g>

  <!-- ================= 4. 区域详情：18楼南 ================= -->
  <g transform="translate(60, 700)">
    <rect width="1080" height="280" rx="30" fill="#FFFFFF" fill-opacity="0.03" stroke="#FFFFFF" stroke-opacity="0.1" filter="url(#ds_card_edge_glow)"/>
    <text x="30" y="40" font-size="22" font-weight="bold" fill="#00A2FF">18楼南区域 (South Wing)</text>
    
    <!-- 男卫 02 (5位) -->
    <g transform="translate(30, 80)">
       <text font-size="18" fill="#FFFFFF" font-weight="bold">男卫 02</text>
       <text x="100" y="-1" font-size="14" fill="#FF5A5A" font-weight="bold">● 占用: 2/5</text>
       <g transform="translate(45, 90)">
         <g transform="translate(0, 0)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">1#</text> </g>
         <g transform="translate(105, 0)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">2#</text> </g>
         <g transform="translate(210, 0)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">3#</text> </g>
         <g transform="translate(315, 0)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">4#</text> </g>
         <g transform="translate(420, 0)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">5#</text> </g>
       </g>
    </g>

    <!-- 女卫 02 (7位) -->
    <g transform="translate(560, 80)">
       <text font-size="18" fill="#FF69B4" font-weight="bold">女卫 02</text>
       <text x="100" y="-1" font-size="14" fill="#FF5A5A" font-weight="bold">● 占用: 2/7</text>
       <g transform="translate(45, 90)">
         <g transform="translate(0, 0)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">6#</text> </g>
         <g transform="translate(80, 0)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">7#</text> </g>
         <g transform="translate(160, 0)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">8#</text> </g>
         <g transform="translate(240, 0)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">9#</text> </g>
         <g transform="translate(320, 0)"> <circle r="38" fill="url(#ds_grad_red)"/> <text y="75" text-anchor="middle" font-size="12" fill="#FF9999">10#</text> </g>
         <g transform="translate(400, 0)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">11#</text> </g>
         <g transform="translate(480, 0)"> <circle r="38" fill="url(#ds_grad_green)"/> <text y="75" text-anchor="middle" font-size="12" fill="#8AFF9E">12#</text> </g>
       </g>
    </g>
  </g>

  <!-- 5. 底部图例 -->
  <g transform="translate(600, 1030)">
    <circle cx="-130" cy="0" r="15" fill="url(#ds_grad_red)"/>
    <text x="-105" y="7" font-size="16" fill="#FF5A5A" font-weight="bold">有人 (Occupied)</text>
    <circle cx="100" cy="0" r="15" fill="url(#ds_grad_green)"/>
    <text x="125" y="7" font-size="16" fill="#6FFF7E" font-weight="bold">空闲 (Vacant)</text>
  </g>
</svg>