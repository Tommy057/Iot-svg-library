<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 背景渐变 (复刻风格) -->
    <linearGradient id="bg_grad" x1="100" y1="100" x2="1100" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="0.4" stop-color="#FFF0F3" />
      <stop offset="1" stop-color="#FFD1DC" />
    </linearGradient>

    <!-- 2. "有人" 状态：红宝石玻璃渐变 -->
    <radialGradient id="grad_red_occupied" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(25 20) rotate(90) scale(45)">
      <stop stop-color="#FFB7C5" /> <!-- 中心高亮 -->
      <stop offset="0.6" stop-color="#FF0000" /> <!-- 纯红 -->
      <stop offset="1" stop-color="#600000" />   <!-- 深红边界 -->
    </radialGradient>

    <!-- 3. "无人" 状态：祖母绿玻璃渐变 -->
    <radialGradient id="grad_green_vacant" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(25 20) rotate(90) scale(45)">
      <stop stop-color="#C5FFD1" /> <!-- 中心高亮 -->
      <stop offset="0.6" stop-color="#00C853" /> <!-- 纯绿 -->
      <stop offset="1" stop-color="#004D20" />   <!-- 深绿边界 -->
    </radialGradient>

    <!-- 4. 玻璃表面通用高光 (Shine) -->
    <linearGradient id="glass_shine" x1="0" y1="-25" x2="0" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.9"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- 5. 状态发光滤镜 -->
    <filter id="glow_red" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow_green" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 整体背景 -->
  <rect width="1200" height="900" rx="40" fill="url(#bg_grad)"/>

  <!-- 顶部看板标题 -->
  <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="#002060">18楼 智慧厕卫管理监控看板 (红/绿状态版)</text>

  <!-- ================= 18楼北 (18N) ================= -->
  <g transform="translate(60, 130)">
    <rect width="1080" height="340" rx="35" fill="white" fill-opacity="0.4" stroke="white" stroke-width="2"/>
    <text x="30" y="45" font-size="22" font-weight="bold" fill="#0072FF">18楼北区域 (North Wing)</text>
    
    <!-- 男卫 01 (10个点位) -->
    <g transform="translate(30, 70)">
      <text font-size="16" fill="#002060" font-weight="bold">男卫 01 (1#-10#)</text>
      <g transform="translate(0, 30)">
        <!-- 状态球体排布 -->
        <g transform="translate(40, 40)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000" font-weight="bold">1#有人</text> </g>
        <g transform="translate(140, 40)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">2#无人</text> </g>
        <g transform="translate(240, 40)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">3#无人</text> </g>
        <g transform="translate(340, 40)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000" font-weight="bold">4#有人</text> </g>
        <g transform="translate(440, 40)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">5#无人</text> </g>
        
        <g transform="translate(40, 150)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">6#无人</text> </g>
        <g transform="translate(140, 150)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000" font-weight="bold">7#有人</text> </g>
        <g transform="translate(240, 150)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">8#无人</text> </g>
        <g transform="translate(340, 150)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000" font-weight="bold">9#有人</text> </g>
        <g transform="translate(440, 150)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">10#无人</text> </g>
      </g>
    </g>

    <!-- 分割线 -->
    <line x1="540" y1="80" x2="540" y2="300" stroke="white" stroke-opacity="0.5" stroke-width="2"/>

    <!-- 女卫 01 (8个点位) -->
    <g transform="translate(570, 70)">
      <text font-size="16" fill="#D63384" font-weight="bold">女卫 01 (11#-18#)</text>
      <g transform="translate(0, 30)">
        <g transform="translate(50, 40)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000">11#有人</text> </g>
        <g transform="translate(160, 40)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">12#无人</text> </g>
        <g transform="translate(270, 40)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">13#无人</text> </g>
        <g transform="translate(380, 40)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">14#无人</text> </g>
        <g transform="translate(50, 150)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000">15#有人</text> </g>
        <g transform="translate(160, 150)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">16#</text> </g>
        <g transform="translate(270, 150)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">17#</text> </g>
        <g transform="translate(380, 150)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <ellipse cy="-15" rx="22" ry="12" fill="url(#glass_shine)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">18#</text> </g>
      </g>
    </g>
  </g>

  <!-- ================= 18楼南 (18S) ================= -->
  <g transform="translate(60, 500)">
    <rect width="1080" height="280" rx="35" fill="white" fill-opacity="0.4" stroke="white" stroke-width="2"/>
    <text x="30" y="45" font-size="22" font-weight="bold" fill="#0072FF">18楼南区域 (South Wing)</text>

    <!-- 男卫 02 (5点位) -->
    <g transform="translate(30, 80)">
       <text font-size="16" fill="#002060" font-weight="bold">男卫 02 (1#-5#)</text>
       <g transform="translate(40, 70)">
         <g transform="translate(0, 0)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000">1#有人</text> </g>
         <g transform="translate(100, 0)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000">2#有人</text> </g>
         <g transform="translate(200, 0)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">3#无人</text> </g>
         <g transform="translate(300, 0)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">4#无人</text> </g>
         <g transform="translate(400, 0)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">5#无人</text> </g>
       </g>
    </g>

    <!-- 女卫 02 (7点位) -->
    <g transform="translate(570, 80)">
       <text font-size="16" fill="#D63384" font-weight="bold">女卫 02 (6#-12#)</text>
       <g transform="translate(40, 70)">
         <g transform="translate(0, 0)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">6#</text> </g>
         <g transform="translate(85, 0)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000">7#</text> </g>
         <g transform="translate(170, 0)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">8#</text> </g>
         <g transform="translate(255, 0)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">9#</text> </g>
         <g transform="translate(340, 0)"> <circle r="35" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/> <text y="65" text-anchor="middle" font-size="12" fill="#600000">10#</text> </g>
         <g transform="translate(425, 0)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">11#</text> </g>
         <g transform="translate(510, 0)"> <circle r="35" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/> <text y="65" text-anchor="middle" font-size="12" fill="#004D20">12#</text> </g>
       </g>
    </g>
  </g>

  <!-- 底部图例 -->
  <g transform="translate(600, 840)">
    <circle cx="-130" cy="0" r="18" fill="url(#grad_red_occupied)" filter="url(#glow_red)"/>
    <text x="-100" y="7" font-size="18" fill="#600000" font-weight="bold">有人 (Occupied)</text>
    
    <circle cx="100" cy="0" r="18" fill="url(#grad_green_vacant)" filter="url(#glow_green)"/>
    <text x="130" y="7" font-size="18" fill="#004D20" font-weight="bold">无人 (Vacant)</text>
  </g>
</svg>