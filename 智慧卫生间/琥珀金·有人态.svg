<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF" /><stop offset="50%" stop-color="#FFF0F3" /><stop offset="100%" stop-color="#FFD1DC" /></linearGradient><linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00C6FF" /><stop offset="50%" stop-color="#0072FF" /><stop offset="100%" stop-color="#002060" /></linearGradient><filter id="blueShadow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceAlpha" stdDeviation="40" /><feFlood flood-color="#0055FF" flood-opacity="0.4" /><feComposite operator="in" in2="blur" /><feOffset dx="0" dy="30" /><feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>
  <rect width="1024" height="1024" rx="240" fill="url(#bgGrad)" />
  <g filter="url(#blueShadow)">
    <!-- 屏幕主体 -->
    <rect x="150" y="262" width="500" height="500" rx="80" fill="url(#bodyGrad)" />
    <!-- 屏幕上的播放按钮/内容块 -->
    <path d="M350 412 L 500 512 L 350 612 Z" fill="#FFFFFF" fill-opacity="0.3" />
    
    <!-- 广播信号波 (右侧扩散) -->
    <path d="M700 362 A 250 250 0 0 1 700 662" fill="none" stroke="url(#bodyGrad)" stroke-width="60" stroke-linecap="round" />
    <path d="M800 262 A 350 350 0 0 1 800 762" fill="none" stroke="url(#bodyGrad)" stroke-width="60" stroke-linecap="round" opacity="0.6" />
    
    <!-- 屏幕玻璃反光 -->
    <path d="M150 262 H 650 C 650 262, 500 500, 150 500 V 262 Z" fill="#FFFFFF" opacity="0.2" />
  </g>
</svg>