<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 背景渐变 (复刻风格) -->
    <linearGradient id="bg_grad" x1="100" y1="100" x2="1100" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="0.4" stop-color="#FFF0F3" />
      <stop offset="1" stop-color="#FFD1DC" />
    </linearGradient>

    <!-- 2. "有人"状态：高透蓝宝石发光 (极高对比度) -->
    <radialGradient id="status_occupied_grad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(25 20) rotate(90) scale(40)">
      <stop stop-color="#7DF9FF" /> <!-- 中心极亮 -->
      <stop offset="0.6" stop-color="#0072FF" /> <!-- 纯蓝 -->
      <stop offset="1" stop-color="#002060" />   <!-- 深蓝边界 -->
    </radialGradient>

    <!-- 3. "有人"状态的发光滤镜 -->
    <filter id="glow_blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- 4. 玻璃高光 (复刻图标风格) -->
    <linearGradient id="sphere_shine" x1="0" y1="-20" x2="0" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.8"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 整体背景 -->
  <rect width="1200" height="900" rx="40" fill="url(#bg_grad)"/>
  <rect x="15" y="15" width="1170" height="870" rx="35" stroke="white" stroke-opacity="0.5" stroke-width="4"/>

  <!-- 顶部看板标题 -->
  <g transform="translate(600, 70)">
    <text text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#002060">18楼 智慧厕卫状态实时监控面板</text>
    <rect x="-150" y="20" width="300" height="4" rx="2" fill="#0072FF" opacity="0.3"/>
  </g>

  <!-- ================= 区域一：18楼北 (18N) ================= -->
  <g transform="translate(60, 140)">
    <text font-family="sans-serif" font-size="24" font-weight="bold" fill="#0072FF">● 18楼北区域 (North Wing)</text>
    
    <!-- 男卫 01: 10个探测点 -->
    <g transform="translate(0, 40)">
      <rect width="520" height="280" rx="30" fill="white" fill-opacity="0.6" stroke="white" stroke-width="2"/>
      <text x="30" y="45" font-size="20" font-weight="bold" fill="#002060">男卫 01</text>
      <text x="400" y="45" font-size="16" fill="#0072FF">使用中: 4 / 10</text>
      
      <!-- 探测点阵 5x2 -->
      <g transform="translate(30, 80)">
        <!-- 第一排 (1#-5#) -->
        <g transform="translate(0, 0)">
          <!-- 有人状态示范 -->
          <g transform="translate(30, 30)">
             <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
             <ellipse cy="-12" rx="18" ry="10" fill="url(#sphere_shine)"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">1# 有人</text>
          </g>
          <!-- 无人状态示范 (仅空心环) -->
          <g transform="translate(120, 30)">
             <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#999">2# 无人</text>
          </g>
          <g transform="translate(210, 30)">
             <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#999">3# 无人</text>
          </g>
          <g transform="translate(300, 30)">
             <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
             <ellipse cy="-12" rx="18" ry="10" fill="url(#sphere_shine)"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">4# 有人</text>
          </g>
          <g transform="translate(390, 30)">
             <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#999">5# 无人</text>
          </g>
        </g>
        <!-- 第二排 (6#-10#) -->
        <g transform="translate(0, 100)">
          <g transform="translate(30, 30)">
             <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#999">6# 无人</text>
          </g>
          <g transform="translate(120, 30)">
             <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
             <ellipse cy="-12" rx="18" ry="10" fill="url(#sphere_shine)"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">7# 有人</text>
          </g>
          <g transform="translate(210, 30)">
             <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#999">8# 无人</text>
          </g>
          <g transform="translate(300, 30)">
             <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
             <ellipse cy="-12" rx="18" ry="10" fill="url(#sphere_shine)"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">9# 有人</text>
          </g>
          <g transform="translate(390, 30)">
             <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/>
             <text y="55" text-anchor="middle" font-size="14" fill="#999">10# 无人</text>
          </g>
        </g>
      </g>
    </g>

    <!-- 女卫 01: 8个探测点 -->
    <g transform="translate(560, 40)">
      <rect width="520" height="280" rx="30" fill="white" fill-opacity="0.6" stroke="white" stroke-width="2"/>
      <text x="30" y="45" font-size="20" font-weight="bold" fill="#D63384">女卫 01</text>
      <text x="400" y="45" font-size="16" fill="#D63384">使用中: 2 / 8</text>
      
      <g transform="translate(30, 80)">
        <!-- 探测点 11#-18# -->
        <g transform="translate(30, 30)">
           <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
           <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">11# 有人</text>
        </g>
        <g transform="translate(130, 30)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">12#</text></g>
        <g transform="translate(230, 30)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">13#</text></g>
        <g transform="translate(330, 30)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">14#</text></g>
        <g transform="translate(30, 130)">
           <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
           <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">15# 有人</text>
        </g>
        <g transform="translate(130, 130)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">16#</text></g>
        <g transform="translate(230, 130)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">17#</text></g>
        <g transform="translate(330, 130)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">18#</text></g>
      </g>
    </g>
  </g>

  <!-- ================= 区域二：18楼南 (18S) ================= -->
  <g transform="translate(60, 520)">
    <text font-family="sans-serif" font-size="24" font-weight="bold" fill="#0072FF">● 18楼南区域 (South Wing)</text>
    
    <!-- 男卫 02: 5个点位 (点表黄色部分) -->
    <g transform="translate(0, 40)">
      <rect width="520" height="240" rx="30" fill="white" fill-opacity="0.6" stroke="white" stroke-width="2"/>
      <text x="30" y="45" font-size="20" font-weight="bold" fill="#002060">男卫 02</text>
      <g transform="translate(60, 110)">
        <g transform="translate(0, 0)">
           <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
           <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">1#</text>
        </g>
        <g transform="translate(90, 0)">
           <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
           <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">2#</text>
        </g>
        <g transform="translate(180, 0)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">3#</text></g>
        <g transform="translate(270, 0)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">4#</text></g>
        <g transform="translate(360, 0)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">5#</text></g>
      </g>
    </g>

    <!-- 女卫 02: 7个点位 -->
    <g transform="translate(560, 40)">
      <rect width="520" height="240" rx="30" fill="white" fill-opacity="0.6" stroke="white" stroke-width="2"/>
      <text x="30" y="45" font-size="20" font-weight="bold" fill="#D63384">女卫 02</text>
      <g transform="translate(45, 110)">
        <g transform="translate(0, 0)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">6#</text></g>
        <g transform="translate(70, 0)">
           <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
           <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">7#</text>
        </g>
        <g transform="translate(140, 0)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">8#</text></g>
        <g transform="translate(210, 0)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">9#</text></g>
        <g transform="translate(280, 0)">
           <circle r="30" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
           <text y="55" text-anchor="middle" font-size="14" fill="#002060" font-weight="bold">10#</text>
        </g>
        <g transform="translate(350, 0)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">11#</text></g>
        <g transform="translate(420, 0)"> <circle r="29" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/> <text y="55" text-anchor="middle" font-size="14" fill="#999">12#</text></g>
      </g>
    </g>
  </g>

  <!-- 底部图例 (Legend) -->
  <g transform="translate(600, 840)">
    <circle cx="-120" cy="0" r="15" fill="url(#status_occupied_grad)" filter="url(#glow_blue)"/>
    <text x="-95" y="7" font-size="18" fill="#002060" font-weight="bold">有人 (Occupied)</text>
    
    <circle cx="100" cy="0" r="14" stroke="#D1D1D1" stroke-width="3" fill="#F8F8F8"/>
    <text x="125" y="7" font-size="18" fill="#999">无人 (Vacant)</text>
  </g>
</svg>