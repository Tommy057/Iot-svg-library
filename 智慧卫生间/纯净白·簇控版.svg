<svg width="320" height="120" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 柔和阴影 -->
        <filter id="panel_shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" />
            <feOffset dx="0" dy="2" />
            <feFlood flood-color="rgba(0,0,0,0.1)" />
            <feComposite in2="SourceGraphic" operator="over" />
        </filter>
        <!-- 晶钻绿 (空闲) -->
        <linearGradient id="gem_vacant" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34D399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
        <!-- 晶钻橙 (有人) -->
        <linearGradient id="gem_occupied" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FBBF24" />
            <stop offset="100%" stop-color="#D97706" />
        </linearGradient>
    </defs>

    <!-- 1. 全息指引线 (指向 CAD 中的卫生间位置) -->
    <path d="M20 110 L40 80" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 2" />
    <circle cx="20" cy="110" r="4" fill="#3B82F6" />

    <!-- 2. 全息磨砂玻璃长面板 -->
    <rect x="40" y="20" width="260" height="65" rx="12" fill="rgba(255, 255, 255, 0.95)" stroke="#E2E8F0" stroke-width="1" filter="url(#panel_shadow)" />

    <!-- 3. 厕位 01 -->
    <g transform="translate(60, 30)">
        <!-- 晶钻方块 - 空闲 -->
        <rect width="40" height="40" rx="6" fill="url(#gem_vacant)" />
        <path d="M5 10 Q20 5 35 10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3" />
        <text x="20" y="26" font-family="Arial Black" font-size="12" fill="white" text-anchor="middle">01</text>
    </g>

    <!-- 4. 厕位 02 -->
    <g transform="translate(115, 30)">
        <!-- 晶钻方块 - 有人 -->
        <rect width="40" height="40" rx="6" fill="url(#gem_occupied)" />
        <path d="M5 10 Q20 5 35 10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4" />
        <text x="20" y="26" font-family="Arial Black" font-size="12" fill="white" text-anchor="middle">02</text>
        <!-- 动态呼吸光晕 (有人时闪烁) -->
        <rect width="40" height="40" rx="6" fill="none" stroke="#F59E0B" stroke-width="2">
            <animate attributeName="stroke-opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
        </rect>
    </g>

    <!-- 5. 厕位 03 -->
    <g transform="translate(170, 30)">
        <rect width="40" height="40" rx="6" fill="url(#gem_vacant)" />
        <path d="M5 10 Q20 5 35 10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3" />
        <text x="20" y="26" font-family="Arial Black" font-size="12" fill="white" text-anchor="middle">03</text>
    </g>

    <!-- 6. 厕位 04 -->
    <g transform="translate(225, 30)">
        <rect width="40" height="40" rx="6" fill="url(#gem_vacant)" />
        <path d="M5 10 Q20 5 35 10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3" />
        <text x="20" y="26" font-family="Arial Black" font-size="12" fill="white" text-anchor="middle">04</text>
    </g>

    <!-- 标题文本 -->
    <text x="40" y="15" font-family="Arial-Bold" font-size="10" fill="#64748B">男卫生间·实时厕位占用</text>
</svg>