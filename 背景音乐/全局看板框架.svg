<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. 背景层 -->
    <rect width="1200" height="800" fill="#0B1120" />
    
    <!-- 2. 背景装饰科技线条 -->
    <path d="M0 40 L1200 40" stroke="#1E293B" stroke-width="1" />
    <path d="M40 0 L40 800" stroke="#1E293B" stroke-width="1" stroke-dasharray="5,5" />

    <!-- 3. 顶部标题区 -->
    <g id="header">
        <path d="M20 20 L40 20 L50 30 L300 30 L310 20 L1180 20" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.6" />
        <circle cx="20" cy="20" r="3" fill="#00E5FF" />
        <text x="60" y="55" font-family="'Microsoft YaHei', sans-serif" font-size="24" fill="#00FFFF" font-weight="bold">背景音乐系统 (ITC) 数字化驾驶舱</text>
    </g>

    <!-- 4. 汇总统计面板 (4个数据块) -->
    <g id="summary-stats" transform="translate(50, 90)">
        <!-- 设备总数 -->
        <rect width="250" height="100" fill="rgba(29, 78, 216, 0.1)" stroke="#1D4ED8" stroke-width="1" />
        <path d="M0 0 L20 0 M0 0 L0 20" stroke="#00E5FF" stroke-width="3" />
        <text x="20" y="30" font-family="'Microsoft YaHei'" font-size="14" fill="#94A3B8">设备总数 (TOTAL)</text>
        <text x="20" y="80" font-family="'Microsoft YaHei'" font-size="36" fill="#00E5FF" font-weight="bold">24</text>
        
        <!-- 空闲/运行/故障 依次类推... 间距280 -->
        <g transform="translate(280, 0)">
            <rect width="250" height="100" fill="rgba(0, 230, 118, 0.05)" stroke="#00E676" stroke-width="1" stroke-dasharray="2,2" />
            <text x="20" y="30" font-family="'Microsoft YaHei'" font-size="14" fill="#94A3B8">空闲数量 (IDLE)</text>
            <text x="20" y="80" font-family="'Microsoft YaHei'" font-size="36" fill="#00E676" font-weight="bold">22</text>
        </g>

        <g transform="translate(560, 0)">
            <rect width="250" height="100" fill="rgba(255, 23, 68, 0.05)" stroke="#FF1744" stroke-width="1" />
            <text x="20" y="30" font-family="'Microsoft YaHei'" font-size="14" fill="#94A3B8">离线数量 (OFFLINE)</text>
            <text x="20" y="80" font-family="'Microsoft YaHei'" font-size="36" fill="#FF1744" font-weight="bold">02</text>
        </g>

        <g transform="translate(840, 0)">
            <rect width="250" height="100" fill="rgba(255, 145, 0, 0.05)" stroke="#FF9100" stroke-width="1" />
            <text x="20" y="30" font-family="'Microsoft YaHei'" font-size="14" fill="#94A3B8">播放任务 (TASK)</text>
            <text x="20" y="80" font-family="'Microsoft YaHei'" font-size="36" fill="#FF9100" font-weight="bold">08</text>
        </g>
    </g>
</svg>