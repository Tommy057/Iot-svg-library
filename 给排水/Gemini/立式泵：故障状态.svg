<svg width="200" height="280" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 故障态机身渐变 (深红-亮红-反光红) -->
    <linearGradient id="bodyError" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F1D1D" />
      <stop offset="30%" stop-color="#B91C1C" />
      <stop offset="45%" stop-color="#EF4444" />
      <stop offset="60%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#7F1D1D" />
    </linearGradient>

    <!-- 故障态宝石核心 -->
    <radialGradient id="gemError" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FCA5A5" />
      <stop offset="100%" stop-color="#B91C1C" />
    </radialGradient>

    <linearGradient id="shineError" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <ellipse cx="100" cy="265" rx="45" ry="6" fill="#000000" fill-opacity="0.1" />

  <g transform="translate(55, 10)">
    <rect x="35" y="0" width="20" height="8" rx="1" fill="#450A0A" />
    <rect x="25" y="8" width="40" height="15" rx="2" fill="url(#bodyError)" />
    <path d="M15,23 L75,23 L70,85 L20,85 Z" fill="url(#bodyError)" />
    
    <!-- 法兰连接处 -->
    <rect x="10" y="85" width="70" height="12" rx="2" fill="#450A0A" />
    <circle cx="20" cy="91" r="1.5" fill="#FCA5A5" opacity="0.6" />
    <circle cx="45" cy="91" r="1.5" fill="#FCA5A5" opacity="0.6" />
    <circle cx="70" cy="91" r="1.5" fill="#FCA5A5" opacity="0.6" />

    <path d="M10,97 L80,97 L85,190 Q85,200 75,200 L15,200 Q5,200 5,190 Z" fill="url(#bodyError)" />

    <!-- 侧向出口 -->
    <g transform="translate(-25, 160)">
      <rect x="0" y="5" width="35" height="25" fill="#B91C1C" />
      <rect x="-6" y="0" width="10" height="35" rx="1" fill="#450A0A" />
      <rect x="25" y="5" width="10" height="25" fill="#000000" fill-opacity="0.2" />
    </g>

    <g stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="0.5">
      <line x1="30" y1="23" x2="25" y2="85" />
      <line x1="45" y1="23" x2="45" y2="85" />
      <line x1="60" y1="23" x2="65" y2="85" />
    </g>

    <g transform="translate(45, 55)">
      <circle r="12" fill="#450A0A" /> 
      <circle r="8" fill="url(#gemError)" stroke="#FFFFFF" stroke-width="1.5" />
      <circle cx="-3" cy="-3" r="2" fill="#FFFFFF" fill-opacity="0.6" />
    </g>

    <rect x="35" y="23" width="8" height="177" fill="url(#shineError)" />
  </g>
</svg>