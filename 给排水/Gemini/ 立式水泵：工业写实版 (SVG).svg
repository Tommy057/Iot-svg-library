<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 机身金属质感：模拟圆柱体圆弧受光 -->
    <linearGradient id="pumpGreenBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#065F46" />   <!-- 阴影区 -->
      <stop offset="25%" stop-color="#059669" />  <!-- 过渡区 -->
      <stop offset="45%" stop-color="#34D399" />  <!-- 高光受光面 -->
      <stop offset="65%" stop-color="#10B981" />  <!-- 自然色 -->
      <stop offset="100%" stop-color="#064E3B" /> <!-- 边缘折射 -->
    </linearGradient>

    <!-- 2. 金属高光：增强机身棱角感 -->
    <linearGradient id="metalHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <!-- 3. 核心宝石渐变 -->
    <radialGradient id="gemCore" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#A7F3D0" />
      <stop offset="100%" stop-color="#059669" />
    </radialGradient>

    <!-- 4. 阴影滤镜 -->
    <filter id="depthShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="4" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 绘图组：整体带有微小阴影 -->
  <g filter="url(#depthShadow)" transform="translate(50, 20)">
    
    <!-- 【泵体底部 - 涡轮室】 -->
    <path d="M10,210 L90,210 L95,250 Q95,255 90,255 L10,255 Q5,255 5,250 Z" fill="url(#pumpGreenBody)" />
    <!-- 底部细节阴影 -->
    <rect x="5" y="245" width="90" height="4" fill="#064E3B" opacity="0.3" />
    
    <!-- 【特征点：侧向出水法兰】 -->
    <rect x="-25" y="225" width="30" height="22" rx="2" fill="#047857" />
    <rect x="-32" y="215" width="8" height="42" rx="1" fill="#065F46" /> <!-- 法兰盘 -->
    <!-- 法兰高光线 -->
    <line x1="-28" y1="215" x2="-28" y2="257" stroke="#34D399" stroke-width="0.5" opacity="0.5" />

    <!-- 【中部法兰连接圈】 -->
    <rect x="0" y="165" width="100" height="15" rx="2" fill="#065F46" />
    <!-- 螺栓细节 -->
    <circle cx="15" cy="172.5" r="2" fill="#A7F3D0" opacity="0.8" />
    <circle cx="50" cy="172.5" r="2" fill="#A7F3D0" opacity="0.8" />
    <circle cx="85" cy="172.5" r="2" fill="#A7F3D0" opacity="0.8" />

    <!-- 【主泵体：阶梯式圆柱体】 -->
    <!-- 下层大身 -->
    <path d="M10,180 L90,180 L85,90 L15,90 Z" fill="url(#pumpGreenBody)" />
    <!-- 上层电机座 -->
    <path d="M20,90 L80,90 L75,30 L25,30 Z" fill="url(#pumpGreenBody)" />
    <!-- 顶部接线盖 -->
    <rect x="35" y="10" width="30" height="20" rx="2" fill="#064E3B" />
    <rect x="42" y="0" width="16" height="10" rx="1" fill="#047857" />

    <!-- 【立体感强化：垂直加强筋】 -->
    <g opacity="0.4">
      <line x1="30" y1="35" x2="25" y2="175" stroke="#064E3B" stroke-width="1.5" />
      <line x1="31" y1="35" x2="26" y2="175" stroke="#34D399" stroke-width="0.5" />
      
      <line x1="50" y1="35" x2="50" y2="175" stroke="#064E3B" stroke-width="1.5" />
      <line x1="51" y1="35" x2="51" y2="175" stroke="#34D399" stroke-width="0.5" />
      
      <line x1="70" y1="35" x2="75" y2="175" stroke="#064E3B" stroke-width="1.5" />
      <line x1="71" y1="35" x2="76" y2="175" stroke="#34D399" stroke-width="0.5" />
    </g>

    <!-- 【核心：宝石光晕指示灯】 -->
    <g transform="translate(50, 115)">
      <!-- 宝石外环（金属槽） -->
      <circle cx="0" cy="0" r="14" fill="#064E3B" />
      <!-- 宝石深邃感 -->
      <circle cx="0" cy="0" r="10" fill="url(#gemCore)" stroke="#FFFFFF" stroke-width="0.5" />
      <!-- 核心高光（点睛之笔） -->
      <circle cx="-3" cy="-3" r="3" fill="#FFFFFF" fill-opacity="0.5" />
    </g>

    <!-- 【高光层：覆盖整个机身增加金属反光】 -->
    <rect x="40" y="30" width="10" height="135" fill="url(#metalHighlight)" />
  </g>
</svg>