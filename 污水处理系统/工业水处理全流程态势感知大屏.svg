<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. 背景与滤镜 -->
    <defs>
        <rect id="bg" width="1600" height="900" fill="#0B1120" />
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(14, 165, 233, 0.05)" stroke-width="1"/>
        </pattern>
        
        <!-- 毛玻璃+拟物化滤镜 -->
        <filter id="clay-glass" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
            <feOffset dx="4" dy="4" result="offsetblur" />
            <feFlood flood-color="black" flood-opacity="0.5" />
            <feComposite in2="offsetblur" operator="in" />
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- 液位渐变 -->
        <linearGradient id="water-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0EA5E9" />
            <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.2" />
        </linearGradient>
    </defs>

    <use href="#bg" />
    <rect width="1600" height="900" fill="url(#grid)" />

    <!-- 顶部状态栏 (全局监控) -->
    <g transform="translate(40, 30)">
        <text x="0" y="20" fill="#0EA5E9" font-family="Arial" font-size="26" font-weight="bold">智慧污水处理系统监控大屏</text>
        <g transform="translate(1300, 0)">
            <rect width="100" height="30" rx="15" fill="rgba(16, 185, 129, 0.2)" stroke="#10B981" />
            <text x="50" y="20" fill="#10B981" font-size="12" text-anchor="middle">系统运行中</text>
            <rect x="110" width="100" height="30" rx="15" fill="rgba(239, 68, 68, 0.1)" stroke="#EF4444" opacity="0.5" />
            <text x="160" y="20" fill="#EF4444" font-size="12" text-anchor="middle">无事故</text>
        </g>
        <path d="M 0 50 L 1520 50" stroke="#0EA5E9" stroke-width="1" opacity="0.3" />
    </g>

    <!-- 2. 工艺流程区 -->
    
    <!-- 第一工艺段：预处理 (格栅/除臭/集水) -->
    <g transform="translate(40, 100)">
        <rect width="360" height="740" rx="12" fill="rgba(30, 41, 59, 0.7)" filter="url(#clay-glass)" />
        <text x="20" y="30" fill="#BAE6FD" font-size="14" font-weight="bold">PRE-TREATMENT | 预处理区</text>
        
        <!-- 格栅机 A/B -->
        <g transform="translate(20, 60)">
            <rect width="150" height="80" rx="8" fill="rgba(14, 165, 233, 0.1)" stroke="#0EA5E9" stroke-dasharray="2 1" />
            <text x="10" y="25" fill="#BAE6FD" font-size="12">格栅机 A</text>
            <circle cx="20" cy="50" r="5" fill="#10B981" /> <text x="30" y="54" fill="#10B981" font-size="10">运行</text>
            <text x="80" y="54" fill="#475569" font-size="10">远程</text>
        </g>
        <g transform="translate(190, 60)">
            <rect width="150" height="80" rx="8" fill="rgba(14, 165, 233, 0.1)" stroke="#0EA5E9" stroke-dasharray="2 1" />
            <text x="10" y="25" fill="#BAE6FD" font-size="12">格栅机 B</text>
            <circle cx="20" cy="50" r="5" fill="#475569" /> <text x="30" y="54" fill="#475569" font-size="10">停止</text>
        </g>

        <!-- 集水池 (液位可视化) -->
        <g transform="translate(20, 160)">
            <text x="0" y="20" fill="#BAE6FD" font-size="12">集水池液位</text>
            <rect x="0" y="30" width="320" height="20" rx="10" fill="#0F172A" />
            <rect x="0" y="30" width="180" height="20" rx="10" fill="url(#water-grad)" />
            <text x="325" y="45" fill="#0EA5E9" font-size="12">1.45m</text>
        </g>
        
        <!-- 除臭风机 -->
        <g transform="translate(20, 240)">
            <rect width="320" height="60" rx="8" fill="rgba(16, 185, 129, 0.05)" stroke="#10B981" stroke-width="0.5" />
            <text x="15" y="35" fill="#BAE6FD" font-size="12">除臭系统: 运行中</text>
            <path d="M 280 30 m -10 0 a 10 10 0 1 0 20 0 a 10 10 0 1 0 -20 0" fill="none" stroke="#10B981" stroke-width="2">
                <animateTransform attributeName="transform" type="rotate" from="0 280 30" to="360 280 30" dur="2s" repeatCount="indefinite" />
            </path>
        </g>
    </g>

    <!-- 第二工艺段：调节与应急池 (核心液位监控) -->
    <g transform="translate(420, 100)">
        <rect width="520" height="740" rx="12" fill="rgba(30, 41, 59, 0.7)" filter="url(#clay-glass)" />
        <text x="20" y="30" fill="#BAE6FD" font-size="14" font-weight="bold">BUFFER &amp; EQUALIZATION | 提升调节区</text>
        
        <!-- 调节池 A -->
        <g transform="translate(30, 80)">
            <text x="0" y="-10" fill="#BAE6FD" font-size="12">调节池 A (液位/泵组)</text>
            <rect x="0" y="0" width="60" height="200" rx="4" fill="#0F172A" stroke="rgba(14, 165, 233, 0.3)" />
            <rect x="2" y="40" width="56" height="158" rx="2" fill="url(#water-grad)" />
            <text x="30" y="220" fill="#0EA5E9" font-size="12" text-anchor="middle">3.24m</text>
            
            <g transform="translate(80, 20)">
                <rect width="120" height="40" rx="4" fill="rgba(14, 165, 233, 0.1)" />
                <text x="10" y="25" fill="#BAE6FD" font-size="10">泵 1: 运行</text>
                <rect y="50" width="120" height="40" rx="4" fill="rgba(14, 165, 233, 0.1)" />
                <text x="10" y="75" fill="#BAE6FD" font-size="10">泵 2: 备用</text>
            </g>
        </g>

        <!-- 应急池 (带高位报警) -->
        <g transform="translate(280, 80)">
            <text x="0" y="-10" fill="#BAE6FD" font-size="12">应急池</text>
            <rect x="0" y="0" width="60" height="200" rx="4" fill="#0F172A" stroke="#EF4444" />
            <rect x="2" y="10" width="56" height="188" rx="2" fill="#EF4444" opacity="0.6">
                <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1s" repeatCount="indefinite" />
            </rect>
            <text x="30" y="220" fill="#EF4444" font-size="12" text-anchor="middle" font-weight="bold">满溢告警!</text>
        </g>
    </g>

    <!-- 第三工艺段：生化与加药 (风机/溶解氧/加药桶) -->
    <g transform="translate(960, 100)">
        <rect width="600" height="740" rx="12" fill="rgba(30, 41, 59, 0.7)" filter="url(#clay-glass)" />
        <text x="20" y="30" fill="#BAE6FD" font-size="14" font-weight="bold">BIO-TREATMENT &amp; DOSING | 生化加药区</text>
        
        <!-- 风机矩阵 (F1, F2, F3) -->
        <g transform="translate(20, 60)">
            <text x="0" y="0" fill="#BAE6FD" font-size="12">鼓风机组 (变频监控)</text>
            <rect y="15" width="560" height="150" rx="8" fill="rgba(14, 165, 233, 0.05)" stroke="rgba(14, 165, 233, 0.2)" />
            <!-- 风机 1 -->
            <g transform="translate(20, 40)">
                <circle cx="30" cy="30" r="25" fill="#0F172A" stroke="#0EA5E9" />
                <text x="30" y="35" fill="#0EA5E9" font-size="10" text-anchor="middle">45Hz</text>
                <text x="30" y="75" fill="#BAE6FD" font-size="10" text-anchor="middle">风机 F1</text>
            </g>
            <!-- 溶解氧 DO -->
            <g transform="translate(400, 40)">
                <rect width="120" height="100" rx="8" fill="rgba(14, 165, 233, 0.1)" />
                <text x="60" y="30" fill="#BAE6FD" font-size="12" text-anchor="middle">溶解氧 DO</text>
                <text x="60" y="70" fill="#10B981" font-size="24" font-weight="bold" text-anchor="middle">6.5</text>
                <text x="60" y="90" fill="#475569" font-size="10" text-anchor="middle">mg/L</text>
            </g>
        </g>

        <!-- 加药桶监控 (1, 2, 3) -->
        <g transform="translate(20, 240)">
            <text x="0" y="0" fill="#BAE6FD" font-size="12">加药系统 (药量监控)</text>
            <g transform="translate(0, 20)">
                <!-- 药桶 1 -->
                <rect width="170" height="80" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#10B981" />
                <text x="15" y="30" fill="#BAE6FD" font-size="11">加药桶 1</text>
                <text x="15" y="60" fill="#10B981" font-size="14" font-weight="bold">充足</text>
                <!-- 药桶 2 -->
                <rect x="190" width="170" height="80" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#F59E0B" />
                <text x="205" y="30" fill="#BAE6FD" font-size="11">加药桶 2</text>
                <text x="205" y="60" fill="#F59E0B" font-size="14" font-weight="bold">低液位</text>
                <!-- 药桶 3 -->
                <rect x="380" width="170" height="80" rx="8" fill="rgba(30, 41, 59, 0.8)" stroke="#10B981" />
                <text x="395" y="30" fill="#BAE6FD" font-size="11">加药桶 3</text>
                <text x="395" y="60" fill="#10B981" font-size="14" font-weight="bold">充足</text>
            </g>
        </g>

        <!-- 外排监控 -->
        <g transform="translate(20, 380)">
             <rect width="560" height="100" rx="8" fill="rgba(245, 158, 11, 0.05)" stroke="#F59E0B" stroke-dasharray="5 2" />
             <text x="20" y="40" fill="#BAE6FD" font-size="14">末端外排流量监控</text>
             <text x="20" y="75" fill="#F59E0B" font-size="28" font-weight="bold">124.5 <tspan font-size="14" font-weight="normal">m³/h</tspan></text>
             <text x="300" y="75" fill="#BAE6FD" font-size="14">总外排量: <tspan fill="#0EA5E9">85,241 m³</tspan></text>
        </g>
    </g>

    <!-- 装饰流光线条 (模拟水流方向) -->
    <path d="M 400 300 L 420 300" stroke="#0EA5E9" stroke-width="2" marker-end="url(#arrow)" opacity="0.5" />
    <path d="M 940 300 L 960 300" stroke="#0EA5E9" stroke-width="2" opacity="0.5" />
</svg>