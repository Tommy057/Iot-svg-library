<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. 背景 -->
    <rect width="1600" height="900" fill="#0B1120" />
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(14, 165, 233, 0.03)" stroke-width="1"/>
        </pattern>
        <!-- 简单的拟物投影 -->
        <filter id="card-shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
        </filter>
    </defs>
    <rect width="1600" height="900" fill="url(#grid)" />

    <!-- 2. 标题 -->
    <g transform="translate(40, 40)">
        <text x="0" y="0" fill="#0EA5E9" font-family="Arial" font-size="28" font-weight="bold">污水处理系统实时参数监控矩阵</text>
        <text x="0" y="25" fill="#475569" font-family="Arial" font-size="14">SYSTEM DATA NODES | 实时监测点位：124 个</text>
    </g>

    <!-- 3. 数据卡片矩阵布局 (4列 x 4行) -->
    <!-- 每一列宽度 360px, 间距 20px -->
    
    <!-- 第一列：格栅与预处理 -->
    <g id="Col_1" transform="translate(40, 100)">
        <!-- 单元格 1: 格栅机 A -->
        <g transform="translate(0, 0)">
            <rect width="360" height="130" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" filter="url(#card-shadow)"/>
            <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">格栅机 A</text>
            <rect x="290" y="15" width="50" height="20" rx="10" fill="rgba(16, 185, 129, 0.2)" stroke="#10B981" />
            <text x="315" y="30" fill="#10B981" font-size="10" text-anchor="middle">远程</text>
            
            <g transform="translate(20, 60)">
                <text y="0" fill="#475569" font-size="12">运行状态：</text>
                <text x="70" y="0" fill="#10B981" font-size="12">运行中</text>
                <text y="30" fill="#475569" font-size="12">故障信息：</text>
                <text x="70" y="30" fill="#10B981" font-size="12">正常</text>
                <text y="55" fill="#475569" font-size="12">自动模式：</text>
                <text x="70" y="55" fill="#0EA5E9" font-size="12">开启</text>
            </g>
        </g>

        <!-- 单元格 2: 集水池 -->
        <g transform="translate(0, 150)">
            <rect width="360" height="130" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" />
            <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">集水池液位</text>
            <text x="20" y="90" fill="#0EA5E9" font-size="42" font-weight="bold">1.45 <tspan font-size="18" font-weight="normal">m</tspan></text>
            <g transform="translate(200, 60)">
                <text y="0" fill="#475569" font-size="12">上限：2.50m</text>
                <text y="25" fill="#475569" font-size="12">下限：0.30m</text>
                <text y="50" fill="#10B981" font-size="12">状态：正常水位</text>
            </g>
        </g>

        <!-- 单元格 3: 除臭系统 -->
        <g transform="translate(0, 300)">
            <rect width="360" height="130" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" />
            <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">除臭系统</text>
            <g transform="translate(20, 65)">
                <text y="0" fill="#10B981" font-size="20" font-weight="bold">风机运行中</text>
                <text y="35" fill="#475569" font-size="12">工作周期：45 分钟</text>
            </g>
        </g>
    </g>

    <!-- 第二列：提升调节区 -->
    <g id="Col_2" transform="translate(420, 100)">
        <!-- 单元格 1: 调节池 A -->
        <g transform="translate(0, 0)">
            <rect width="360" height="200" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" />
            <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">调节池 A (提升泵组)</text>
            <text x="20" y="85" fill="#0EA5E9" font-size="36" font-weight="bold">3.24 m</text>
            <line x1="20" y1="105" x2="340" y2="105" stroke="#475569" stroke-width="0.5" />
            <g transform="translate(20, 135)">
                <text y="0" fill="#475569" font-size="12">泵1状态：</text>
                <text x="80" y="0" fill="#10B981" font-size="12">运行中</text>
                <text y="30" fill="#475569" font-size="12">泵2状态：</text>
                <text x="80" y="30" fill="#475569" font-size="12">备用中</text>
            </g>
        </g>

        <!-- 单元格 2: 应急池 -->
        <g transform="translate(0, 220)">
            <rect width="360" height="130" rx="8" fill="rgba(239, 68, 68, 0.1)" stroke="#EF4444" stroke-width="1.5" />
            <text x="20" y="35" fill="#EF4444" font-size="16" font-weight="bold">应急池 [高水位报警]</text>
            <text x="20" y="90" fill="#EF4444" font-size="42" font-weight="bold">4.82 <tspan font-size="18">m</tspan></text>
            <text x="200" y="85" fill="#EF4444" font-size="14" font-weight="bold">超出设限值!</text>
        </g>
    </g>

    <!-- 第三列：生化区风机 -->
    <g id="Col_3" transform="translate(800, 100)">
        <g transform="translate(0, 0)">
            <rect width="360" height="280" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" />
            <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">鼓风机机组</text>
            
            <g transform="translate(20, 70)">
                <text y="0" fill="#BAE6FD" font-size="14">风机 F1 频率：</text>
                <text x="240" y="0" fill="#0EA5E9" font-size="18" font-weight="bold">45.0 Hz</text>
                <rect y="15" width="320" height="8" rx="4" fill="#0F172A" />
                <rect y="15" width="280" height="8" rx="4" fill="#0EA5E9" />
            </g>
            <g transform="translate(20, 140)">
                <text y="0" fill="#BAE6FD" font-size="14">风机 F2 频率：</text>
                <text x="240" y="0" fill="#0EA5E9" font-size="18" font-weight="bold">42.5 Hz</text>
                <rect y="15" width="320" height="8" rx="4" fill="#0F172A" />
                <rect y="15" width="260" height="8" rx="4" fill="#0EA5E9" />
            </g>
            <g transform="translate(20, 210)">
                <text y="0" fill="#BAE6FD" font-size="14">溶解氧 DO：</text>
                <text x="240" y="0" fill="#10B981" font-size="24" font-weight="bold">6.5 <tspan font-size="12">mg/L</tspan></text>
            </g>
        </g>
    </g>

    <!-- 第四列：加药与外排 -->
    <g id="Col_4" transform="translate(1180, 100)">
        <!-- 加药系统 -->
        <g transform="translate(0, 0)">
            <rect width="380" height="240" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" />
            <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">加药系统状态</text>
            <g transform="translate(20, 70)">
                <text y="0" fill="#475569" font-size="13">加药桶 1：</text> <text x="100" y="0" fill="#10B981" font-size="13">药量充足</text>
                <text y="35" fill="#475569" font-size="13">加药桶 2：</text> <text x="100" y="35" fill="#F59E0B" font-size="13">药量不足 (12%)</text>
                <text y="70" fill="#475569" font-size="13">加药桶 3：</text> <text x="100" y="70" fill="#10B981" font-size="13">药量充足</text>
                <line x1="0" y1="100" x2="340" y2="100" stroke="#475569" stroke-width="0.5" />
                <text y="130" fill="#475569" font-size="13">加药泵运行：</text> <text x="100" y="130" fill="#10B981" font-size="13">正常 (2.4 m³/h)</text>
            </g>
        </g>

        <!-- 外排流量 -->
        <g transform="translate(0, 260)">
            <rect width="380" height="130" rx="8" fill="rgba(14, 165, 233, 0.1)" stroke="#0EA5E9" />
            <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">末端外排瞬时流量</text>
            <text x="20" y="90" fill="#0EA5E9" font-size="42" font-weight="bold">124.5 <tspan font-size="18">m³/h</tspan></text>
        </g>
        
        <!-- 系统累计 -->
        <g transform="translate(0, 410)">
            <rect width="380" height="130" rx="8" fill="rgba(15, 23, 42, 0.5)" stroke="#475569" />
            <text x="20" y="35" fill="#475569" font-size="16" font-weight="bold">今日处理总量</text>
            <text x="20" y="90" fill="#BAE6FD" font-size="36" font-weight="bold">12,850.4 <tspan font-size="18">m³</tspan></text>
        </g>
    </g>

    <!-- 装饰转角 -->
    <path d="M 10 10 L 40 10 L 10 40 Z" fill="#0EA5E9" opacity="0.4" />
</svg>