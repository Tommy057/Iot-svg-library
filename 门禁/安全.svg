<svg xmlns="http://www.w3.org/2000/svg" width="80" height="100" viewBox="0 0 80 100">
  <!-- 第一步：模拟发光层 (外晕 10% opacity) -->
  <circle cx="40" cy="35" r="30" fill="#0284C7" opacity="0.1"/>
  <!-- 第二步：模拟发光层 (中晕 25% opacity) -->
  <circle cx="40" cy="35" r="22" fill="#0284C7" opacity="0.25"/>
  
  <!-- 第三步：强制白色隔离圈 (确保图标不被底图线条干扰) -->
  <circle cx="40" cy="35" r="16" fill="#FFFFFF"/>
  
  <!-- 第四步：核心状态圆环 -->
  <circle cx="40" cy="35" r="14" fill="#0284C7"/>
  
  <!-- 第五步：内部拟态图标 (门禁 - 锁头感) -->
  <path d="M36 30 V27 A4 4 0 0 1 44 27 V30 M34 30 H46 V42 H34 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- 第六步：底部胶囊标签 (Rack-mount Style) -->
  <!-- 标签底盒 -->
  <rect x="10" y="60" width="60" height="22" rx="11" fill="#1A1A1B"/>
  <!-- 底部加强色条 (与状态同步) -->
  <rect x="25" y="78" width="30" height="2" fill="#0284C7"/>
  
  <!-- 第七步：文本 (HT 运行时通过属性绑定填充) -->
  <text x="40" y="76" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-weight="bold" font-size="12">MJ-025</text>
</svg>