<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- 门扇金属质感 -->
    <linearGradient id="doorLeafGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
  </defs>

  <!-- 1. 底部物理防护 (White Shield) -->
  <circle cx="50" cy="50" r="45" fill="#FFFFFF" shadow="true" />
  <circle cx="50" cy="50" r="38" fill="#0F172A" stroke="#334155" stroke-width="1" />

  <!-- 2. 拟态门框 (Isometric Frame) -->
  <g transform="translate(32, 28)">
    <!-- 门洞深色背景 -->
    <rect x="0" y="0" width="36" height="44" rx="1" fill="#1E293B" />
    <!-- 门框线条 -->
    <path d="M0,44 L0,0 L36,0 L36,44" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.8" />
    
    <!-- 3. 拟态门扇 (透视打开状态) -->
    <!-- 通过 trapezoid 形状模拟门向内旋开的透视感 -->
    <path d="M36,0 L52,-8 L52,36 L36,44 Z" fill="url(#doorLeafGrad)" stroke="#FFFFFF" stroke-width="1" />
    <!-- 门把手微小细节 -->
    <rect x="42" y="18" width="4" height="2" fill="#FFFFFF" opacity="0.6" />
  </g>

  <!-- 4. 宝石光晕：状态核心 -->
  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="12" fill="#10B981" fill-opacity="0.1" filter="url(#glowGreen)" />
    <circle cx="0" cy="0" r="7" fill="#10B981" stroke="#FFFFFF" stroke-width="1.5" />
    <circle cx="-2" cy="-2" r="2" fill="#FFFFFF" opacity="0.6" />
  </g>
</svg>