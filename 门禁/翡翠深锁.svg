<svg width="100" height="130" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 宝石框架渐变：深绿到荧光绿 -->
        <linearGradient id="gem_frame_green" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10B981" />
            <stop offset="50%" stop-color="#059669" />
            <stop offset="100%" stop-color="#064E3B" />
        </linearGradient>
        <!-- 内部能量门芯渐变 -->
        <radialGradient id="door_core_green" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#34D399" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#064E3B" stop-opacity="0.9" />
        </radialGradient>
        <filter id="emerald_glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- 1. 宝石质感大门框 (主形体) -->
    <rect x="15" y="10" width="70" height="100" rx="12" fill="url(#gem_frame_green)" filter="url(#emerald_glow)" stroke="#6EE7B7" stroke-width="1" />

    <!-- 2. 内部嵌入式能量门板 -->
    <rect x="22" y="18" width="56" height="84" rx="6" fill="url(#door_core_green)" stroke="#10B981" stroke-width="0.5" />

    <!-- 3. 顶部玻璃反光 (宝石质感的核心：弧形高光) -->
    <path d="M22 28 Q50 15 78 28" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.3" />
    <path d="M25 22 L40 22" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.2" />

    <!-- 4. 拟物化锁扣/把手 (高亮宝石点) -->
    <circle cx="65" cy="60" r="4" fill="#34D399" filter="url(#emerald_glow)">
        <animate attributeName="r" values="3.5;5;3.5" dur="2s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
    </circle>

    <!-- 5. 底部装饰标签座 (适配 AP 风格的统一感) -->
    <rect x="10" y="115" width="80" height="12" rx="6" fill="rgba(16, 185, 129, 0.2)" />
</svg>