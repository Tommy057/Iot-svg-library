<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 关门状态的冷色金属 -->
    <linearGradient id="doorClosedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="50%" stop-color="#475569" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
  </defs>

  <!-- 1. 底部物理防护 -->
  <circle cx="50" cy="50" r="45" fill="#FFFFFF" />
  <circle cx="50" cy="50" r="38" fill="#0F172A" stroke="#334155" stroke-width="1" />

  <!-- 2. 拟态门体 (完全合拢) -->
  <g transform="translate(32, 28)">
    <!-- 门扇主体 -->
    <rect x="0" y="0" width="36" height="44" rx="2" fill="url(#doorClosedGrad)" stroke="#FFFFFF" stroke-width="1.5" />
    <!-- 门缝线 -->
    <line x1="18" y1="0" x2="18" y2="44" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.4" />
    <!-- 锁孔/读卡器拟态 -->
    <rect x="22" y="20" width="8" height="6" rx="1" fill="#1E293B" stroke="#FFFFFF" stroke-width="0.5" />
  </g>

  <!-- 3. 宝石光晕：状态核心 (石板灰) -->
  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="7" fill="#64748B" stroke="#FFFFFF" stroke-width="1.5" />
    <circle cx="-2" cy="-2" r="2" fill="#FFFFFF" opacity="0.4" />
  </g>
</svg>