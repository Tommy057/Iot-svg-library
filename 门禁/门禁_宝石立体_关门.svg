<svg xmlns="http://www.w3.org/2000/svg" width="100" height="120" viewBox="0 0 100 120">
  <!-- 1. 悬浮底座 (增加 3D 锚点感) -->
  <ellipse cx="50" cy="90" rx="35" ry="15" fill="#0284C7" opacity="0.15"/>
  <ellipse cx="50" cy="90" rx="25" ry="10" fill="#0284C7" opacity="0.3"/>

  <!-- 2. 门板底座支架 (黑金金属感) -->
  <path d="M25 85 L75 85 L80 92 L20 92 Z" fill="#1A1A1B" stroke="#FFFFFF" stroke-width="1"/>

  <!-- 3. 蓝宝石门板 - 侧面 (增加厚度感) -->
  <path d="M62 20 L72 10 L72 70 L62 80 Z" fill="#075985"/>
  
  <!-- 4. 蓝宝石门板 - 顶面 (受光面) -->
  <path d="M30 20 L62 20 L72 10 L40 10 Z" fill="#38BDF8"/>
  
  <!-- 5. 蓝宝石门板 - 正面 (主视面) -->
  <path d="M30 20 L62 20 L62 80 L30 80 Z" fill="#0284C7"/>

  <!-- 6. 宝石内部折射光 (斜切线) -->
  <path d="M30 40 L62 25 L62 35 L30 50 Z" fill="#FFFFFF" opacity="0.15"/>
  <path d="M30 65 L62 50 L62 60 L30 75 Z" fill="#FFFFFF" opacity="0.1"/>

  <!-- 7. 顶部玻璃高光 (月牙) -->
  <rect x="34" y="24" width="24" height="4" rx="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- 8. 闭锁图标 (悬浮在宝石表面) -->
  <rect x="42" y="45" width="8" height="10" rx="1" fill="#FFFFFF" opacity="0.9"/>
  <path d="M43 45 V41 A3 3 0 0 1 49 41 V45" fill="none" stroke="#FFFFFF" stroke-width="2"/>
</svg>