<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gemClosed" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </radialGradient>
  </defs>

  <!-- 1. 定位盘：纯白大底座 -->
  <circle cx="50" cy="50" r="45" fill="#FFFFFF" />
  
  <!-- 2. 黑金核心：Obsidian 基座 -->
  <circle cx="50" cy="50" r="38" fill="#0F172A" stroke="#334155" stroke-width="1" />

  <!-- 3. 摆门拟态：完全闭合状态 -->
  <g transform="translate(50, 50)">
    <!-- 门框 -->
    <path d="M-28,0 L28,0" stroke="#334155" stroke-width="8" stroke-linecap="round" />
    <!-- 锁定的门芯 -->
    <path d="M-25,0 L25,0" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" />
    <!-- 锁定标识 -->
    <rect x="-4" y="-12" width="8" height="6" rx="1" fill="#475569" />
  </g>

  <!-- 4. 宝石光晕：中心状态点 (石板灰) -->
  <circle cx="50" cy="50" r="9" fill="url(#gemClosed)" stroke="#FFFFFF" stroke-width="1.5" />
  <circle cx="47" cy="47" r="2.5" fill="#FFFFFF" fill-opacity="0.3" />
</svg>