<svg width="120" height="150" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="frame_emerald" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#065F46" />
            <stop offset="20%" stop-color="#10B981" />
            <stop offset="80%" stop-color="#059669" />
            <stop offset="100%" stop-color="#064E3B" />
        </linearGradient>
        
        <radialGradient id="door_face_green" cx="50%" cy="40%" r="80%">
            <stop offset="0%" stop-color="#34D399" />
            <stop offset="100%" stop-color="#064E3B" />
        </radialGradient>

        <filter id="emerald_glow_heavy" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- 1. 3D 倒角门框 -->
    <rect x="15" y="15" width="90" height="120" rx="8" fill="#064E3B" stroke="url(#frame_emerald)" stroke-width="6" filter="url(#emerald_glow_heavy)" />

    <!-- 2. 内嵌式宝石门板 -->
    <rect x="24" y="24" width="72" height="102" rx="4" fill="url(#door_face_green)" stroke="#6EE7B7" stroke-width="0.5" />

    <!-- 3. 宝石折射高光 -->
    <!-- 顶部主高光 -->
    <path d="M30 40 Q60 20 90 40" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.2" />
    <!-- 底部反光 -->
    <path d="M40 115 L80 115" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.1" />

    <!-- 4. 拟物化锁具 -->
    <rect x="82" y="65" width="4" height="12" rx="2" fill="white" opacity="0.7" filter="url(#emerald_glow_heavy)" />

    <!-- 5. 底部装饰 -->
    <rect x="20" y="140" width="80" height="4" rx="2" fill="#10B981" opacity="0.5" />
</svg>