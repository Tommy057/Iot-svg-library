<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="shadowBlurOpen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
    </filter>
    <filter id="neonGlowAmber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="metalGradOpen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748B" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="clayBodyAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#9A3412" />
    </linearGradient>
    <linearGradient id="clayBevelAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#431407" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <!-- 告警态逆向急促旋转 HUD -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="15 8 2 8" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="6s" repeatCount="indefinite" />
  </circle>

  <!-- 毛玻璃基座 -->
  <rect x="18" y="18" width="64" height="64" rx="16" fill="#1E293B" fill-opacity="0.7" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.5" />
  
  <line x1="18" y1="20" x2="82" y2="20" stroke="#F59E0B" stroke-width="1.5" opacity="0.4">
    <animate attributeName="y1" values="20;80;20" dur="3s" repeatCount="indefinite" />
    <animate attributeName="y2" values="20;80;20" dur="3s" repeatCount="indefinite" />
  </line>

  <!-- 锁扣部分 (Shackle) - 弹起断开态 (向上偏移，右侧短截) -->
  <!-- 阴影 -->
  <path d="M 34 50 V 26 A 16 16 0 0 1 66 26 V 32" fill="none" stroke="#020617" stroke-width="10" stroke-linecap="round" filter="url(#shadowBlurOpen)" opacity="0.8" transform="translate(0, 3)" />
  <!-- 金属实体 -->
  <path d="M 34 50 V 26 A 16 16 0 0 1 66 26 V 32" fill="none" stroke="url(#metalGradOpen)" stroke-width="10" stroke-linecap="round" />
  <!-- 金属高光 -->
  <path d="M 34 50 V 26 A 16 16 0 0 1 66 26 V 32" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="translate(-1, -1)" />

  <!-- 锁体部分 (Claymorphism Body) -->
  <rect x="23" y="48" width="54" height="38" rx="12" fill="#431407" filter="url(#shadowBlurOpen)" opacity="0.9" />
  <rect x="23" y="44" width="54" height="38" rx="12" fill="url(#clayBodyAmber)" />
  <rect x="23" y="44" width="54" height="38" rx="12" fill="none" stroke="url(#clayBevelAmber)" stroke-width="2.5" />

  <!-- 告警态指示灯 (急促呼吸) -->
  <rect x="44" y="55" width="12" height="16" rx="6" fill="#FDE68A" filter="url(#neonGlowAmber)">
    <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1s" repeatCount="indefinite" />
  </rect>
  <circle cx="50" cy="59" r="2" fill="#78350F" />
  <rect x="49" y="64" width="2" height="4" fill="#78350F" /> <!-- 惊叹号下方的点，强化告警视觉 -->

  <!-- 外围边角定位器 (转为琥珀橙告警色) -->
  <path d="M 12 24 V 12 H 24" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.8" />
  <path d="M 88 24 V 12 H 76" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.8" />
  <path d="M 12 76 V 88 H 24" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.8" />
  <path d="M 88 76 V 88 H 76" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.8" />
</svg>