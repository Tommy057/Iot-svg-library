<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- 门框空腔 (深色背景，表示门已打开) -->
  <rect x="18" y="14" width="44" height="68" rx="4" fill="#FFFFFF"/>
  <rect x="20" y="16" width="40" height="64" rx="3" fill="#1A1A1B"/>
  
  <!-- 祖母绿宝石门板 (采用透视 Path 绘制，模拟向右前方开启) -->
  <!-- 坐标点经过计算，模拟 45 度摆开感 -->
  <path d="M24 20 L40 10 L40 86 L24 76 Z" fill="#10B981"/>
  
  <!-- 宝石折射层 (透视面侧影) -->
  <path d="M24 48 L40 43 L40 86 L24 76 Z" fill="#000000" opacity="0.15"/>
  
  <!-- 开门状态月牙高光 (跟随透视角度) -->
  <path d="M26 19 L38 12 L38 18 L26 24 Z" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- 通行指示光晕 (位于门框中心) -->
  <circle cx="40" cy="48" r="8" fill="#10B981" opacity="0.3"/>
  <path d="M36 48 L39 51 L45 45" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>

  <!-- 底部胶囊标签座 (移至中心) -->
  <rect x="30" y="85" width="60" height="15" rx="7.5" fill="#1A1A1B"/>
  <text x="60" y="96" text-anchor="middle" fill="#10B981" font-family="Arial" font-weight="bold" font-size="10">OPENED</text>
</svg>