<svg width="100" height="120" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow_alarm" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- 底部坐标强排斥波纹 -->
    <circle cx="50" cy="118" r="5" fill="none" stroke="#EF4444" stroke-width="2">
        <animate attributeName="r" values="2;20" dur="1s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="50" cy="118" r="2" fill="#EF4444" filter="url(#glow_alarm)" />

    <!-- 底部全息引脚 -->
    <path d="M50 118 L40 90 L60 90 Z" fill="#EF4444" opacity="0.6">
        <animate attributeName="fill" values="#EF4444;#F59E0B;#EF4444" dur="0.5s" repeatCount="indefinite" />
    </path>

    <!-- 毛玻璃悬浮面板 (报警脉冲) -->
    <rect x="10" y="5" width="80" height="85" rx="12" fill="rgba(30, 41, 59, 0.9)" stroke="#EF4444" stroke-width="2" filter="url(#glow_alarm)">
        <animate attributeName="stroke-width" values="1;3;1" dur="0.5s" repeatCount="indefinite" />
        <animate attributeName="stroke" values="#EF4444;#F59E0B;#EF4444" dur="0.5s" repeatCount="indefinite" />
    </rect>
    
    <!-- 3D 拟物感门禁图标 (透视开启) -->
    <g transform="translate(30, 20)">
        <!-- 门框 -->
        <rect x="5" y="5" width="30" height="50" rx="2" fill="none" stroke="#F59E0B" stroke-width="3" opacity="0.4" />
        <!-- 门板 - 开启形态 (利用 skew/transform 模拟透视) -->
        <path d="M5 5 L25 0 L25 45 L5 50 Z" fill="#EF4444" transform="translate(5, 5)">
            <animateTransform attributeName="transform" type="skewY" values="0;-10;0" dur="1s" repeatCount="indefinite" additive="sum" />
        </path>
    </g>

    <!-- 侧边警告标识 -->
    <circle cx="15" cy="12" r="3" fill="#EF4444">
        <animate attributeName="opacity" values="0;1;0" dur="0.4s" repeatCount="indefinite" />
    </circle>
</svg>