<svg width="120" height="150" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad_amber_frame" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F59E0B" />
            <stop offset="50%" stop-color="#B45309" />
            <stop offset="100%" stop-color="#451A03" />
        </linearGradient>
        <radialGradient id="grad_amber_void" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FEF3C7" />
            <stop offset="100%" stop-color="#78350F" />
        </radialGradient>
        <filter id="glow_amber" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- 3D 门框 -->
    <rect x="15" y="15" width="90" height="120" rx="8" fill="#451A03" stroke="url(#grad_amber_frame)" stroke-width="6" filter="url(#glow_amber)" />
    <!-- 门洞内光 -->
    <rect x="21" y="21" width="78" height="108" rx="4" fill="url(#grad_amber_void)" />
    <!-- 3D 旋转门板 -->
    <g transform="translate(21, 21)">
        <path d="M55 5 L68 0 L68 108 L55 103 Z" fill="#92400E" /> <!-- 厚度面 -->
        <path d="M0 0 L55 5 L55 103 L0 108 Z" fill="#F59E0B" stroke="#FDE68A" stroke-width="1" />
        <path d="M5 25 Q27 18 50 25" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4" />
    </g>
</svg>