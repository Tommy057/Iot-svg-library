<svg xmlns="http://www.w3.org/2000/svg" width="100" height="120" viewBox="0 0 100 120">
  <!-- 1. 开启后的扩散光晕 (祖母绿) -->
  <ellipse cx="50" cy="90" rx="40" ry="18" fill="#10B981" opacity="0.2"/>
  
  <!-- 2. 门框遗留阴影 (表示门已移位) -->
  <path d="M30 20 L40 10 L40 70 L30 80 Z" fill="#1A1A1B" opacity="0.5"/>

  <!-- 3. 旋转推开的门板 - 侧面 (厚度) -->
  <!-- 门板向右前方旋转，侧面变得可见 -->
  <path d="M75 25 L85 15 L85 75 L75 85 Z" fill="#065F46"/>
  
  <!-- 4. 旋转推开的门板 - 顶面 -->
  <path d="M45 35 L75 25 L85 15 L55 25 Z" fill="#34D399"/>
  
  <!-- 5. 旋转推开的门板 - 正面 -->
  <!-- 通过梯形模拟旋转透视 -->
  <path d="M45 35 L75 25 L75 85 L45 95 Z" fill="#10B981"/>

  <!-- 6. 宝石内部折射 (跟随旋转角度) -->
  <path d="M45 55 L75 45 L75 55 L45 65 Z" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- 7. 门板正面高光 -->
  <path d="M48 38 L65 33 L65 38 L48 43 Z" fill="#FFFFFF" opacity="0.4"/>

  <!-- 8. 通行状态符号 (亮绿色勾号) -->
  <path d="M55 55 L60 60 L70 50" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>