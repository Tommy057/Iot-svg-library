  <!-- 主体外壳 -->
  <circle cx="32" cy="32" r="28" fill="#1A1A1B"/>
  
  <!-- 门框 - 绝对坐标定位 -->
  <rect x="20" y="16" width="24" height="32" fill="#2D2D2E" rx="2"/>
  
  <!-- 门板 - 锁定蓝 -->
