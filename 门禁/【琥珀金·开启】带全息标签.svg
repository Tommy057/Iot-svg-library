<svg width="120" height="180" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow_amber" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <radialGradient id="grad_void_amber" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FEF3C7" />
            <stop offset="100%" stop-color="#78350F" />
        </radialGradient>
    </defs>

    <!-- 1. 顶部全息标签柜 -->
    <g transform="translate(10, 5)">
        <rect x="0" y="0" width="100" height="35" rx="4" fill="rgba(180, 83, 9, 0.3)" stroke="#F59E0B" stroke-width="1" />
        <path d="M0 10 L0 0 L10 0 M90 0 L100 0 L100 10 M100 25 L100 35 L90 35 M10 35 L0 35 L0 25" fill="none" stroke="#FDE68A" stroke-width="2" />
        <text x="50" y="24" font-family="Arial-BoldMT, Arial" font-size="16" font-weight="bold" fill="#FDE68A" text-anchor="middle" filter="url(#glow_amber)">MJ001</text>
    </g>

    <!-- 2. 3D 琥珀门开启 -->
    <g transform="translate(0, 45)">
        <rect x="15" y="15" width="90" height="110" rx="8" fill="#451A03" stroke="#F59E0B" stroke-width="5" filter="url(#glow_amber)" />
        <rect x="21" y="21" width="78" height="98" rx="4" fill="url(#grad_void_amber)" />
        <g transform="translate(21, 21)">
            <path d="M55 5 L68 0 L68 98 L55 93 Z" fill="#92400E" />
            <path d="M0 0 L55 5 L55 93 L0 98 Z" fill="#F59E0B" stroke="#FDE68A" stroke-width="1" />
        </g>
    </g>
</svg>