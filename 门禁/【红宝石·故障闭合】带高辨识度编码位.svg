<svg width="120" height="180" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. 编码标签区 (故障态) -->
    <g transform="translate(10, 5)">
        <rect x="0" y="0" width="100" height="38" rx="6" fill="#450A0A" stroke="#EF4444" stroke-width="2">
            <animate attributeName="stroke-opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite" />
        </rect>
        <rect x="2" y="2" width="4" height="34" rx="2" fill="#EF4444" />
        <text x="55" y="25" font-family="Arial-Bold" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">MJ001</text>
    </g>

    <!-- 2. 3D 红宝石门 -->
    <g transform="translate(0, 50)">
        <rect x="15" y="10" width="90" height="110" rx="10" fill="#450A0A" stroke="#EF4444" stroke-width="6" />
        <rect x="24" y="18" width="72" height="94" rx="4" fill="#991B1B" />
        <!-- 故障感叹号 -->
        <path d="M60 40 L60 70 M60 80 L60 82" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.8">
            <animate attributeName="opacity" values="1;0.2;1" dur="0.4s" repeatCount="indefinite" />
        </path>
    </g>
</svg>