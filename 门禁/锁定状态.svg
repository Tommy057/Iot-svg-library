<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- 毛玻璃与发光滤镜 -->
    <filter id="shadowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
    </filter>
    <filter id="neonGlowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 3D 拟物渐变材质 -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748B" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="clayBodyGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="clayBevelGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A7F3D0" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#022C22" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <!-- 底层全息环绕 HUD -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#10B981" stroke-width="1" stroke-dasharray="12 6 3 6" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="12s" repeatCount="indefinite" />
  </circle>

  <!-- 毛玻璃质感基座 (深空规范 rgba(30,41,59,0.7)) -->
  <rect x="18" y="18" width="64" height="64" rx="16" fill="#1E293B" fill-opacity="0.7" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.3" />
  
  <!-- 全息动态扫描线 -->
  <line x1="18" y1="20" x2="82" y2="20" stroke="#10B981" stroke-width="1.5" opacity="0.3">
    <animate attributeName="y1" values="20;80;20" dur="5s" repeatCount="indefinite" />
    <animate attributeName="y2" values="20;80;20" dur="5s" repeatCount="indefinite" />
  </line>

  <!-- 锁扣部分 (Shackle) - 闭合态 -->
  <!-- 锁扣阴影 -->
  <path d="M 34 50 V 36 A 16 16 0 0 1 66 36 V 50" fill="none" stroke="#020617" stroke-width="10" stroke-linecap="round" filter="url(#shadowBlur)" opacity="0.8" transform="translate(0, 3)" />
  <!-- 锁扣金属实体 -->
  <path d="M 34 50 V 36 A 16 16 0 0 1 66 36 V 50" fill="none" stroke="url(#metalGrad)" stroke-width="10" stroke-linecap="round" />
  <!-- 锁扣高光边缘 (增强 3D 感) -->
  <path d="M 34 50 V 36 A 16 16 0 0 1 66 36 V 50" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.7" transform="translate(-1, -1)" />

  <!-- 锁体部分 (Claymorphism Body) -->
  <!-- 锁体底部弥散阴影 -->
  <rect x="23" y="48" width="54" height="38" rx="12" fill="#022C22" filter="url(#shadowBlur)" opacity="0.9" />
  <!-- 锁体主材质 -->
  <rect x="23" y="44" width="54" height="38" rx="12" fill="url(#clayBodyGreen)" />
  <!-- 锁体内部 3D 倒角高光与暗部 (Clay 核心表现) -->
  <rect x="23" y="44" width="54" height="38" rx="12" fill="none" stroke="url(#clayBevelGreen)" stroke-width="2.5" />

  <!-- 中央生物/机械状态指示灯 -->
  <rect x="44" y="55" width="12" height="16" rx="6" fill="#A7F3D0" filter="url(#neonGlowGreen)">
    <animate attributeName="opacity" values="0.4; 1; 0.4" dur="2.5s" repeatCount="indefinite" />
  </rect>
  <circle cx="50" cy="59" r="2" fill="#064E3B" />

  <!-- 外围科幻边角定位器 HUD -->
  <path d="M 12 24 V 12 H 24" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6" />
  <path d="M 88 24 V 12 H 76" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6" />
  <path d="M 12 76 V 88 H 24" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6" />
  <path d="M 88 76 V 88 H 76" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6" />
</svg>