<svg width="100" height="130" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 红宝石框架渐变 -->
        <linearGradient id="gem_frame_red" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#EF4444" />
            <stop offset="50%" stop-color="#B91C1C" />
            <stop offset="100%" stop-color="#7F1D1D" />
        </linearGradient>
        <filter id="ruby_glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- 1. 告警宝石门框 (闪烁动效) -->
    <rect x="15" y="10" width="70" height="100" rx="12" fill="url(#gem_frame_red)" filter="url(#ruby_glow)" stroke="#FCA5A5" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite" />
        <animate attributeName="stroke-width" values="1.5;3;1.5" dur="0.8s" repeatCount="indefinite" />
    </rect>

    <!-- 2. 背景溢出的告警光芒 (门后的光) -->
    <rect x="22" y="18" width="56" height="84" rx="4" fill="#F59E0B" opacity="0.3">
        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="1s" repeatCount="indefinite" />
    </rect>

    <!-- 3. 3D 侧旋开启的门板 (宝石切割质感) -->
    <path d="M22 18 L45 22 L45 98 L22 102 Z" fill="#7F1D1D" stroke="#EF4444" stroke-width="1" opacity="0.9">
        <animateTransform attributeName="transform" type="translate" values="0 0; 3 0; 0 0" dur="1.5s" repeatCount="indefinite" />
    </path>

    <!-- 4. 顶部玻璃反光 -->
    <path d="M22 28 Q50 15 78 28" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4" />

    <!-- 5. 告警感叹号 (悬浮在门洞中) -->
    <g transform="translate(60, 45)" filter="url(#ruby_glow)">
        <rect x="0" y="0" width="4" height="16" rx="2" fill="white">
            <animate attributeName="fill" values="#FFFFFF;#F59E0B;#FFFFFF" dur="0.6s" repeatCount="indefinite" />
        </rect>
        <circle cx="2" cy="22" r="2.5" fill="white" />
    </g>

    <!-- 6. 底部警告纹 -->
    <path d="M20 120 Q50 110 80 120" fill="none" stroke="#EF4444" stroke-width="2" opacity="0.6">
        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" />
    </path>
</svg>