<svg xmlns="http://www.w3.org/2000/svg" width="80" height="100" viewBox="0 0 80 100">
  <!-- 底部实体投影 (Solid Offset Shadow) -->
  <rect x="22" y="22" width="40" height="60" rx="2" fill="#000000" opacity="0.2"/>
  
  <!-- 2px 强制白色隔离底座 (确保在 CAD 线条上清晰) -->
  <rect x="18" y="14" width="44" height="68" rx="4" fill="#FFFFFF"/>
  
  <!-- 金属门框 (黑金质感) -->
  <rect x="20" y="16" width="40" height="64" rx="3" fill="#1A1A1B"/>
  
  <!-- 蓝宝石门板核心 -->
  <rect x="24" y="20" width="32" height="56" rx="1" fill="#0284C7"/>
  
  <!-- 宝石折射层 (下半部暗调) -->
  <path d="M24 48 L56 48 L56 76 L24 76 Z" fill="#000000" opacity="0.15"/>
  
  <!-- 晶体月牙高光 (顶部玻璃感) -->
  <path d="M26 22 L54 22 A2 2 0 0 1 54 26 L26 26 A2 2 0 0 1 26 22" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- 拟态把手/锁具 (发光点) -->
  <rect x="48" y="44" width="4" height="8" rx="1" fill="#FFFFFF" opacity="0.8"/>
  <rect x="48" y="44" width="4" height="8" rx="1" fill="#00F2FF" opacity="0.4"/>

  <!-- 底部胶囊标签座 -->
  <rect x="10" y="85" width="60" height="15" rx="7.5" fill="#1A1A1B"/>
  <text x="40" y="96" text-anchor="middle" fill="#FFFFFF" font-family="Arial" font-weight="bold" font-size="10">LOCKED</text>
</svg>