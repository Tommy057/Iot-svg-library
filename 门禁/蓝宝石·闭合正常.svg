<svg width="120" height="150" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="grad_sapphire_frame" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="50%" stop-color="#1E40AF" />
            <stop offset="100%" stop-color="#172554" />
        </linearGradient>
        <radialGradient id="grad_sapphire_door" cx="50%" cy="40%" r="80%">
            <stop offset="0%" stop-color="#60A5FA" />
            <stop offset="100%" stop-color="#1E3A8A" />
        </radialGradient>
        <filter id="glow_sapphire" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- 3D 门框 -->
    <rect x="15" y="15" width="90" height="120" rx="8" fill="#172554" stroke="url(#grad_sapphire_frame)" stroke-width="6" filter="url(#glow_sapphire)" />
    <!-- 闭合门板 -->
    <rect x="24" y="24" width="72" height="102" rx="4" fill="url(#grad_sapphire_door)" stroke="#93C5FD" stroke-width="0.5" />
    <!-- 晶钻高光 -->
    <path d="M30 40 Q60 20 90 40" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.2" />
    <!-- 锁具 -->
    <rect x="80" y="65" width="4" height="12" rx="2" fill="#0EA5E9" />
</svg>