<svg width="100" height="120" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon_red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 3D 门框 (保持不动) -->
  <rect x="10" y="10" width="80" height="100" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#EF4444" stroke-width="2" filter="url(#neon_red)">
    <animate attributeName="stroke" values="#EF4444;#F59E0B;#EF4444" dur="0.5s" repeatCount="indefinite" />
  </rect>

  <!-- 内部警告背景：从门缝溢出的光亮 -->
  <rect x="20" y="20" width="60" height="80" fill="#EF4444" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="0.8s" repeatCount="indefinite" />
  </rect>

  <!-- 3D 开启态门板 (利用透视路径) -->
  <!-- 门板由于开启，在 2D 视角下呈现为梯形/斜切 -->
  <path d="M20 20 L45 25 L45 95 L20 100 Z" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="2 0" dur="0.5s" repeatCount="indefinite" autoreverse="true" />
  </path>

  <!-- 警告标志 (惊叹号) -->
  <g transform="translate(60, 45)" filter="url(#neon_red)">
    <path d="M0 0 L0 15 M0 20 L0 22" stroke="#EF4444" stroke-width="4" stroke-linecap="round">
        <animate attributeName="opacity" values="1;0.3;1" dur="0.4s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- 底部溢出波纹 -->
  <ellipse cx="50" cy="110" rx="10" ry="4" fill="none" stroke="#EF4444">
    <animate attributeName="rx" values="10;40" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite" />
  </ellipse>
</svg>