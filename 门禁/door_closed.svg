<svg width="100" height="120" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹发光滤镜 -->
    <filter id="neon_green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- 3D 渐变：模拟金属板厚度 -->
    <linearGradient id="plate_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- 3D 门框外壳 -->
  <rect x="10" y="10" width="80" height="100" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="2" filter="url(#neon_green)" />
  
  <!-- 内嵌门板 (3D 倒角效果) -->
  <rect x="20" y="20" width="60" height="80" rx="4" fill="url(#plate_grad)" stroke="#10B981" stroke-width="0.5" opacity="0.8" />

  <!-- 拟物感把手 -->
  <rect x="65" y="55" width="4" height="15" rx="2" fill="#10B981" />

  <!-- 全息能量装饰线 -->
  <g opacity="0.6">
    <line x1="25" y1="35" x2="75" y2="35" stroke="#10B981" stroke-width="1" />
    <line x1="25" y1="45" x2="75" y2="45" stroke="#10B981" stroke-width="1" />
    <line x1="25" y1="75" x2="75" y2="75" stroke="#10B981" stroke-width="1" />
  </g>

  <!-- 动态全息扫描线 -->
  <rect x="20" y="20" width="60" height="2" fill="#10B981" opacity="0.8">
    <animate attributeName="y" values="20;100;20" dur="3s" repeatCount="indefinite" />
  </rect>
</svg>