<svg width="120" height="180" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="grad_sensor_red" cx="50%" cy="40%" r="80%">
            <stop offset="0%" stop-color="#F87171" />
            <stop offset="100%" stop-color="#7F1D1D" />
        </radialGradient>
        <filter id="glow_red" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- 1. 顶部标签位 (报警红) -->
    <g transform="translate(10, 5)">
        <rect x="0" y="0" width="100" height="35" rx="6" fill="#450A0A" stroke="#EF4444" stroke-width="2">
            <animate attributeName="stroke-opacity" values="1;0.3;1" dur="0.4s" repeatCount="indefinite" />
        </rect>
        <text x="50" y="24" font-family="Arial-Bold" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">INTRUSION</text>
    </g>

    <!-- 2. 3D 报警探测器 -->
    <g transform="translate(0, 45)">
        <!-- 扩散警报波纹 (灵魂动效) -->
        <circle cx="60" cy="55" r="30" fill="none" stroke="#EF4444" stroke-width="2">
            <animate attributeName="r" values="30;70" dur="1s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.8;0" dur="1s" repeatCount="indefinite" />
        </circle>

        <!-- 探测器主体 -->
        <rect x="25" y="10" width="70" height="90" rx="35" fill="#450A0A" stroke="#EF4444" stroke-width="5" filter="url(#glow_red)">
            <animate attributeName="stroke-width" values="5;8;5" dur="0.4s" repeatCount="indefinite" />
        </rect>
        <!-- 宝石内芯 -->
        <rect x="35" y="20" width="50" height="70" rx="25" fill="url(#grad_sensor_red)">
            <animate attributeName="opacity" values="1;0.6;1" dur="0.4s" repeatCount="indefinite" />
        </rect>

        <!-- 3D 玻璃高光 -->
        <path d="M40 35 Q60 15 80 35" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.4" />
        
        <!-- 报警感叹号 -->
        <path d="M60 40 L60 65 M60 75 L60 77" stroke="white" stroke-width="6" stroke-linecap="round">
            <animate attributeName="opacity" values="1;0.2;1" dur="0.4s" repeatCount="indefinite" />
        </path>
    </g>
</svg>