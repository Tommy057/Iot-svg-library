<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. 背景层 -->
    <rect width="1920" height="1080" fill="#F8FAFC" />
    
    <defs>
        <filter id="soft_shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" />
            <feOffset dx="0" dy="2" result="offsetBlur" />
            <feFlood flood-color="rgba(0, 0, 0, 0.05)" />
            <feComposite in2="offsetBlur" operator="in" />
            <feComposite in="SourceGraphic" operator="over" />
        </filter>
        <!-- 晶钻渐变 -->
        <radialGradient id="lg_gem_green" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#6EE7B7" />
            <stop offset="100%" stop-color="#059669" />
        </radialGradient>
        <radialGradient id="lg_gem_red" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#FB7185" />
            <stop offset="100%" stop-color="#E11D48" />
        </radialGradient>
    </defs>

    <!-- 2. 顶部看板区域 (4个大型指标卡) -->
    <g transform="translate(60, 40)">
        <!-- 指标1：总数 -->
        <g transform="translate(0, 0)">
            <rect width="420" height="120" rx="8" fill="#EFF6FF" filter="url(#soft_shadow)" />
            <rect x="412" y="0" width="8" height="120" fill="#3B82F6" rx="0 8 8 0" />
            <text x="30" y="40" font-family="Arial" font-size="14" fill="#64748B">设备总数</text>
            <text x="30" y="90" font-family="Arial Black" font-size="48" fill="#3B82F6">60</text>
        </g>
        <!-- 指标2：已布防 -->
        <g transform="translate(450, 0)">
            <rect width="420" height="120" rx="8" fill="#F0FDF4" filter="url(#soft_shadow)" />
            <rect x="412" y="0" width="8" height="120" fill="#10B981" rx="0 8 8 0" />
            <text x="30" y="40" font-family="Arial" font-size="14" fill="#64748B">布防中/空闲</text>
            <text x="30" y="90" font-family="Arial Black" font-size="48" fill="#10B981">58</text>
        </g>
        <!-- 指标3：离线 -->
        <g transform="translate(900, 0)">
            <rect width="420" height="120" rx="8" fill="#FFF1F2" filter="url(#soft_shadow)" />
            <rect x="412" y="0" width="8" height="120" fill="#F43F5E" rx="0 8 8 0" />
            <text x="30" y="40" font-family="Arial" font-size="14" fill="#64748B">离线数量</text>
            <text x="30" y="90" font-family="Arial Black" font-size="48" fill="#F43F5E">0</text>
        </g>
        <!-- 指标4：实时报警 -->
        <g transform="translate(1350, 0)">
            <rect width="420" height="120" rx="8" fill="#FEF3C7" filter="url(#soft_shadow)" />
            <rect x="412" y="0" width="8" height="120" fill="#F59E0B" rx="0 8 8 0" />
            <text x="30" y="40" font-family="Arial" font-size="14" fill="#64748B">正在报警/任务</text>
            <text x="30" y="90" font-family="Arial Black" font-size="48" fill="#F59E0B">02</text>
        </g>
    </g>

    <!-- 3. 分割标题 -->
    <text x="60" y="210" font-family="Arial-Bold" font-size="20" fill="#1E293B" font-weight="bold">终端实时状态 (入侵探测)</text>

    <!-- 4. 卡片矩阵区 (展示 5 列示例) -->
    <g transform="translate(60, 240)">
        <!-- 卡片 01 - 正常 -->
        <g transform="translate(0, 0)">
            <rect width="345" height="180" rx="12" fill="white" stroke="#D1FAE5" stroke-width="2" />
            <text x="20" y="35" font-family="Arial-Bold" font-size="16" fill="#1E293B" font-weight="bold">一楼大厅东侧防区</text>
            <text x="20" y="60" font-family="Arial" font-size="12" fill="#64748B">ID: SN-AJ001</text>
            <!-- 状态灯 -->
            <circle cx="280" cy="55" r="5" fill="#10B981" />
            <text x="290" y="59" font-family="Arial" font-size="12" fill="#10B981">● 监控中</text>
            
            <!-- 缩小版晶钻图标 -->
            <circle cx="60" cy="120" r="30" fill="url(#lg_gem_green)" />
            <path d="M45 105 Q60 90 75 105" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4" />
            
            <!-- 按钮 -->
            <rect x="230" y="125" width="90" height="30" rx="15" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1" />
            <text x="275" y="145" font-family="Arial" font-size="12" fill="#3B82F6" text-anchor="middle">详情设置</text>
        </g>

        <!-- 卡片 03 - 报警 -->
        <g transform="translate(730, 0)">
            <rect width="345" height="180" rx="12" fill="white" stroke="#FECACA" stroke-width="2" />
            <text x="20" y="35" font-family="Arial-Bold" font-size="16" fill="#E11D48" font-weight="bold">地下仓库B2区</text>
            <text x="20" y="60" font-family="Arial" font-size="12" fill="#64748B">ID: SN-AJ003</text>
            <!-- 状态灯 (报警) -->
            <text x="280" y="59" font-family="Arial-Bold" font-size="12" fill="#E11D48" text-anchor="end">● 报警中</text>
            
            <!-- 声呐波纹 -->
            <circle cx="60" cy="120" r="30" fill="none" stroke="#E11D48" stroke-width="2">
                <animate attributeName="r" values="30;50" dur="0.8s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="1;0" dur="0.8s" repeatCount="indefinite" />
            </circle>
            <circle cx="60" cy="120" r="30" fill="url(#lg_gem_red)" />
            
            <!-- 报警按钮 -->
            <rect x="230" y="125" width="90" height="30" rx="15" fill="#E11D48" />
            <text x="275" y="145" font-family="Arial-Bold" font-size="12" fill="white" text-anchor="middle">立即处理</text>
        </g>
        
        <!-- 自动平铺逻辑 (说明) -->
        <text x="900" y="600" font-family="Arial" font-size="18" fill="#94A3B8" text-anchor="middle">—— 矩阵延伸：5 x 12 布局加载 60 个防区 ——</text>
    </g>
</svg>