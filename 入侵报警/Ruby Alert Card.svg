<svg width="260" height="320" viewBox="0 0 260 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="gem_red" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#FB7185" />
            <stop offset="100%" stop-color="#E11D48" />
        </radialGradient>
        <filter id="alert_glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" />
            <feColorMatrix type="matrix" values="0 0 0 0 0.88 0 0 0 0 0.11 0 0 0 0 0.28 0 0 0 0.3 0" />
        </filter>
    </defs>

    <!-- 1. 报警脉冲外框 -->
    <rect x="10" y="10" width="240" height="300" rx="16" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.5">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite" />
    </rect>
    
    <!-- 2. 顶部：标题与报警标签 -->
    <text x="25" y="45" font-family="Arial-Bold" font-size="18" fill="#BE123C" font-weight="bold">地下仓库B2区</text>
    <rect x="155" y="28" width="80" height="22" rx="11" fill="#E11D48" />
    <text x="195" y="43" font-family="Arial-Bold" font-size="11" fill="white" text-anchor="middle">非法入侵</text>

    <!-- 3. 中间：声呐波纹与红宝石 -->
    <g transform="translate(130, 125)">
        <!-- 动态声呐圈 -->
        <circle r="40" fill="none" stroke="#E11D48" stroke-width="3">
            <animate attributeName="r" values="40;100" dur="1s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite" />
        </circle>
        
        <g transform="translate(-35, -45)">
            <rect width="70" height="90" rx="35" fill="#450A0A" stroke="#E11D48" stroke-width="4" filter="url(#alert_glow)" />
            <circle cx="35" cy="45" r="30" fill="url(#gem_red)" />
            <text x="35" y="55" font-family="Arial Black" font-size="24" fill="white" text-anchor="middle">!</text>
        </g>
    </g>

    <!-- 4. 底部：编码与紧急处理 -->
    <rect x="25" y="200" width="210" height="30" rx="6" fill="white" opacity="0.5" />
    <text x="35" y="220" font-family="Courier New" font-size="12" fill="#E11D48" font-weight="bold">ALM-ID: SN-AJ003-B2</text>
    
    <!-- 紧急响应按钮 -->
    <g transform="translate(25, 245)">
        <rect width="210" height="40" rx="20" fill="#E11D48">
            <animate attributeName="fill" values="#E11D48;#FB923C;#E11D48" dur="1s" repeatCount="indefinite" />
        </rect>
        <text x="105" y="25" font-family="Arial-Bold" font-size="14" fill="white" text-anchor="middle">立即远程喊话 / 报警</text>
    </g>
</svg>