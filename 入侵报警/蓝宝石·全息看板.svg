<svg width="300" height="360" viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="soft_shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feOffset dx="0" dy="4" result="offset" />
            <feComposite in="SourceGraphic" in2="offset" operator="over" />
        </filter>
        <radialGradient id="gem_emerald" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#6EE7B7" />
            <stop offset="100%" stop-color="#059669" />
        </radialGradient>
    </defs>

    <!-- 1. 磨砂玻璃卡片底座 -->
    <rect x="25" y="25" width="250" height="310" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#soft_shadow)" />
    
    <!-- 2. 四角 HUD 装饰线 (增强饱满度) -->
    <path d="M35 55 L35 35 L55 35 M245 35 L265 35 L265 55 M265 305 L265 325 L245 325 M55 325 L35 325 L35 305" fill="none" stroke="#CBD5E1" stroke-width="2" opacity="0.6" />

    <!-- 3. 顶部：设备名称 (大字体) -->
    <text x="150" y="65" font-family="Arial-Bold" font-size="22" fill="#1E293B" font-weight="bold" text-anchor="middle">一楼大厅东侧防区</text>
    
    <!-- 4. 中部：超大晶钻探测器 -->
    <g transform="translate(105, 95)">
        <!-- 内部装饰网格 -->
        <rect width="90" height="110" rx="45" fill="#F8FAFC" stroke="#F1F5F9" stroke-width="1" />
        <circle cx="45" cy="55" r="40" fill="url(#gem_emerald)" />
        <!-- 高光 -->
        <path d="M25 45 Q45 30 65 45" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.4" />
        <!-- 扫描线 -->
        <line x1="15" y1="50" x2="75" y2="50" stroke="#10B981" stroke-width="2" opacity="0.3">
            <animate attributeName="y1" values="25;85;25" dur="3s" repeatCount="indefinite" />
            <animate attributeName="y2" values="25;85;25" dur="3s" repeatCount="indefinite" />
        </line>
    </g>

    <!-- 5. 底部：状态与编码整合区 -->
    <g transform="translate(45, 230)">
        <!-- 状态胶囊 -->
        <rect x="0" y="0" width="210" height="32" rx="16" fill="#F1F5F9" />
        <circle cx="20" cy="16" r="4" fill="#10B981">
            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
        </circle>
        <text x="35" y="21" font-family="Arial-Bold" font-size="14" fill="#15803D" font-weight="bold">GUARDING | 正常运行</text>
        
        <!-- 编码 -->
        <text x="105" y="60" font-family="Courier New" font-size="13" fill="#94A3B8" text-anchor="middle" font-weight="bold">SN: HIK-ALM-009871</text>
    </g>
</svg>