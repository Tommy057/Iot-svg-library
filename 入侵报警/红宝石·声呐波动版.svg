<svg width="120" height="180" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="grad_ruby" cx="50%" cy="40%" r="80%">
            <stop offset="0%" stop-color="#F87171" />
            <stop offset="100%" stop-color="#7F1D1D" />
        </radialGradient>
        <filter id="glow_ruby_heavy" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5" />
        </filter>
    </defs>

    <!-- 1. 声呐扩散波纹 (重点：这个图层需要绑定 Scale 和 Opacity) -->
    <!-- 提示：在 HT 中设置该层名称为 'ripple' -->
    <circle cx="60" cy="55" r="40" fill="none" stroke="#EF4444" stroke-width="3" opacity="0.5" />

    <!-- 2. 探测器主体 (重点：这个图层绑定 Opacity 实现闪烁) -->
    <g transform="translate(0, 45)">
        <rect x="25" y="10" width="70" height="90" rx="35" fill="#450A0A" stroke="#EF4444" stroke-width="5" filter="url(#glow_ruby_heavy)" />
        <rect x="35" y="20" width="50" height="70" rx="25" fill="url(#grad_ruby)" />
        <!-- 3D 玻璃高光 -->
        <path d="M40 35 Q60 15 80 35" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.4" />
    </g>
</svg>