<svg width="200" height="260" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景磨砂玻璃感 -->
    <linearGradient id="card_bg_safe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.8" />
    </linearGradient>
    <!-- 蓝宝石内芯 -->
    <radialGradient id="gem_blue" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </radialGradient>
    <filter id="neon_blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 卡片外框与底色 -->
  <rect x="5" y="5" width="190" height="250" rx="12" fill="url(#card_bg_safe)" stroke="#3B82F6" stroke-width="1.5" filter="url(#neon_blue)" />
  <path d="M5 25 L5 15 L15 5 M185 5 L195 15 L195 25" fill="none" stroke="#60A5FA" stroke-width="2" />

  <!-- 2. 顶部标题区 -->
  <text x="100" y="35" font-family="Arial-Bold" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">厂房A一楼东侧</text>
  <line x1="20" y1="45" x2="180" y2="45" stroke="#3B82F6" stroke-width="1" opacity="0.3" />

  <!-- 3. 中间探测器图标 (缩放 3D 拟态) -->
  <g transform="translate(65, 65)">
    <rect x="0" y="0" width="70" height="90" rx="35" fill="#0F172A" stroke="#3B82F6" stroke-width="4" filter="url(#neon_blue)" />
    <rect x="10" y="10" width="50" height="70" rx="25" fill="url(#gem_blue)" />
    <!-- 扫描线 -->
    <line x1="10" y1="30" x2="60" y2="30" stroke="#93C5FD" stroke-width="2" opacity="0.5">
      <animate attributeName="y1" values="20;80;20" dur="3s" repeatCount="indefinite" />
      <animate attributeName="y2" values="20;80;20" dur="3s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- 4. 底部信息区 -->
  <rect x="20" y="215" width="160" height="28" rx="14" fill="rgba(59, 130, 246, 0.1)" />
  <text x="100" y="233" font-family="Courier New" font-size="12" fill="#93C5FD" text-anchor="middle">SN: D-09871 [READY]</text>
</svg>