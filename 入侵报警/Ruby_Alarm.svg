<svg width="240" height="300" viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg">
    <!-- 动态发光滤镜 -->
    <defs>
        <filter id="alarm-glow">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- 背景层：全息红框 -->
    <rect x="20" y="20" width="200" height="260" rx="8" fill="rgba(239,68,68,0.1)" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,2">
        <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite" />
    </rect>
    
    <!-- 3D 底部投影面 -->
    <path d="M60 230 L180 230 L200 250 L40 250 Z" fill="#EF4444" opacity="0.3" />

    <!-- 宝石主体 -->
    <g filter="url(#alarm-glow)">
        <!-- 左侧切面 -->
        <path d="M120 70 L60 110 L60 190 L120 230 Z" fill="#EF4444" fill-opacity="0.6" />
        <!-- 右侧切面 -->
        <path d="M120 70 L180 110 L180 190 L120 230 Z" fill="#EF4444" fill-opacity="0.9" />
        <!-- 顶面主视区 -->
        <path d="M120 90 L85 115 L85 185 L120 210 L155 185 L155 115 Z" fill="#F87171">
            <animate attributeName="fill" values="#F87171;#EF4444;#F87171" dur="0.8s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- 弧形玻璃高光 -->
    <path d="M95 105 Q120 85 145 105" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7" />

    <!-- 扩散声呐环动画 -->
    <circle cx="120" cy="240" r="10" fill="none" stroke="#EF4444" stroke-width="2">
        <animate attributeName="r" from="10" to="50" dur="1.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" from="1" to="0" dur="1.5s" repeatCount="indefinite" />
    </circle>

    <!-- 报警文字 -->
    <text x="120" y="50" font-family="Verdana" font-size="12" fill="#FCA5A5" text-anchor="middle" letter-spacing="3">WARNING</text>
    <text x="120" y="275" font-family="Verdana" font-size="14" font-weight="bold" fill="#EF4444" text-anchor="middle">INTRUSION!</text>
</svg>