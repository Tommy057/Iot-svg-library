<svg width="300" height="360" viewBox="0 0 300 360" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="gem_ruby" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#FB7185" />
            <stop offset="100%" stop-color="#E11D48" />
        </radialGradient>
        <filter id="alert_glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" />
            <feColorMatrix type="matrix" values="0 0 0 0 0.88 0 0 0 0 0.11 0 0 0 0 0.28 0 0 0 0.4 0" />
        </filter>
    </defs>

    <!-- 1. 报警脉冲底座 -->
    <rect x="25" y="25" width="250" height="310" rx="16" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.5">
        <animate attributeName="stroke-opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite" />
    </rect>
    
    <!-- 2. 红色 HUD 护角 -->
    <path d="M35 55 L35 35 L55 35 M245 35 L265 35 L265 55 M265 305 L265 325 L245 325 M55 325 L35 325 L35 305" fill="none" stroke="#E11D48" stroke-width="3" />

    <!-- 3. 顶部：标题 (红色告警) -->
    <text x="150" y="65" font-family="Arial-Bold" font-size="22" fill="#BE123C" font-weight="bold" text-anchor="middle">地下仓库B2区</text>
    
    <!-- 4. 中部：声呐红宝石图标 -->
    <g transform="translate(150, 150)">
        <!-- 扩散声呐波纹 -->
        <circle r="40" fill="none" stroke="#E11D48" stroke-width="3">
            <animate attributeName="r" values="40;110" dur="1s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite" />
        </circle>
        
        <g transform="translate(-45, -55)">
            <rect width="90" height="110" rx="45" fill="#450A0A" stroke="#E11D48" stroke-width="4" filter="url(#alert_glow)" />
            <circle cx="45" cy="55" r="40" fill="url(#gem_ruby)" />
            <text x="45" y="68" font-family="Arial Black" font-size="36" fill="white" text-anchor="middle">!</text>
        </g>
    </g>

    <!-- 5. 底部：报警信息 -->
    <g transform="translate(45, 230)">
        <rect x="0" y="0" width="210" height="32" rx="16" fill="#E11D48">
            <animate attributeName="fill" values="#E11D48;#FB923C;#E11D48" dur="0.8s" repeatCount="indefinite" />
        </rect>
        <text x="105" y="21" font-family="Arial Black" font-size="14" fill="white" text-anchor="middle">ALARM: 非法入侵</text>
        
        <!-- 编码 -->
        <text x="105" y="60" font-family="Courier New" font-size="13" fill="#E11D48" text-anchor="middle" font-weight="bold">SN: HIK-ALM-003-B2</text>
    </g>
</svg>