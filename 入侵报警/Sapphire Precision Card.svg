<svg width="260" height="320" viewBox="0 0 260 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 柔和投影 -->
        <filter id="soft_shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feOffset dx="0" dy="4" result="offset" />
            <feComposite in="SourceGraphic" in2="offset" operator="over" />
        </filter>
        <!-- 晶钻翡翠渐变 -->
        <radialGradient id="gem_green" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#6EE7B7" />
            <stop offset="100%" stop-color="#059669" />
        </radialGradient>
    </defs>

    <!-- 1. 卡片外框 (Soft UI) -->
    <rect x="10" y="10" width="240" height="300" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#soft_shadow)" />
    
    <!-- 2. 顶部：标题与状态标签 -->
    <text x="25" y="45" font-family="Arial-Bold" font-size="18" fill="#1E293B" font-weight="bold">一楼大厅东侧</text>
    <!-- 状态胶囊 -->
    <rect x="165" y="28" width="70" height="22" rx="11" fill="#DCFCE7" />
    <text x="200" y="43" font-family="Arial" font-size="11" fill="#15803D" text-anchor="middle">已布防</text>

    <!-- 3. 中间：宝石探测器与全息装饰 -->
    <g transform="translate(30, 70)">
        <!-- 内部装饰网格 -->
        <path d="M20 20 H180 M20 40 H180 M20 60 H180 M20 80 H180" stroke="#F1F5F9" stroke-width="1" />
        <!-- 探测器 3D 拟态 -->
        <g transform="translate(65, 10)">
            <rect width="70" height="90" rx="35" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2" />
            <circle cx="35" cy="45" r="30" fill="url(#gem_green)" />
            <path d="M20 35 Q35 25 50 35" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.4" />
            <!-- 扫描线动画 -->
            <rect x="10" y="30" width="50" height="2" fill="#3B82F6" opacity="0.6">
                <animate attributeName="y" values="20;70;20" dur="3s" repeatCount="indefinite" />
            </rect>
        </g>
    </g>

    <!-- 4. 底部：编码与功能键 -->
    <!-- 编码 HUD -->
    <rect x="25" y="195" width="210" height="30" rx="6" fill="#F1F5F9" />
    <text x="35" y="215" font-family="Courier New" font-size="12" fill="#64748B">SN: HIK-ALM-09871-E1</text>
    
    <!-- 按钮组 -->
    <g transform="translate(25, 245)">
        <!-- 按钮 1：监控 -->
        <rect width="100" height="36" rx="18" fill="#3B82F6" />
        <text x="50" y="23" font-family="Arial-Bold" font-size="13" fill="white" text-anchor="middle">查看视频</text>
        
        <!-- 按钮 2：设置 -->
        <rect x="110" width="100" height="36" rx="18" fill="white" stroke="#CBD5E1" stroke-width="1" />
        <text x="160" y="23" font-family="Arial" font-size="13" fill="#64748B" text-anchor="middle">详情设置</text>
    </g>
</svg>