<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. 基础环境定义 -->
    <defs>
        <!-- 背景网格 -->
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(14, 165, 233, 0.05)" stroke-width="1"/>
        </pattern>

        <!-- 毛玻璃 + 拟物化阴影 -->
        <filter id="glass-clay" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur" />
            <feOffset dx="4" dy="8" in="blur" result="offsetBlur" />
            <feFlood flood-color="#000" flood-opacity="0.5" result="offsetColor" />
            <feComposite in="offsetColor" in2="offsetBlur" operator="in" result="shadow" />
            <!-- 内发光模拟厚度 -->
            <feSpecularLighting surfaceScale="5" specularConstant="0.8" specularExponent="20" lighting-color="#ffffff" in="blur" result="specular">
                <fePointLight x="-5000" y="-10000" z="20000" />
            </feSpecularLighting>
            <feComposite in="specular" in2="SourceAlpha" operator="in" result="highlight" />
            <feMerge>
                <feMergeNode in="shadow" />
                <feMergeNode in="SourceGraphic" />
                <feMergeNode in="highlight" />
            </feMerge>
        </filter>

        <!-- 霓虹外发光 -->
        <filter id="neon-glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1600" height="900" fill="#0B1120" />
    <rect width="1600" height="900" fill="url(#grid)" />

    <!-- 顶部标题 -->
    <g transform="translate(50, 50)">
        <text x="0" y="0" fill="#0EA5E9" font-family="Arial" font-size="28" font-weight="bold" filter="url(#neon-glow)">DATA ANALYSIS CORE <tspan fill="#475569" font-size="18">/ 多维数据矩阵</tspan></text>
        <path d="M 0 15 L 1500 15" stroke="#0EA5E9" stroke-width="1" opacity="0.3" />
    </g>

    <!-- 主布局容器 -->
    <g transform="translate(50, 100)">
        
        <!-- === A. 全息雷达图 (Radar Chart) === -->
        <g transform="translate(0, 0)">
            <rect width="480" height="740" rx="15" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" filter="url(#glass-clay)" />
            <text x="20" y="40" fill="#BAE6FD" font-family="Arial" font-size="16" font-weight="bold">核心效能雷达 (CORE EFFICIENCY)</text>
            
            <!-- 雷达底图（六边形） -->
            <g transform="translate(240, 370)" fill="none" stroke="rgba(14, 165, 233, 0.2)" stroke-width="1">
                <polygon points="0,-180 155.8,-90 155.8,90 0,180 -155.8,90 -155.8,-90" />
                <polygon points="0,-120 103.9,-60 103.9,60 0,120 -103.9,60 -103.9,-60" />
                <polygon points="0,-60 51.9,-30 51.9,30 0,60 -51.9,30 -51.9,-30" />
                <!-- 轴线 -->
                <line x1="0" y1="0" x2="0" y2="-180" />
                <line x1="0" y1="0" x2="155.8" y2="-90" />
                <line x1="0" y1="0" x2="155.8" y2="90" />
                <line x1="0" y1="0" x2="0" y2="180" />
                <line x1="0" y1="0" x2="-155.8" y2="90" />
                <line x1="0" y1="0" x2="-155.8" y2="-90" />
            </g>
            <!-- 雷达数据区 -->
            <g transform="translate(240, 370)">
                <polygon points="0,-140 120,-70 140,80 0,110 -100,60 -130,-75" fill="rgba(14, 165, 233, 0.3)" stroke="#0EA5E9" stroke-width="2" filter="url(#neon-glow)" />
                <!-- 拟物化端点 -->
                <circle cx="0" cy="-140" r="4" fill="#0EA5E9" />
                <circle cx="120" cy="-70" r="4" fill="#0EA5E9" />
            </g>
        </g>

        <!-- === B. 量子散点图 (Scatter Plot) === -->
        <g transform="translate(510, 0)">
            <rect width="990" height="355" rx="15" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" filter="url(#glass-clay)" />
            <text x="20" y="40" fill="#BAE6FD" font-family="Arial" font-size="16" font-weight="bold">离散分布态势 (DISTRIBUTION)</text>
            
            <!-- 坐标轴 -->
            <line x1="60" y1="300" x2="940" y2="300" stroke="#475569" stroke-width="1" />
            <line x1="60" y1="60" x2="60" y2="300" stroke="#475569" stroke-width="1" />
            
            <!-- 散点 (拟物化小球) -->
            <g transform="translate(60, 0)">
                <!-- 模拟随机散点 -->
                <circle cx="120" cy="180" r="6" fill="#10B981" filter="url(#neon-glow)" opacity="0.8" />
                <circle cx="240" cy="120" r="8" fill="#0EA5E9" filter="url(#neon-glow)" />
                <circle cx="350" cy="240" r="5" fill="#EF4444" filter="url(#neon-glow)" />
                <circle cx="480" cy="150" r="7" fill="#10B981" opacity="0.6" />
                <circle cx="600" cy="200" r="10" fill="#0EA5E9" filter="url(#neon-glow)" />
                <circle cx="720" cy="90" r="6" fill="#F59E0B" filter="url(#neon-glow)" />
                <circle cx="850" cy="260" r="4" fill="#10B981" />
                
                <!-- 全息连接线 (神经网络感) -->
                <path d="M 120 180 L 240 120 L 600 200" fill="none" stroke="#0EA5E9" stroke-width="0.5" stroke-dasharray="4 2" opacity="0.4" />
            </g>
        </g>

        <!-- === C. 阶梯漏斗图 (Funnel Chart) === -->
        <g transform="translate(510, 385)">
            <rect width="990" height="355" rx="15" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" filter="url(#glass-clay)" />
            <text x="20" y="40" fill="#BAE6FD" font-family="Arial" font-size="16" font-weight="bold">资源过滤漏斗 (RESOURCE FUNNEL)</text>
            
            <!-- 漏斗层级 -->
            <g transform="translate(495, 60)">
                <!-- 第一层：顶层 -->
                <path d="M -250 0 L 250 0 L 220 50 L -220 50 Z" fill="#0EA5E9" opacity="0.8" stroke="white" stroke-width="0.5">
                    <animate attributeName="opacity" values="0.8;0.5;0.8" dur="3s" repeatCount="indefinite" />
                </path>
                <text x="0" y="32" fill="#0B1120" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">INPUT: 100%</text>

                <!-- 第二层 -->
                <path d="M -210 60 L 210 60 L 170 110 L -170 110 Z" fill="#0EA5E9" opacity="0.6" />
                <text x="0" y="92" fill="#BAE6FD" font-family="Arial" font-size="14" text-anchor="middle">PROCESSED: 75%</text>

                <!-- 第三层 -->
                <path d="M -160 120 L 160 120 L 110 170 L -110 170 Z" fill="#10B981" opacity="0.5" />
                <text x="0" y="152" fill="#BAE6FD" font-family="Arial" font-size="14" text-anchor="middle">VALIDATED: 40%</text>

                <!-- 第四层：底层 -->
                <path d="M -100 180 L 100 180 L 70 230 L -70 230 Z" fill="#F59E0B" opacity="0.6" />
                <text x="0" y="212" fill="#BAE6FD" font-family="Arial" font-size="14" text-anchor="middle">OUTPUT: 12%</text>
            </g>

            <!-- 侧边全息标注 -->
            <g transform="translate(750, 100)" font-family="Arial" font-size="10" fill="#475569">
                <text y="0">SYSTEM FILTER V2.4</text>
                <text y="60">DATA LOSS RATE: 25%</text>
                <text y="120">LATENCY: 14ms</text>
                <text y="180">FINAL YIELD: OPTIMAL</text>
            </g>
        </g>
    </g>

    <!-- 装饰性元素 -->
    <path d="M 50 870 L 1550 870" stroke="#0EA5E9" stroke-width="1" opacity="0.2" stroke-dasharray="5 5" />
</svg>