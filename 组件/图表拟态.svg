<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. 滤镜与定义区 -->
    <defs>
        <pattern id="tech-grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(14, 165, 233, 0.08)" stroke-width="1"/>
        </pattern>
        <!-- 拟物阴影：增加容器厚度感 -->
        <filter id="clay-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
            <feDropShadow dx="0" dy="-2" stdDeviation="4" flood-color="rgba(255,255,255,0.05)"/>
        </filter>
        <!-- 霓虹发光 -->
        <filter id="neon-line">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- 2. 背景层 -->
    <rect width="1600" height="900" fill="#0B1120" />
    <rect width="1600" height="900" fill="url(#tech-grid)" />

    <!-- 3. 顶部导航/标题装饰 -->
    <g transform="translate(40, 30)">
        <text x="0" y="20" fill="#0EA5E9" font-family="Arial" font-size="24" font-weight="bold" filter="url(#neon-line)">智能能效诊断矩阵 <tspan fill="#475569" font-size="14" font-weight="normal">AI DIAGNOSTIC ENGINE v1.0</tspan></text>
        <path d="M 0 40 L 1520 40" stroke="#0EA5E9" stroke-width="1" opacity="0.2" />
    </g>

    <!-- 4. 左侧区域：雷达图 (Radar Chart) -->
    <g transform="translate(40, 80)">
        <rect width="450" height="450" rx="12" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" filter="url(#clay-glow)" />
        <text x="20" y="35" fill="#BAE6FD" font-family="Microsoft YaHei" font-size="16" font-weight="bold">多维性能雷达</text>
        
        <!-- 雷达核心 -->
        <g transform="translate(225, 250)">
            <!-- 蜘蛛网格 -->
            <g fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="2 2">
                <polygon points="0,-140 121,-70 121,70 0,140 -121,70 -121,-70" />
                <polygon points="0,-100 86,-50 86,50 0,100 -86,50 -86,-50" />
                <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" />
            </g>
            <!-- 覆盖面积区 -->
            <polygon points="0,-120 100,-40 90,60 0,130 -80,40 -110,-60" fill="rgba(14, 165, 233, 0.3)" stroke="#0EA5E9" stroke-width="2" filter="url(#neon-line)" />
            <!-- 数据点 -->
            <circle cx="0" cy="-120" r="4" fill="#10B981" stroke="#fff" stroke-width="1" />
            <circle cx="100" cy="-40" r="4" fill="#10B981" />
        </g>
    </g>

    <!-- 5. 右侧区域：漏斗图 (Funnel Chart) -->
    <g transform="translate(510, 80)">
        <rect width="1050" height="450" rx="12" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" filter="url(#clay-glow)" />
        <text x="20" y="35" fill="#BAE6FD" font-family="Microsoft YaHei" font-size="16" font-weight="bold">资源转化漏斗</text>
        
        <!-- 漏斗阶梯 -->
        <g transform="translate(525, 80)">
            <!-- 层级1 -->
            <path d="M -300 0 L 300 0 L 260 60 L -260 60 Z" fill="#0EA5E9" opacity="0.8" />
            <text x="0" y="35" fill="#0B1120" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">采集总量: 24,500</text>
            <!-- 层级2 -->
            <path d="M -250 70 L 250 70 L 210 130 L -210 130 Z" fill="#0EA5E9" opacity="0.6" />
            <text x="0" y="105" fill="#BAE6FD" font-family="Arial" font-size="14" text-anchor="middle">初步过滤: 18,200</text>
            <!-- 层级3 -->
            <path d="M -200 140 L 200 140 L 160 200 L -160 200 Z" fill="#10B981" opacity="0.5" />
            <text x="0" y="175" fill="#BAE6FD" font-family="Arial" font-size="14" text-anchor="middle">逻辑校验: 12,400</text>
            <!-- 层级4 -->
            <path d="M -150 210 L 150 210 L 120 270 L -120 270 Z" fill="#F59E0B" opacity="0.6" />
            <text x="0" y="245" fill="#BAE6FD" font-family="Arial" font-size="14" text-anchor="middle">核心入库: 3,100</text>
        </g>
    </g>

    <!-- 6. 底部区域：散点图 (Scatter Plot) - 宽幅显示 -->
    <g transform="translate(40, 550)">
        <rect width="1520" height="310" rx="12" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" filter="url(#clay-glow)" />
        <text x="20" y="35" fill="#BAE6FD" font-family="Microsoft YaHei" font-size="16" font-weight="bold">量子离散偏差分析</text>
        
        <!-- 散点图轴线 -->
        <g transform="translate(60, 240)">
            <line x1="0" y1="0" x2="1420" y2="0" stroke="#475569" stroke-width="1" />
            <line x1="0" y1="0" x2="0" y2="-180" stroke="#475569" stroke-width="1" />
            
            <!-- 模拟散点：使用不同颜色和大小代表权重 -->
            <circle cx="100" cy="-60" r="5" fill="#0EA5E9" filter="url(#neon-line)" />
            <circle cx="250" cy="-120" r="8" fill="#10B981" opacity="0.8" />
            <circle cx="400" cy="-40" r="4" fill="#EF4444" />
            <circle cx="550" cy="-150" r="10" fill="#0EA5E9" filter="url(#neon-line)" />
            <circle cx="700" cy="-80" r="6" fill="#F59E0B" />
            <circle cx="850" cy="-110" r="7" fill="#10B981" />
            <circle cx="1000" cy="-30" r="5" fill="#0EA5E9" />
            <circle cx="1150" cy="-140" r="9" fill="#10B981" />
            <circle cx="1300" cy="-70" r="6" fill="#0EA5E9" />
            
            <!-- 趋势辅助线 -->
            <path d="M 0 -20 Q 350 -180 700 -80 T 1400 -100" fill="none" stroke="#BAE6FD" stroke-width="1" stroke-dasharray="8 4" opacity="0.3" />
        </g>
    </g>

    <!-- 装饰全息线 -->
    <path d="M 1560 80 L 1560 860" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="20 10" opacity="0.1" />
</svg>