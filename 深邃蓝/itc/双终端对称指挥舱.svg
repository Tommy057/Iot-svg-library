<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 全局底板 -->
  <rect width="1200" height="600" fill="#0B1120" />
  
  <!-- 中央连接能量流 (连接左采与右播) -->
  <g transform="translate(600, 300)">
    <circle r="150" fill="none" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="5,5" />
    <path d="M -200 0 L 200 0" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="10,10" />
    <!-- 流动粒子 -->
    <circle r="3" fill="#0EA5E9" filter="url(#neonGlow)">
      <animateMotion path="M -220 0 L 220 0" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ==================== 左侧：音频采集器 (Audio Collector) ==================== -->
  <g transform="translate(50, 100)">
    <!-- 玻璃底板 -->
    <path d="M 0 10 L 10 0 L 410 0 L 420 10 L 420 390 L 410 400 L 10 400 L 0 390 Z" 
          fill="#1E293B" fill-opacity="0.6" stroke="#A855F7" stroke-width="2" filter="url(#neonGlow)" />
    
    <!-- 标题区 -->
    <text x="20" y="35" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#F8FAFC">01 音频采集终端</text>
    <text x="20" y="60" font-family="Monaco" font-size="12" fill="#A855F7">ID: INPUT-COLLECT-01 | IP: 192.168.1.50</text>

    <!-- 状态标签 (正在采集任务) -->
    <g transform="translate(320, 15)">
      <rect width="80" height="24" rx="12" fill="#A855F7" fill-opacity="0.2" stroke="#A855F7" />
      <text x="40" y="17" font-family="Microsoft YaHei" font-size="12" fill="#A855F7" text-anchor="middle" font-weight="bold">有任务</text>
    </g>

    <!-- 音量/增益调节 -->
    <g transform="translate(20, 120)">
      <text x="0" y="0" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">输入增益 (Input Gain)</text>
      <rect x="0" y="15" width="380" height="6" rx="3" fill="#0F172A" />
      <rect x="0" y="15" width="280" height="6" rx="3" fill="#A855F7" filter="url(#neonGlow)" />
      <text x="380" y="22" font-family="Arial" font-size="18" font-weight="bold" fill="#A855F7" text-anchor="end">82%</text>
    </g>

    <!-- 采集波形预览 (模拟动态) -->
    <g transform="translate(20, 220)">
      <text x="0" y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">实时波形 (WAVEFORM)</text>
      <rect x="0" y="15" width="380" height="120" fill="#0B1120" fill-opacity="0.5" />
      <path d="M 10 75 Q 30 20 50 75 T 90 75 T 130 75 T 170 75 T 210 75 T 250 75 T 290 75 T 330 75 T 370 75" 
            fill="none" stroke="#A855F7" stroke-width="2">
        <animate attributeName="d" 
                 values="M 10 75 Q 30 20 50 75 T 90 75 T 130 75 T 170 75 T 210 75 T 250 75 T 290 75 T 330 75 T 370 75;
                         M 10 75 Q 30 130 50 75 T 90 75 T 130 75 T 170 75 T 210 75 T 250 75 T 290 75 T 330 75 T 370 75;
                         M 10 75 Q 30 20 50 75 T 90 75 T 130 75 T 170 75 T 210 75 T 250 75 T 290 75 T 330 75 T 370 75" 
                 dur="1s" repeatCount="indefinite" />
      </path>
    </g>
  </g>

  <!-- ==================== 右侧：音频音响终端 (Audio Terminal) ==================== -->
  <g transform="translate(730, 100)">
    <!-- 玻璃底板 -->
    <path d="M 0 10 L 10 0 L 410 0 L 420 10 L 420 390 L 410 400 L 10 400 L 0 390 Z" 
          fill="#1E293B" fill-opacity="0.6" stroke="#10B981" stroke-width="2" filter="url(#neonGlow)" />
    
    <!-- 标题区 -->
    <text x="20" y="35" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#F8FAFC">02 背景音乐音响</text>
    <text x="20" y="60" font-family="Monaco" font-size="12" fill="#10B981">ID: SPEAKER-OUT-01 | IP: 192.168.1.101</text>

    <!-- 状态标签 (空闲) -->
    <g transform="translate(320, 15)">
      <rect width="80" height="24" rx="12" fill="#10B981" fill-opacity="0.2" stroke="#10B981" />
      <text x="40" y="17" font-family="Microsoft YaHei" font-size="12" fill="#10B981" text-anchor="middle" font-weight="bold">空 闲</text>
    </g>

    <!-- 播放音量控制 -->
    <g transform="translate(20, 120)">
      <text x="0" y="0" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">播放音量 (Output Volume)</text>
      <rect x="0" y="15" width="380" height="6" rx="3" fill="#0F172A" />
      <rect x="0" y="15" width="247" height="6" rx="3" fill="#10B981" filter="url(#neonGlow)" />
      <text x="380" y="22" font-family="Arial" font-size="18" font-weight="bold" fill="#10B981" text-anchor="end">65%</text>
    </g>

    <!-- 播放功率可视化 (环形仪表) -->
    <g transform="translate(190, 300)">
      <circle r="60" fill="none" stroke="#334155" stroke-width="10" />
      <circle r="60" fill="none" stroke="#10B981" stroke-width="10" stroke-dasharray="240, 377" filter="url(#neonGlow)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
      </circle>
      <text y="8" font-family="Arial" font-size="20" font-weight="bold" fill="#F8FAFC" text-anchor="middle">ACTIVE</text>
    </g>
  </g>

</svg>