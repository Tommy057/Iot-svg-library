<svg width="450" height="600" viewBox="0 0 450 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 背景底板 (加深纵深感) -->
  <rect width="450" height="600" fill="#0B1120" rx="10" />
  <path d="M 0 20 L 20 0 L 430 0 L 450 20 L 450 580 L 430 600 L 20 600 L 0 580 Z" 
        fill="#1E293B" fill-opacity="0.8" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.4" />

  <!-- 2. 头部：设备信息 -->
  <g transform="translate(25, 30)">
    <text x="0" y="5" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#F8FAFC">1F 艺术大厅音响</text>
    <text x="0" y="30" font-family="Monaco" font-size="12" fill="#38BDF8">NODE: BGM-CTRL-001 | IP: 192.168.1.101</text>
    <circle cx="380" cy="15" r="5" fill="#10B981" filter="url(#neonGlow)">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 3. 核心：播放控制区 (STOP, PLAY, PAUSE) -->
  <g transform="translate(25, 100)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">播放控制 (PLAYBACK CONTROL)</text>
    
    <!-- 停止 (STOP) -->
    <g transform="translate(0, 20)">
      <rect width="120" height="45" rx="4" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-width="1.5" />
      <rect x="52" y="15" width="15" height="15" fill="#EF4444" />
      <text x="60" y="55" font-family="Arial" font-size="10" fill="#EF4444" text-anchor="middle">STOP</text>
    </g>

    <!-- 播放 (PLAY) -->
    <g transform="translate(140, 20)">
      <rect width="120" height="45" rx="4" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="2" filter="url(#neonGlow)" />
      <path d="M 52 15 L 72 22.5 L 52 30 Z" fill="#10B981" />
      <text x="60" y="55" font-family="Arial" font-size="10" fill="#10B981" text-anchor="middle">PLAYING</text>
    </g>

    <!-- 暂停 (PAUSE) -->
    <g transform="translate(280, 20)">
      <rect width="120" height="45" rx="4" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-width="1.5" />
      <rect x="52" y="15" width="5" height="15" fill="#F59E0B" />
      <rect x="63" y="15" width="5" height="15" fill="#F59E0B" />
      <text x="60" y="55" font-family="Arial" font-size="10" fill="#F59E0B" text-anchor="middle">PAUSE</text>
    </g>
  </g>

  <!-- 4. 节目列表区 (PROGRAM LIST) -->
  <g transform="translate(25, 200)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">节目列表 (PROGRAM LIST)</text>
    <rect x="0" y="15" width="400" height="260" rx="4" fill="#0F172A" fill-opacity="0.6" stroke="#334155" />
    
    <!-- 列表项 (模拟数据) -->
    <g transform="translate(10, 25)">
      <!-- Item 1 -->
      <g transform="translate(0, 10)">
        <rect width="380" height="40" fill="#3B82F6" fill-opacity="0.1" />
        <text x="15" y="25" font-family="Monaco" font-size="12" fill="#38BDF8">ID: 1001</text>
        <text x="80" y="25" font-family="Microsoft YaHei" font-size="13" fill="#F8FAFC">经典轻音乐 - 萨克斯</text>
        <text x="360" y="25" font-family="Arial" font-size="10" fill="#10B981" text-anchor="end">READY</text>
      </g>
      <!-- Item 2 -->
      <g transform="translate(0, 60)">
        <rect width="380" height="40" fill="#3B82F6" fill-opacity="0.05" />
        <text x="15" y="25" font-family="Monaco" font-size="12" fill="#38BDF8">ID: 1002</text>
        <text x="80" y="25" font-family="Microsoft YaHei" font-size="13" fill="#F8FAFC">早间广播 - 新闻联播</text>
      </g>
      <!-- Item 3 -->
      <g transform="translate(0, 110)">
        <rect width="380" height="40" fill="#3B82F6" fill-opacity="0.05" />
        <text x="15" y="25" font-family="Monaco" font-size="12" fill="#38BDF8">ID: 1003</text>
        <text x="80" y="25" font-family="Microsoft YaHei" font-size="13" fill="#F8FAFC">消防疏散演示音频</text>
      </g>
      <!-- 滚动条 -->
      <rect x="390" y="10" width="4" height="240" rx="2" fill="#334155" />
      <rect x="390" y="10" width="4" height="60" rx="2" fill="#3B82F6" />
    </g>
  </g>

  <!-- 5. 任务指令执行 (PLAY PROGRAM BY ID) -->
  <g transform="translate(25, 490)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">指令输入 (EXECUTE BY ID)</text>
    
    <!-- 输入框样式 -->
    <rect x="0" y="15" width="280" height="45" rx="4" fill="#0F172A" stroke="#0EA5E9" stroke-width="1.5" />
    <text x="15" y="44" font-family="Monaco" font-size="18" fill="#F8FAFC" fill-opacity="0.3">ENTER ID...</text>
    <line x1="15" y1="48" x2="100" y2="48" stroke="#0EA5E9" stroke-width="2">
        <animate attributeName="x2" values="15;100;15" dur="1s" repeatCount="indefinite" />
    </line>

    <!-- 执行按钮 -->
    <g transform="translate(300, 15)">
      <rect width="100" height="45" rx="4" fill="#0EA5E9" filter="url(#neonGlow)" />
      <text x="50" y="28" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#F8FAFC" text-anchor="middle">执行播放</text>
    </g>
  </g>

  <!-- 底部扫视光带 -->
  <path d="M 0 595 L 450 595" stroke="#3B82F6" stroke-width="5" stroke-opacity="0.2" />
</svg>