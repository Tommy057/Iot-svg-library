<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹发光 -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- 渐变阴影 (用于底盘) -->
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- 1. 氛围背景层：大尺寸扫描底盘 -->
  <circle cx="400" cy="300" r="280" fill="url(#centerGrad)" />
  <circle cx="400" cy="300" r="250" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="10,5" />
  <circle cx="400" cy="300" r="290" fill="none" stroke="#0EA5E9" stroke-width="0.5" stroke-opacity="0.1" />

  <!-- 2. 动态旋转环 (装饰性，增加饱满度) -->
  <g transform="translate(400, 300)">
    <circle r="220" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="100,200" stroke-opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle r="230" fill="none" stroke="#38BDF8" stroke-width="1" stroke-dasharray="2,10" stroke-opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- 3. 中心音量仪表盘 (核心组件) -->
  <g transform="translate(400, 300)">
    <!-- 进度条底槽 -->
    <circle r="140" fill="none" stroke="#1E293B" stroke-width="25" />
    <!-- 实际音量进度 (75%) -->
    <circle r="140" fill="none" stroke="#0EA5E9" stroke-width="25" stroke-dasharray="660, 880" stroke-dashoffset="220" filter="url(#neonGlow)" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" values="660;220" dur="1.5s" fill="freeze" />
    </circle>
    <!-- 中心数值 -->
    <text y="-10" font-family="Arial" font-size="64" font-weight="bold" fill="#F8FAFC" text-anchor="middle">75</text>
    <text y="30" font-family="Microsoft YaHei" font-size="16" fill="#94A3B8" text-anchor="middle" letter-spacing="4">VOLUME %</text>
  </g>

  <!-- 4. 左侧信息面板：设备档案 -->
  <g transform="translate(50, 200)">
    <path d="M 0 0 L 220 0 L 240 20 L 240 100 L 220 120 L 0 120 Z" fill="#1E293B" fill-opacity="0.6" stroke="#0EA5E9" stroke-width="1" />
    <rect x="0" y="0" width="4" height="40" fill="#0EA5E9" filter="url(#neonGlow)" />
    <text x="20" y="35" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC">1F 艺术大厅终端</text>
    <!-- IP地址高亮显示 -->
    <rect x="20" y="55" width="180" height="24" rx="4" fill="#0F172A" />
    <text x="30" y="72" font-family="Monaco, monospace" font-size="14" font-weight="bold" fill="#38BDF8">IP: 192.168.1.101</text>
    <text x="20" y="105" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">SN: BGM-2023-9981-TX</text>
  </g>

  <!-- 5. 右侧信息面板：运行状态 -->
  <g transform="translate(510, 200)">
    <path d="M 20 0 L 240 0 L 240 120 L 20 120 L 0 100 L 0 20 Z" fill="#1E293B" fill-opacity="0.6" stroke="#10B981" stroke-width="1" />
    <rect x="236" y="80" width="4" height="40" fill="#10B981" filter="url(#neonGlow)" />
    <!-- 状态指示灯 -->
    <circle cx="35" cy="30" r="6" fill="#10B981" filter="url(#neonGlow)">
        <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite" />
    </circle>
    <text x="55" y="35" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#10B981">运行正常 (IDLE)</text>
    <text x="35" y="70" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">连续运行时间: 124h 15m</text>
    <text x="35" y="95" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">信号强度: 🟢 极强 (-45dBm)</text>
  </g>

  <!-- 6. 底部大型交互按钮 -->
  <g transform="translate(300, 500)">
    <rect width="200" height="50" rx="25" fill="#0EA5E9" fill-opacity="0.1" stroke="#0EA5E9" stroke-width="2" filter="url(#neonGlow)" />
    <text x="100" y="32" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC" text-anchor="middle" letter-spacing="2">进入详细配置</text>
  </g>

  <!-- 7. 四角 HUD 装饰线 (撑满全屏感) -->
  <polyline points="20,100 20,20 100,20" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.5" />
  <polyline points="700,20 780,20 780,100" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.5" />
  <polyline points="20,500 20,580 100,580" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.5" />
  <polyline points="700,580 780,580 780,500" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.5" />
</svg>