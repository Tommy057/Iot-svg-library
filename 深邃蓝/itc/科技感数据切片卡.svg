s<svg width="260" height="80" viewBox="0 0 260 80" xmlns="http://www.w3.org/2000/svg">
  <!-- 底座线条 -->
  <path d="M 10 70 L 250 70 L 260 60" fill="none" stroke="#3B82F6" stroke-width="1" />
  <rect x="10" y="70" width="40" height="3" fill="#3B82F6" />

  <!-- 标签文字 -->
  <text x="15" y="25" font-family="Verdana" font-size="12" fill="#94A3B8" text-transform="uppercase">
    Power Consumption
  </text>

  <!-- 核心数据 (严禁渐变填充) -->
  <text x="15" y="60" font-family="Digital, Arial" font-size="32" font-weight="bold" fill="#0EA5E9">
    1,284.50 <tspan font-size="14" fill="#94A3B8" dx="5">kW/h</tspan>
  </text>
  
  <!-- 装饰闪烁点 -->
  <rect x="245" y="20" width="4" height="4" fill="#10B981">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </rect>
</svg>