<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 核心光源 -->
  <circle cx="50" cy="50" r="10" fill="#10B981">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- 外围光晕层 -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#10B981" stroke-width="2">
    <animate attributeName="r" values="12;25" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite" />
    <animate attributeName="stroke-width" values="4;0" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- 静态装饰环 -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2,4" stroke-opacity="0.3" />
</svg>