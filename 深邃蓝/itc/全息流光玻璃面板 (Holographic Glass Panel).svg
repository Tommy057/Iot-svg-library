<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 玻璃阴影与发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景底板 (深色半透明) -->
  <path d="M 0 20 L 20 0 L 380 0 L 400 20 L 400 280 L 380 300 L 20 300 L 0 280 Z" 
        fill="#1E293B" fill-opacity="0.6" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.3" />

  <!-- 装饰边角 (霓虹青) -->
  <polyline points="0,50 0,0 50,0" fill="none" stroke="#0EA5E9" stroke-width="3" filter="url(#glow)" />
  <polyline points="350,300 400,300 400,250" fill="none" stroke="#0EA5E9" stroke-width="3" filter="url(#glow)" />

  <!-- 顶部动态扫描线 -->
  <line x1="20" y1="2" x2="100" y2="2" stroke="#0EA5E9" stroke-width="2">
    <animate attributeName="x1" values="20;300;20" dur="4s" repeatCount="indefinite" />
    <animate attributeName="x2" values="100;380;100" dur="4s" repeatCount="indefinite" />
  </line>

  <!-- 标题文字 (强制十六进制纯色) -->
  <text x="30" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F8FAFC">
    SYSTEM MONITORING
  </text>
  <rect x="30" y="45" width="120" height="2" fill="#0EA5E9" />
</svg>