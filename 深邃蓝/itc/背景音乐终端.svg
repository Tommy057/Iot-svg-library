<svg width="320" height="180" viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹外发光滤镜 -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 玻璃质感底板 -->
  <path d="M 0 10 L 10 0 L 310 0 L 320 10 L 320 170 L 310 180 L 10 180 L 0 170 Z" 
        fill="#0F172A" fill-opacity="0.8" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.4" />
  
  <!-- 2. 状态修饰边（左侧垂直条） -->
  <!-- 状态色切换：有任务 #0EA5E9 / 空闲 #10B981 / 离线 #EF4444 -->
  <rect x="0" y="40" width="3" height="100" fill="#0EA5E9" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
  </rect>

  <!-- 3. 终端名称与IP -->
  <text x="20" y="35" font-family="Microsoft YaHei, Arial" font-size="16" font-weight="bold" fill="#F8FAFC">
    终端设备_BGM_001
  </text>
  <text x="20" y="55" font-family="Monaco, monospace" font-size="11" fill="#94A3B8">
    IP: 192.168.1.105
  </text>

  <!-- 4. 状态标签 (Badge) -->
  <g transform="translate(240, 20)">
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#0EA5E9" fill-opacity="0.2" stroke="#0EA5E9" stroke-width="1" />
    <circle cx="10" cy="10" r="3" fill="#0EA5E9">
        <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
    </circle>
    <text x="20" y="14" font-family="Microsoft YaHei" font-size="10" fill="#0EA5E9" font-weight="bold">有任务</text>
  </g>

  <!-- 5. 音量控制区域 -->
  <text x="20" y="95" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">VOLUME</text>
  <text x="280" y="95" font-family="Verdana" font-size="14" fill="#F8FAFC" text-anchor="end">75%</text>
  
  <!-- 音量条轨道 -->
  <rect x="20" y="105" width="280" height="4" rx="2" fill="#334155" />
  <!-- 音量条进度 (通过 width 控制) -->
  <rect x="20" y="105" width="210" height="4" rx="2" fill="#0EA5E9" filter="url(#neonGlow)" />
  <!-- 调节手柄 -->
  <circle cx="230" cy="107" r="6" fill="#F8FAFC" filter="url(#neonGlow)" stroke="#0EA5E9" stroke-width="2" />

  <!-- 6. 动态音波特效 (仅在“有任务”状态显示) -->
  <g transform="translate(250, 140)">
    <rect x="0" y="0" width="3" height="12" fill="#0EA5E9">
        <animate attributeName="height" values="5;15;5" dur="0.6s" repeatCount="indefinite" />
        <animate attributeName="y" values="10;0;10" dur="0.6s" repeatCount="indefinite" />
    </rect>
    <rect x="7" y="0" width="3" height="12" fill="#0EA5E9">
        <animate attributeName="height" values="15;5;15" dur="0.8s" repeatCount="indefinite" />
        <animate attributeName="y" values="0;10;0" dur="0.8s" repeatCount="indefinite" />
    </rect>
    <rect x="14" y="0" width="3" height="12" fill="#0EA5E9">
        <animate attributeName="height" values="8;18;8" dur="0.5s" repeatCount="indefinite" />
        <animate attributeName="y" values="7;0;7" dur="0.5s" repeatCount="indefinite" />
    </rect>
    <rect x="21" y="0" width="3" height="12" fill="#0EA5E9">
        <animate attributeName="height" values="12;6;12" dur="0.7s" repeatCount="indefinite" />
        <animate attributeName="y" values="3;9;3" dur="0.7s" repeatCount="indefinite" />
    </rect>
  </g>
  
  <!-- 7. 底部装饰线条 -->
  <polyline points="20,160 300,160" fill="none" stroke="#94A3B8" stroke-width="0.5" stroke-dasharray="2,2" stroke-opacity="0.3" />
</svg>