<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 背景与外框 -->
  <rect width="1200" height="700" fill="#0B1120" />
  <path d="M 30 20 L 1170 20 L 1185 35 L 1185 665 L 1170 680 L 30 680 L 15 665 L 15 35 Z" fill="#1E293B" fill-opacity="0.3" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.2" />

  <!-- 2. 中央：新风机机体流程图 -->
  <g transform="translate(300, 200)">
    <!-- 机壳 -->
    <rect width="600" height="250" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.5" />
    
    <!-- 功能段分割 -->
    <line x1="150" y1="0" x2="150" y2="250" stroke="#3B82F6" stroke-opacity="0.2" stroke-dasharray="5,5" />
    <line x1="300" y1="0" x2="300" y2="250" stroke="#3B82F6" stroke-opacity="0.2" stroke-dasharray="5,5" />
    <line x1="450" y1="0" x2="450" y2="250" stroke="#3B82F6" stroke-opacity="0.2" stroke-dasharray="5,5" />

    <!-- 内部组件: 滤网 -->
    <rect x="130" y="25" width="40" height="200" fill="#0EA5E9" fill-opacity="0.1" stroke="#0EA5E9" stroke-dasharray="2,2" />
    <text x="150" y="-10" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8" text-anchor="middle">初效滤网</text>

    <!-- 内部组件: 盘管/水阀 -->
    <path d="M 320 50 L 320 200 M 340 50 L 340 200 M 360 50 L 360 200" stroke="#3B82F6" stroke-width="4" stroke-opacity="0.4" />
    <text x="340" y="-10" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8" text-anchor="middle">表冷/加热盘管</text>

    <!-- 内部组件: 送风机 -->
    <circle cx="525" cy="125" r="60" fill="none" stroke="#10B981" stroke-width="2" filter="url(#neonGlow)" />
    <path d="M 525 65 L 525 185 M 465 125 L 585 125" stroke="#10B981" stroke-width="1">
        <animateTransform attributeName="transform" type="rotate" from="0 525 125" to="360 525 125" dur="2s" repeatCount="indefinite" />
    </path>

    <!-- 动态气流粒子 -->
    <circle r="2" fill="#38BDF8">
        <animateMotion path="M -50 125 L 650 125" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle r="2" fill="#38BDF8">
        <animateMotion path="M -50 100 L 650 100" dur="4s" repeatCount="indefinite" begin="1s" />
    </circle>
  </g>

  <!-- ==================== 左侧：回风参数仓 ==================== -->
  <g transform="translate(40, 60)">
    <text x="0" y="20" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC">回风段参数 (RETURN)</text>
    
    <!-- 环境传感器 -->
    <g transform="translate(0, 40)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">回风温湿度</text>
      <text y="30" font-family="Arial" font-size="24" font-weight="bold" fill="#F8FAFC">24.5 <tspan font-size="12">℃</tspan> / 55.2 <tspan font-size="12">%</tspan></text>
      
      <text y="70" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">CO2浓度</text>
      <text y="100" font-family="Arial" font-size="24" font-weight="bold" fill="#10B981">450 <tspan font-size="12">PPM</tspan></text>
    </g>

    <!-- 回风阀控制 (对比条) -->
    <g transform="translate(0, 160)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">回风阀 (设定 / 反馈)</text>
      <rect y="10" width="200" height="30" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.3" />
      <rect y="10" width="160" height="30" fill="#3B82F6" fill-opacity="0.2" /> <!-- 设定值 80% -->
      <rect y="10" width="155" height="4" fill="#0EA5E9" filter="url(#neonGlow)" /> <!-- 反馈值 -->
      <text x="190" y="30" font-family="Arial" font-size="14" fill="#F8FAFC" text-anchor="end">80% / 78%</text>
    </g>
  </g>

  <!-- ==================== 中间：设备状态与告警 ==================== -->
  <g transform="translate(450, 480)">
    <rect width="300" height="150" fill="#1E293B" fill-opacity="0.5" stroke="#3B82F6" stroke-opacity="0.3" />
    
    <!-- 启停开关 (逻辑展示) -->
    <text x="20" y="35" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8">风机启停控制</text>
    <rect x="150" y="18" width="60" height="24" rx="12" fill="#10B981" />
    <circle cx="198" cy="30" r="10" fill="#F8FAFC" />

    <!-- 告警矩阵 -->
    <g transform="translate(20, 70)">
      <rect width="120" height="30" fill="#0F172A" stroke="#10B981" />
      <text x="60" y="20" font-family="Microsoft YaHei" font-size="11" fill="#10B981" text-anchor="middle">运行状态: 正常</text>

      <g transform="translate(140, 0)">
        <rect width="120" height="30" fill="#0F172A" stroke="#94A3B8" stroke-opacity="0.3" />
        <text x="60" y="20" font-family="Microsoft YaHei" font-size="11" fill="#94A3B8" text-anchor="middle">风机故障: 无</text>
      </g>

      <g transform="translate(0, 40)">
        <rect width="120" height="30" fill="#7F1D1D" stroke="#EF4444" stroke-width="1.5">
            <animate attributeName="stroke-opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
        </rect>
        <text x="60" y="20" font-family="Microsoft YaHei" font-size="11" fill="#EF4444" font-weight="bold" text-anchor="middle">滤网压差: 告警</text>
      </g>

      <g transform="translate(140, 40)">
        <rect width="120" height="30" fill="#0F172A" stroke="#94A3B8" stroke-opacity="0.3" />
        <text x="60" y="20" font-family="Microsoft YaHei" font-size="11" fill="#94A3B8" text-anchor="middle">风机压差: 正常</text>
      </g>
    </g>
  </g>

  <!-- ==================== 右侧：送风参数仓 ==================== -->
  <g transform="translate(950, 60)">
    <text x="0" y="20" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC">送风段参数 (SUPPLY)</text>
    
    <g transform="translate(0, 40)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">送风温湿度</text>
      <text y="30" font-family="Arial" font-size="24" font-weight="bold" fill="#F8FAFC">18.2 <tspan font-size="12">℃</tspan> / 62.8 <tspan font-size="12">%</tspan></text>
    </g>

    <!-- 水阀调节 (仪表盘感) -->
    <g transform="translate(0, 120)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">冷冻水阀反馈 (Valve FB)</text>
      <circle cx="100" cy="80" r="50" fill="none" stroke="#334155" stroke-width="8" />
      <circle cx="100" cy="80" r="50" fill="none" stroke="#0EA5E9" stroke-width="8" stroke-dasharray="157, 314" filter="url(#neonGlow)" />
      <text x="100" y="85" font-family="Arial" font-size="18" font-weight="bold" fill="#F8FAFC" text-anchor="middle">50%</text>
    </g>

    <!-- 新风阀 (对比条) -->
    <g transform="translate(0, 280)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">新风阀 (设定 / 反馈)</text>
      <rect y="10" width="200" height="30" fill="#0F172A" stroke="#3B82F6" stroke-opacity="0.3" />
      <rect y="10" width="100" height="30" fill="#3B82F6" fill-opacity="0.2" /> 
      <rect y="10" width="100" height="4" fill="#0EA5E9" filter="url(#neonGlow)" />
      <text x="190" y="30" font-family="Arial" font-size="14" fill="#F8FAFC" text-anchor="end">50% / 50%</text>
    </g>
  </g>

</svg>