<svg width="320" height="500" viewBox="0 0 320 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
  </defs>

  <!-- 全息底座 -->
  <path d="M 0 20 L 20 0 L 300 0 L 320 20 L 320 480 L 300 500 L 20 500 L 0 480 Z" fill="#1E293B" fill-opacity="0.8" stroke="#3B82F6" stroke-width="1.5" filter="url(#neon)" />
  <text x="25" y="35" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC" letter-spacing="2">MASTER CONTROL</text>
  <rect x="25" y="45" width="120" height="2" fill="#0EA5E9" />

  <!-- 1. 风机启停 (Toggle Switch) -->
  <g transform="translate(25, 80)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="13" fill="#94A3B8">送风机系统启停 (FAN START/STOP)</text>
    <rect y="15" width="80" height="34" rx="17" fill="#0F172A" stroke="#10B981" stroke-width="2" />
    <!-- 开关球: 正常显示在右侧 -->
    <circle cx="63" cy="32" r="12" fill="#10B981" filter="url(#neon)">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="95" y="38" font-family="Arial" font-size="16" font-weight="bold" fill="#10B981">RUNNING</text>
  </g>

  <!-- 2. 新风阀调节 (Setpoint Slider) -->
  <g transform="translate(25, 170)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="13" fill="#94A3B8">新风阀调节指令 (FRESH AIR SET)</text>
    <rect y="15" width="270" height="8" rx="4" fill="#0F172A" />
    <rect y="15" width="135" height="8" rx="4" fill="#0EA5E9" filter="url(#neon)" /> <!-- 50% -->
    <circle cx="135" cy="19" r="10" fill="#F8FAFC" stroke="#0EA5E9" stroke-width="2" />
    <text x="270" y="45" font-family="Arial" font-size="18" font-weight="bold" fill="#F8FAFC" text-anchor="end">50%</text>
  </g>

  <!-- 3. 回风阀调节 (Setpoint Slider) -->
  <g transform="translate(25, 260)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="13" fill="#94A3B8">回风阀调节指令 (RETURN AIR SET)</text>
    <rect y="15" width="270" height="8" rx="4" fill="#0F172A" />
    <rect y="15" width="216" height="8" rx="4" fill="#0EA5E9" filter="url(#neon)" /> <!-- 80% -->
    <circle cx="216" cy="19" r="10" fill="#F8FAFC" stroke="#0EA5E9" stroke-width="2" />
    <text x="270" y="45" font-family="Arial" font-size="18" font-weight="bold" fill="#F8FAFC" text-anchor="end">80%</text>
  </g>

  <!-- 4. 水阀调节 (Setpoint Slider) -->
  <g transform="translate(25, 350)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="13" fill="#94A3B8">冷冻水阀调节指令 (WATER VALVE SET)</text>
    <rect y="15" width="270" height="8" rx="4" fill="#0F172A" />
    <rect y="15" width="108" height="8" rx="4" fill="#3B82F6" filter="url(#neon)" /> <!-- 40% -->
    <circle cx="108" cy="19" r="10" fill="#F8FAFC" stroke="#3B82F6" stroke-width="2" />
    <text x="270" y="45" font-family="Arial" font-size="18" font-weight="bold" fill="#F8FAFC" text-anchor="end">40%</text>
  </g>

  <!-- 底部急停/锁定按钮装饰 -->
  <g transform="translate(25, 440)">
    <rect width="270" height="40" rx="4" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-dasharray="4,2" />
    <text x="135" y="25" font-family="Microsoft YaHei" font-size="14" fill="#EF4444" font-weight="bold" text-anchor="middle">EMERGENCY STOP</text>
  </g>
</svg>