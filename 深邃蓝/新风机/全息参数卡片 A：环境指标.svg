<svg width="350" height="200" viewBox="0 0 350 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
  </defs>
  <!-- 背景底板 -->
  <path d="M 0 15 L 15 0 L 335 0 L 350 15 L 350 185 L 335 200 L 15 200 L 0 185 Z" fill="#1E293B" fill-opacity="0.7" stroke="#3B82F6" stroke-width="1" />
  <rect x="5" y="5" width="4" height="30" fill="#0EA5E9" filter="url(#neon)" />
  <text x="20" y="25" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#F8FAFC">回风段参数</text>
  
  <!-- 温湿度模块 -->
  <g transform="translate(20, 60)">
    <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">TEMPERATURE / HUMIDITY</text>
    <text y="40" font-family="Arial" font-size="36" font-weight="bold" fill="#F8FAFC">24.5 <tspan font-size="14" fill="#94A3B8">℃</tspan></text>
    <text x="140" y="40" font-family="Arial" font-size="36" font-weight="bold" fill="#0EA5E9">55.2 <tspan font-size="14" fill="#94A3B8">%</tspan></text>
  </g>

  <!-- CO2 状态模块 (带彩色呼吸球) -->
  <g transform="translate(20, 140)">
    <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">CO2 浓度检测</text>
    <circle cx="10" cy="25" r="5" fill="#10B981" filter="url(#neon)"><animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" /></circle>
    <text x="25" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#10B981">480 <tspan font-size="12">PPM</tspan></text>
  </g>
</svg>