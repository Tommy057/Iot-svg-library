<svg width="900" height="150" viewBox="0 0 900 150" xmlns="http://www.w3.org/2000/svg">
  <!-- 底板 -->
  <rect width="900" height="150" fill="#1E293B" fill-opacity="0.6" stroke="#3B82F6" stroke-opacity="0.3" rx="10" />
  
  <!-- 分类 1: 环境温湿度 -->
  <g transform="translate(20, 25)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">ENVIRONMENT SENSORS</text>
    <g transform="translate(0, 35)">
      <text font-family="Arial" font-size="11" fill="#94A3B8">回风温湿度</text>
      <text y="25" font-family="Arial" font-size="20" font-weight="bold" fill="#F8FAFC">24.5℃ / 55%</text>
    </g>
    <g transform="translate(180, 35)">
      <text font-family="Arial" font-size="11" fill="#94A3B8">送风温湿度</text>
      <text y="25" font-family="Arial" font-size="20" font-weight="bold" fill="#F8FAFC">18.2℃ / 62%</text>
    </g>
  </g>

  <!-- 分类 2: 阀门实际反馈 (与控制指令对比) -->
  <g transform="translate(400, 25)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="12" fill="#0EA5E9">ACTUATOR FEEDBACK</text>
    <g transform="translate(0, 30)">
       <text font-family="Arial" font-size="10" fill="#94A3B8">新风阀反馈: 49%</text>
       <rect y="8" width="140" height="4" fill="#334155" />
       <rect y="8" width="68" height="4" fill="#0EA5E9" />
    </g>
    <g transform="translate(160, 30)">
       <text font-family="Arial" font-size="10" fill="#94A3B8">回风阀反馈: 79%</text>
       <rect y="8" width="140" height="4" fill="#334155" />
       <rect y="8" width="110" height="4" fill="#0EA5E9" />
    </g>
    <g transform="translate(320, 30)">
       <text font-family="Arial" font-size="10" fill="#94A3B8">水阀反馈: 39%</text>
       <rect y="8" width="140" height="4" fill="#334155" />
       <rect y="8" width="55" height="4" fill="#3B82F6" />
    </g>
  </g>
</svg>