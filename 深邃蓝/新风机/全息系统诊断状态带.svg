<svg width="1200" height="80" viewBox="0 0 1200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="alarmGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 全息底座 (极简长条) -->
  <path d="M 0 0 L 1200 0 L 1180 80 L 20 80 Z" fill="#1E293B" fill-opacity="0.9" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.3" />
  
  <!-- 装饰线条 -->
  <rect width="1200" height="2" fill="#3B82F6" fill-opacity="0.2" />

  <!-- ==================== 状态块组 ==================== -->
  
  <!-- 1. 送风机运行状态 -->
  <g transform="translate(40, 20)">
    <rect width="180" height="40" rx="4" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-width="1.5" />
    <circle cx="20" cy="20" r="5" fill="#10B981">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="35" y="25" font-family="Microsoft YaHei" font-size="13" fill="#F8FAFC" font-weight="bold">送风机：运行中</text>
  </g>

  <!-- 2. 送风机故障 (告警触发演示) -->
  <g transform="translate(235, 20)">
    <rect width="180" height="40" rx="4" fill="#0F172A" stroke="#334155" stroke-width="1" />
    <text x="90" y="25" font-family="Microsoft YaHei" font-size="13" fill="#94A3B8" text-anchor="middle">送风机故障：无</text>
  </g>

  <!-- 3. 送风机压差告警 (红色告警演示) -->
  <g transform="translate(430, 20)">
    <rect width="180" height="40" rx="4" fill="#7F1D1D" fill-opacity="0.3" stroke="#EF4444" stroke-width="2" filter="url(#alarmGlow)">
        <animate attributeName="stroke-opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite" />
    </rect>
    <text x="90" y="25" font-family="Microsoft YaHei" font-size="13" fill="#EF4444" font-weight="bold" text-anchor="middle">风机压差：告警!</text>
  </g>

  <!-- 4. 滤网压差告警 (正常显示) -->
  <g transform="translate(625, 20)">
    <rect width="180" height="40" rx="4" fill="#0F172A" stroke="#334155" stroke-width="1" />
    <text x="90" y="25" font-family="Microsoft YaHei" font-size="13" fill="#94A3B8" text-anchor="middle">滤网压差：正常</text>
  </g>

  <!-- 5. CO2 状态位 (数值状态化) -->
  <g transform="translate(820, 20)">
    <rect width="160" height="40" rx="4" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.5" />
    <text x="15" y="25" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">CO2状态</text>
    <text x="145" y="26" font-family="Arial" font-size="16" font-weight="bold" fill="#10B981" text-anchor="end">EXCELLENT</text>
  </g>

  <!-- 6. 启停开关反馈 -->
  <g transform="translate(995, 20)">
    <text x="0" y="25" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">系统启停</text>
    <rect x="60" y="10" width="40" height="20" rx="10" fill="#10B981" />
    <circle cx="90" cy="20" r="7" fill="#F8FAFC" />
  </g>

  <!-- 装饰右侧HUD编号 -->
  <text x="1180" y="70" font-family="Monaco" font-size="10" fill="#3B82F6" fill-opacity="0.3" text-anchor="end">SYS_DIAG_UNIT_04</text>
</svg>