<svg width="350" height="200" viewBox="0 0 350 200" xmlns="http://www.w3.org/2000/svg">
  <path d="M 0 15 L 15 0 L 335 0 L 350 15 L 350 185 L 335 200 L 15 200 L 0 185 Z" fill="#1E293B" fill-opacity="0.7" stroke="#3B82F6" stroke-width="1" />
