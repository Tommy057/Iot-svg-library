<svg width="1000" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 底座线条 -->
  <path d="M 0 0 L 1000 0 L 980 120 L 20 120 Z" fill="#1E293B" fill-opacity="0.4" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.2" />

  <g transform="translate(50, 40)">
    <!-- 运行状态 -->
    <g>
      <rect width="180" height="45" fill="#10B981" fill-opacity="0.1" stroke="#10B981" />
      <text x="90" y="28" font-family="Microsoft YaHei" font-size="14" fill="#F8FAFC" text-anchor="middle" font-weight="bold">送风机: 运行中</text>
    </g>

    <!-- 故障状态 (红色警示) -->
    <g transform="translate(220, 0)">
      <rect width="180" height="45" fill="#0F172A" stroke="#94A3B8" stroke-opacity="0.3" />
      <text x="90" y="28" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8" text-anchor="middle">风机故障: 无</text>
    </g>

    <!-- 滤网压差 (高频闪烁) -->
    <g transform="translate(440, 0)">
      <rect width="180" height="45" fill="#7F1D1D" fill-opacity="0.3" stroke="#EF4444" stroke-width="2">
          <animate attributeName="stroke-opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite" />
      </rect>
      <text x="90" y="28" font-family="Microsoft YaHei" font-size="14" fill="#EF4444" font-weight="bold" text-anchor="middle">滤网压差: 告警</text>
    </g>

    <!-- 风机压差 -->
    <g transform="translate(660, 0)">
      <rect width="180" height="45" fill="#0F172A" stroke="#94A3B8" stroke-opacity="0.3" />
      <text x="90" y="28" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8" text-anchor="middle">风机压差: 正常</text>
    </g>
  </g>
</svg>