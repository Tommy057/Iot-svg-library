<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹发光 -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- 离线斜纹背景图案 -->
    <pattern id="offlinePattern" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#475569" stroke-width="2" stroke-opacity="0.2" />
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="#0B1120" />

  <!-- ==================== 中间：动态逻辑连接线 ==================== -->
  <g transform="translate(420, 300)" fill="none">
    <!-- 支路1: 到探测器01 (离线态 - 断开感) -->
    <path d="M 0 0 L 100 0 L 100 -100 L 200 -100" stroke="#475569" stroke-width="2" stroke-dasharray="5,5" />
    <circle cx="210" cy="-100" r="4" fill="#475569" />
    
    <!-- 支路2: 到探测器02 (活动态 - 流光感) -->
    <path d="M 0 0 L 100 0 L 100 100 L 200 100" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.3" />
    <path d="M 0 0 L 100 0 L 100 100 L 200 100" stroke="#10B981" stroke-width="2" stroke-dasharray="20,100">
        <animate attributeName="stroke-dashoffset" values="120;0" dur="1s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- ==================== A：主机 (布防中) ==================== -->
  <g transform="translate(50, 150)">
    <path d="M 0 20 L 20 0 L 350 0 L 370 20 L 370 280 L 350 300 L 20 300 L 0 280 Z" fill="#1E293B" fill-opacity="0.8" stroke="#3B82F6" stroke-width="2" filter="url(#neonGlow)" />
    <text x="25" y="35" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#F8FAFC">系统指挥中心</text>
    
    <g transform="translate(185, 130)">
      <circle r="65" fill="none" stroke="#10B981" stroke-width="1" stroke-opacity="0.2" />
      <circle r="50" fill="none" stroke="#10B981" stroke-width="4" filter="url(#neonGlow)">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
      </circle>
      <text y="8" font-family="Arial" font-size="16" font-weight="bold" fill="#10B981" text-anchor="middle">ARMED</text>
    </g>
  </g>

  <!-- ==================== B：探测器 01 (强制离线视觉) ==================== -->
  <g transform="translate(620, 100)">
    <!-- 1. 背景改用虚线边框，且填充离线纹理 -->
    <rect width="450" height="150" rx="4" fill="url(#offlinePattern)" stroke="#475569" stroke-width="1" stroke-dasharray="4,4" />
    <rect width="450" height="150" rx="4" fill="#1E293B" fill-opacity="0.4" />
    
    <!-- 2. 标题与断开图标 -->
    <g transform="translate(20, 30)">
      <text font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#64748B">01-红外探测器</text>
      <!-- 断开的小图标 (X符号) -->
      <path d="M 125 -10 L 140 5 M 140 -10 L 125 5" stroke="#EF4444" stroke-width="2" />
    </g>
    
    <!-- 3. 离线核心警告 (重点突出) -->
    <g transform="translate(20, 70)">
      <rect width="120" height="24" rx="4" fill="#44403C" />
      <text x="60" y="17" font-family="Arial" font-size="11" font-weight="bold" fill="#94A3B8" text-anchor="middle">CONNECTION LOST</text>
      <!-- 模拟断续的尝试连接灯 -->
      <circle cx="140" cy="12" r="4" fill="#64748B">
        <animate attributeName="fill" values="#64748B;#94A3B8;#64748B" dur="0.1s" repeatCount="10" begin="2s" />
      </circle>
    </g>

    <!-- 4. 无法操作的遮罩感 -->
    <g transform="translate(20, 110)" opacity="0.3">
      <rect width="80" height="25" rx="12" fill="#334155" />
      <text x="90" y="18" font-family="Microsoft YaHei" font-size="11" fill="#64748B">控制已锁定</text>
    </g>

    <!-- 5. 数据区显示横杠 -->
    <text x="350" y="85" font-family="Arial" font-size="32" font-weight="bold" fill="#334155" text-anchor="middle">-- --</text>
  </g>

  <!-- ==================== C：探测器 02 (报警态 - 维持效果) ==================== -->
  <g transform="translate(620, 300)">
    <rect width="450" height="150" rx="4" fill="#1E293B" fill-opacity="0.8" stroke="#EF4444" stroke-width="2" filter="url(#neonGlow)">
        <animate attributeName="stroke-opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite" />
    </rect>
    <text x="20" y="30" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#F8FAFC">02-周界探测器</text>
    
    <!-- 报警核心效果 -->
    <g transform="translate(300, 40)">
      <rect width="120" height="80" fill="#7F1D1D" fill-opacity="0.3" stroke="#EF4444" />
      <text x="60" y="45" font-family="Arial" font-size="24" font-weight="bold" fill="#EF4444" text-anchor="middle">ALARM</text>
      <path d="M 40 55 L 80 55" stroke="#EF4444" stroke-width="3">
        <animate attributeName="opacity" values="1;0;1" dur="0.2s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- 控制开关 -->
    <g transform="translate(20, 100)">
      <rect width="80" height="30" rx="15" fill="#10B981" fill-opacity="0.2" stroke="#10B981" />
      <circle cx="65" cy="15" r="10" fill="#10B981" />
      <text x="95" y="20" font-family="Microsoft YaHei" font-size="12" fill="#10B981">检测中</text>
    </g>
  </g>

</svg>