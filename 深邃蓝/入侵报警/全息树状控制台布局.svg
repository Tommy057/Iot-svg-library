<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 全局背景 -->
  <rect width="1200" height="600" fill="#0B1120" />
  
  <!-- ==================== 信号传输线 (动态逻辑线) ==================== -->
  <g transform="translate(420, 300)" stroke="#3B82F6" stroke-width="2" fill="none">
    <!-- 信号总线 -->
    <path d="M 0 0 L 100 0" stroke-opacity="0.3" />
    <!-- 支路1 (通往探测器01) -->
    <path d="M 100 0 L 100 -100 L 200 -100" stroke-opacity="0.5" stroke-dasharray="10,5">
      <animate attributeName="stroke" values="#3B82F6;#10B981;#3B82F6" dur="2s" repeatCount="indefinite" />
    </path>
    <!-- 支路2 (通往探测器02) -->
    <path d="M 100 0 L 100 100 L 200 100" stroke-opacity="0.5" stroke-dasharray="10,5">
      <animate attributeName="stroke" values="#3B82F6;#10B981;#3B82F6" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- ==================== A：报警主机 (Master Hub) ==================== -->
  <g transform="translate(50, 150)">
    <!-- 玻璃底座 -->
    <path d="M 0 20 L 20 0 L 350 0 L 370 20 L 370 280 L 350 300 L 20 300 L 0 280 Z" 
          fill="#1E293B" fill-opacity="0.8" stroke="#3B82F6" stroke-width="2" filter="url(#neonGlow)" />
    
    <text x="25" y="35" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#F8FAFC">报警主机 (MASTER)</text>
    
    <!-- 主机状态图标 (雷达感) -->
    <g transform="translate(185, 120)">
      <circle r="60" fill="none" stroke="#10B981" stroke-width="1" stroke-opacity="0.3" />
      <circle r="45" fill="none" stroke="#10B981" stroke-width="3" filter="url(#neonGlow)">
        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
      </circle>
      <text y="8" font-family="Arial" font-size="14" font-weight="bold" fill="#10B981" text-anchor="middle">ARMED</text>
    </g>

    <!-- 主机控制按钮: 全局布防/撤防 -->
    <g transform="translate(25, 220)">
      <rect width="150" height="45" rx="4" fill="#10B981" fill-opacity="0.2" stroke="#10B981" />
      <text x="75" y="28" font-family="Microsoft YaHei" font-size="14" fill="#F8FAFC" text-anchor="middle">全局布防</text>
      
      <g transform="translate(170, 0)">
        <rect width="150" height="45" rx="4" fill="#334155" stroke="#94A3B8" />
        <text x="75" y="28" font-family="Microsoft YaHei" font-size="14" fill="#94A3B8" text-anchor="middle">全局撤防</text>
      </g>
    </g>
  </g>

  <!-- ==================== B：探测器 01 (Slave 01) ==================== -->
  <g transform="translate(620, 100)">
    <rect width="450" height="150" rx="4" fill="#1E293B" fill-opacity="0.7" stroke="#3B82F6" stroke-opacity="0.3" />
    <text x="20" y="30" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#F8FAFC">01-红外探测器 (北向)</text>
    
    <!-- 状态指示 (离线状态演示) -->
    <g transform="translate(20, 50)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">状态：</text>
      <text x="40" y="0" font-family="Microsoft YaHei" font-size="12" fill="#64748B">离线 (OFFLINE)</text>
    </g>

    <!-- 探测器控制: 局部布防/撤防 -->
    <g transform="translate(20, 85)">
      <rect width="100" height="35" rx="17" fill="#334155" />
      <circle cx="20" cy="17" r="12" fill="#64748B" />
      <text x="110" y="23" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">单点撤防中</text>
    </g>

    <!-- 报警显示 -->
    <rect x="280" y="40" width="140" height="80" fill="#0F172A" stroke="#334155" />
    <text x="350" y="85" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">无入侵告警</text>
  </g>

  <!-- ==================== C：探测器 02 (Slave 02) ==================== -->
  <g transform="translate(620, 300)">
    <rect width="450" height="150" rx="4" fill="#1E293B" fill-opacity="0.7" stroke="#EF4444" stroke-width="1.5" filter="url(#neonGlow)" />
    <text x="20" y="30" font-family="Microsoft YaHei" font-size="16" font-weight="bold" fill="#F8FAFC">02-周界探测器 (东向)</text>
    
    <!-- 状态指示 (报警状态演示) -->
    <g transform="translate(20, 50)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">状态：</text>
      <text x="40" y="0" font-family="Microsoft YaHei" font-size="12" fill="#EF4444" font-weight="bold">入侵告警!</text>
    </g>

    <!-- 探测器控制: 局部布防 -->
    <g transform="translate(20, 85)">
      <rect width="100" height="35" rx="17" fill="#10B981" fill-opacity="0.2" stroke="#10B981" />
      <circle cx="80" cy="17" r="12" fill="#10B981" />
      <text x="110" y="23" font-family="Microsoft YaHei" font-size="12" fill="#10B981" font-weight="bold">已布防(检测中)</text>
    </g>

    <!-- 报警显示 (红色闪烁) -->
    <rect x="280" y="40" width="140" height="80" fill="#7F1D1D" fill-opacity="0.5" stroke="#EF4444">
        <animate attributeName="fill-opacity" values="0.5;0.1;0.5" dur="0.4s" repeatCount="indefinite" />
    </rect>
    <text x="350" y="85" font-family="Arial" font-size="20" font-weight="bold" fill="#EF4444" text-anchor="middle">ALARM!</text>
  </g>

</svg>