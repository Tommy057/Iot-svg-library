<svg width="1000" height="500" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 状态光晕滤镜 -->
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景底板 -->
  <rect width="1000" height="500" fill="#0B1120" />
  <path d="M 30 20 L 970 20 L 985 35 L 985 465 L 970 480 L 30 480 L 15 465 L 15 35 Z" 
        fill="#1E293B" fill-opacity="0.8" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.2" />

  <!-- ==================== 左侧：设备全局状态区 ==================== -->
  <g transform="translate(40, 50)">
    <text x="0" y="20" font-family="Microsoft YaHei" font-size="22" font-weight="bold" fill="#F8FAFC">终端运行状态</text>
    
    <!-- 全局状态能量柱 (告警变红) -->
    <rect x="0" y="40" width="10" height="380" fill="#334155" rx="5" />
    <rect x="0" y="40" width="10" height="380" fill="#EF4444" rx="5" filter="url(#redGlow)">
      <animate attributeName="height" values="380;300;380" dur="1s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#EF4444;#7F1D1D;#EF4444" dur="1s" repeatCount="indefinite" />
    </rect>

    <!-- 独立告警文字面板 -->
    <g transform="translate(30, 40)">
      <rect width="200" height="80" fill="#7F1D1D" fill-opacity="0.3" stroke="#EF4444" stroke-width="2" filter="url(#redGlow)">
         <animate attributeName="stroke-opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite" />
      </rect>
      <text x="15" y="35" font-family="Arial" font-size="12" fill="#EF4444" font-weight="bold">DEVICE STATUS</text>
      <text x="15" y="60" font-family="Microsoft YaHei" font-size="20" fill="#F8FAFC" font-weight="bold">
        紧急告警!
        <animate attributeName="opacity" values="1;0.4;1" dur="0.5s" repeatCount="indefinite" />
      </text>
    </g>

    <text x="30" y="160" font-family="Monaco" font-size="12" fill="#38BDF8">IP: 10.12.88.105</text>
    <text x="30" y="185" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">温度: 42.5°C (Overheat)</text>
  </g>

  <!-- ==================== 中间：雷达全息扫描区 ==================== -->
  <g transform="translate(450, 250)">
    <!-- 装饰背景环 -->
    <circle r="180" fill="none" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.2" />
    <circle r="120" fill="none" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.2" />
    <path d="M -180 0 L 180 0 M 0 -180 L 0 180" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.2" />

    <!-- 扫描光带 (随告警变色) -->
    <path d="M 0 0 L 0 -180 A 180 180 0 0 1 60 -170 Z" fill="#EF4444" fill-opacity="0.3" filter="url(#redGlow)">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite" />
    </path>
    
    <!-- 告警定位点 -->
    <circle cx="80" cy="-60" r="8" fill="#EF4444" filter="url(#redGlow)">
      <animate attributeName="r" values="4;12;4" dur="0.6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ==================== 右侧：2D 防区拓扑地图 ==================== -->
  <g transform="translate(680, 80)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC">防区空间拓扑 (Topview)</text>
    
    <!-- 模拟建筑平面图轮廓 -->
    <g transform="translate(0, 40)" fill="none" stroke="#3B82F6" stroke-width="1.5">
      <!-- 房间 A (正常) -->
      <rect x="0" y="0" width="120" height="150" stroke-opacity="0.4" />
      <text x="60" y="75" font-family="Microsoft YaHei" font-size="12" fill="#10B981" text-anchor="middle" stroke="none">办公室</text>
      
      <!-- 房间 B (告警红色填充) -->
      <g transform="translate(140, 0)">
        <rect width="140" height="300" stroke="#EF4444" stroke-width="2" filter="url(#redGlow)">
            <animate attributeName="fill" values="rgba(239,68,68,0);rgba(239,68,68,0.2);rgba(239,68,68,0)" dur="1.5s" repeatCount="indefinite" />
        </rect>
        <text x="70" y="150" font-family="Microsoft YaHei" font-size="14" fill="#EF4444" font-weight="bold" text-anchor="middle" stroke="none">仓库 (已入侵!)</text>
        <!-- 传感器图标 -->
        <circle cx="70" cy="20" r="4" fill="#EF4444" stroke="none">
            <animate attributeName="r" values="4;8;4" dur="0.5s" repeatCount="indefinite" />
        </circle>
      </g>

      <!-- 通道 (正常) -->
      <rect x="0" y="170" width="120" height="130" stroke-opacity="0.4" />
      <text x="60" y="235" font-family="Microsoft YaHei" font-size="12" fill="#10B981" text-anchor="middle" stroke="none">走廊</text>
    </g>
  </g>

  <!-- 底部修饰装饰 -->
  <path d="M 40 450 L 960 450" stroke="#3B82F6" stroke-width="1" stroke-dasharray="10,10" stroke-opacity="0.2" />
</svg>