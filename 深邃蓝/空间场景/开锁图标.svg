<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="unlockedGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 锁梁 (打开状态并旋转) -->
  <g transform="rotate(-30, 30, 45)">
    <path d="M 30 45 L 30 30 A 20 20 0 0 1 70 30 L 70 35" fill="none" stroke="#F59E0B" stroke-width="6" stroke-linecap="round" filter="url(#unlockedGlow)" />
  </g>
  
  <!-- 锁体 -->
  <rect x="20" y="45" width="60" height="45" rx="4" fill="#1E293B" fill-opacity="0.8" stroke="#F59E0B" stroke-width="2" />
  
  <!-- 报警脉冲 (中心圆点扩散) -->
  <circle cx="50" cy="67" r="6" fill="#F59E0B" filter="url(#unlockedGlow)">
    <animate attributeName="r" values="6;10;6" dur="0.8s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.2;1" dur="0.8s" repeatCount="indefinite" />
  </circle>

  <!-- 装饰线条 (断开感) -->
  <line x1="25" y1="55" x2="40" y2="55" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.5" />
  <line x1="60" y1="55" x2="75" y2="55" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.5" />
</svg>