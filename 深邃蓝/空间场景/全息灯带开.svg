<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 紫色渐变底座 -->
    <radialGradient id="onBase" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#6B21A8" />
    </radialGradient>
    <!-- 霓虹光晕 -->
    <filter id="purpleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 外围环境氛围圈 (呼吸动效) -->
  <circle cx="90" cy="90" r="75" fill="none" stroke="#A855F7" stroke-width="2" stroke-dasharray="4,4" filter="url(#purpleGlow)" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 90 90" to="360 90 90" dur="10s" repeatCount="indefinite" />
  </circle>

  <!-- 2. 3D 拟物底座 -->
  <rect x="40" y="40" width="100" height="100" rx="20" fill="url(#onBase)" filter="drop-shadow(0 8 10 rgba(0,0,0,0.5))" />
  
  <!-- 3. 核心灯带图标 (流动感) -->
  <g filter="url(#purpleGlow)">
    <path d="M 60 90 L 120 90" stroke="white" stroke-width="8" stroke-linecap="round" stroke-opacity="0.3" />
    <!-- 流动光点 -->
    <path d="M 60 90 L 120 90" stroke="#F8FAFC" stroke-width="8" stroke-linecap="round" stroke-dasharray="10,20">
        <animate attributeName="stroke-dashoffset" values="30;0" dur="0.8s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- 4. 状态标签 -->
  <text x="90" y="160" font-family="Arial" font-size="12" font-weight="bold" fill="#A855F7" text-anchor="middle" letter-spacing="2">STRIP ACTIVE</text>
</svg>