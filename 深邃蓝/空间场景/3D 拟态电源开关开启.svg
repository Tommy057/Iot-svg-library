<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 核心绿色发光渐变 -->
    <radialGradient id="onGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#065F46" />
    </radialGradient>
    <!-- 霓虹发光滤镜 -->
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 外层氛围光晕 -->
  <circle cx="75" cy="75" r="60" fill="none" stroke="#10B981" stroke-width="2" filter="url(#neon)" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- 2. 按钮主体 (3D 凹凸感) -->
  <circle cx="75" cy="75" r="50" fill="url(#onGrad)" filter="drop-shadow(0 6 8 rgba(0,0,0,0.5))" />
  <circle cx="75" cy="75" r="46" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.1" />

  <!-- 3. 电源图标 (发光) -->
  <g filter="url(#neon)">
    <path d="M 75 45 L 75 65 M 60 52 A 20 20 0 1 0 90 52" fill="none" stroke="#F8FAFC" stroke-width="6" stroke-linecap="round" />
  </g>
  
  <!-- 4. 状态文字 -->
  <text x="75" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">SYSTEM ON</text>
</svg>