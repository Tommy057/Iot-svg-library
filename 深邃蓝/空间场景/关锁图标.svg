<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="lockedGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 锁梁 (闭合) -->
  <path d="M 30 45 L 30 30 A 20 20 0 0 1 70 30 L 70 45" fill="none" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round" filter="url(#lockedGlow)" />
  
  <!-- 锁体 (全息厚度感) -->
  <rect x="20" y="45" width="60" height="45" rx="4" fill="#1E293B" fill-opacity="0.8" stroke="#0EA5E9" stroke-width="2" />
  
  <!-- 核心锁芯 (扫描线动画) -->
  <rect x="45" y="60" width="10" height="15" rx="2" fill="#0EA5E9" filter="url(#lockedGlow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </rect>

  <!-- 装饰线条 -->
  <line x1="25" y1="55" x2="75" y2="55" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.3" />
</svg>