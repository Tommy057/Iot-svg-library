<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 锁体渐变 -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#FF8A65" />
    </linearGradient>
    <!-- 锁钩渐变 -->
    <linearGradient id="shackleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BDBDBD" />
      <stop offset="50%" stop-color="#F5F5F5" />
      <stop offset="100%" stop-color="#9E9E9E" />
    </linearGradient>
    <!-- 下沉阴影效果 -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="3"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadow"/>
      <feFlood flood-color="#4E342E" flood-opacity="0.5"/>
      <feComposite in2="shadow" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- 1. 锁钩 (闭合) -->
  <path d="M 60 80 L 60 50 A 40 40 0 0 1 140 50 L 140 80" fill="none" stroke="url(#shackleGrad)" stroke-width="22" stroke-linecap="round" />
  
  <!-- 2. 锁体 -->
  <rect x="40" y="75" width="120" height="100" rx="25" fill="url(#bodyGrad)" filter="drop-shadow(0 10 15 rgba(0,0,0,0.3))" />
  
  <!-- 3. 锁体表面高光 (增加立体感) -->
  <rect x="55" y="85" width="90" height="40" rx="15" fill="white" fill-opacity="0.2" />

  <!-- 4. 钥匙孔 (下沉感) -->
  <g filter="url(#innerShadow)">
    <circle cx="100" cy="115" r="12" fill="#3E2723" fill-opacity="0.8" />
    <path d="M 92 115 L 108 115 L 115 145 L 85 145 Z" fill="#3E2723" fill-opacity="0.8" />
  </g>
</svg>