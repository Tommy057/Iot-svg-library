<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 按钮头部的 3D 渐变 -->
    <radialGradient id="knobGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </radialGradient>
    
    <!-- 开启状态的轨道发光 -->
    <filter id="activeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- 下沉底座的内阴影 -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceAlpha" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.5" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- 1. 下沉轨道 (底座) -->
  <!-- 开启态颜色: #10B981 (绿) / 关闭态颜色: #1E293B (暗) -->
  <rect x="10" y="20" width="180" height="60" rx="30" fill="#0F172A" stroke="#334155" stroke-width="1" />
  <rect x="15" y="25" width="170" height="50" rx="25" fill="#064E3B" filter="url(#innerShadow)" />
  
  <!-- 2. 状态装饰文字 -->
  <text x="55" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="#F8FAFC" fill-opacity="0.2">OFF</text>
  <text x="125" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="#10B981" filter="url(#activeGlow)">ON</text>

  <!-- 3. 3D 拨头 (Knob) -->
  <!-- 开启位置: cx="150" / 关闭位置: cx="50" -->
  <g transform="translate(100, 0)">
    <circle cx="50" cy="50" r="32" fill="url(#knobGrad)" filter="drop-shadow(0 4 6 rgba(0,0,0,0.5))" />
    
    <!-- 拨头中心指示灯 -->
    <circle cx="50" cy="50" r="5" fill="#10B981" filter="url(#activeGlow)">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- 拨头表面的防滑纹理 -->
    <line x1="42" y1="40" x2="42" y2="60" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" />
    <line x1="50" y1="40" x2="50" y2="60" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" />
    <line x1="58" y1="40" x2="58" y2="60" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" />
  </g>
  
</svg>