<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 状态发光滤镜 (绿色) -->
    <filter id="statusGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- 扫描线渐变 -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0" />
      <stop offset="50%" stop-color="#0EA5E9" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- 1. 全局深空背景 -->
  <rect width="1200" height="700" fill="#0B1120" />
  <!-- 背景网格装饰 -->
  <path d="M 0 0 L 1200 0 M 0 350 L 1200 350 M 600 0 L 600 700" stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.05" />

  <!-- 2. 顶部核心状态球 (Status Orb) -->
  <g transform="translate(600, 80)">
    <!-- 呼吸扩散环 (在线:绿色 / 离线:红色) -->
    <circle r="45" fill="none" stroke="#10B981" stroke-width="2" filter="url(#statusGlow)">
      <animate attributeName="r" values="40;55;40" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- 摄像头图标 (全息样式) -->
    <g fill="#10B981" filter="url(#statusGlow)">
      <path d="M -20 -10 L 10 -10 L 20 -20 L 20 20 L 10 10 L -20 10 Z" />
      <circle cx="-5" cy="0" r="15" fill="#0B1120" stroke="#10B981" stroke-width="2" />
      <circle cx="-5" cy="0" r="5" fill="#10B981" />
    </g>
    
    <!-- 状态文字 -->
    <text y="75" font-family="Arial" font-size="16" font-weight="bold" fill="#10B981" text-anchor="middle" letter-spacing="4">DEVICE ONLINE</text>
  </g>

  <!-- 3. 主视频监控窗口 (Main Viewport) -->
  <g transform="translate(250, 180)">
    <!-- 玻璃边框 -->
    <path d="M 0 20 L 20 0 L 680 0 L 700 20 L 700 380 L 680 400 L 20 400 L 0 380 Z" 
          fill="#1E293B" fill-opacity="0.4" stroke="#0EA5E9" stroke-width="2" stroke-opacity="0.6" />
    
    <!-- 模拟视频黑框 -->
    <rect x="10" y="10" width="680" height="380" fill="#000" fill-opacity="0.8" />
    
    <!-- 四角 HUD 装饰 -->
    <path d="M 10 50 L 10 10 L 50 10 M 650 10 L 690 10 L 690 50 M 10 350 L 10 390 L 50 390 M 650 390 L 690 390 L 690 350" 
          fill="none" stroke="#0EA5E9" stroke-width="3" />

    <!-- 动态扫描带 -->
    <rect x="10" y="10" width="680" height="40" fill="url(#scanGrad)">
      <animate attributeName="y" values="10;340;10" dur="4s" repeatCount="indefinite" />
    </rect>

    <!-- 画面内 OSD 信息 -->
    <text x="30" y="40" font-family="Monaco" font-size="12" fill="#F8FAFC" fill-opacity="0.7">CAM-01 | 2024-03-10 14:30:05</text>
    <text x="670" y="40" font-family="Monaco" font-size="12" fill="#10B981" text-anchor="end">LIVE ●</text>
  </g>

  <!-- 4. 左侧面板：设备档案仓 (Device Info) -->
  <g transform="translate(40, 200)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC">设备参数</text>
    <rect x="0" y="10" width="180" height="2" fill="#0EA5E9" />
    
    <g transform="translate(0, 40)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">厂商型号</text>
      <text y="25" font-family="Arial" font-size="14" fill="#38BDF8">HIK-VISION-X1</text>
      
      <text y="60" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">分辨率</text>
      <text y="85" font-family="Arial" font-size="14" fill="#F8FAFC">3840 x 2160 (4K)</text>
      
      <text y="120" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">实时码率</text>
      <text y="145" font-family="Arial" font-size="14" fill="#F8FAFC">8540 kbps</text>
      
      <text y="180" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">编码格式</text>
      <text y="205" font-family="Arial" font-size="14" fill="#F8FAFC">H.265 / HEVC</text>
    </g>
  </g>

  <!-- 5. 右侧面板：运行环境仓 (Telemetry) -->
  <g transform="translate(980, 200)">
    <text x="0" y="0" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#F8FAFC">运行遥测</text>
    <rect x="0" y="10" width="180" height="2" fill="#0EA5E9" />
    
    <g transform="translate(0, 40)">
      <text y="0" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">网络延迟</text>
      <text y="25" font-family="Arial" font-size="18" font-weight="bold" fill="#10B981">12 ms</text>
      
      <!-- 存储进度条 -->
      <text y="60" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">SD卡存储 (85%)</text>
      <rect x="0" y="70" width="180" height="6" rx="3" fill="#334155" />
      <rect x="0" y="70" width="150" height="6" rx="3" fill="#0EA5E9" />
      
      <text y="120" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">信号强度</text>
      <text y="145" font-family="Arial" font-size="14" fill="#F8FAFC">🟢 Excellent (-42dBm)</text>
      
      <text y="180" font-family="Microsoft YaHei" font-size="12" fill="#94A3B8">设备温度</text>
      <text y="205" font-family="Arial" font-size="14" fill="#F8FAFC">38.5 °C</text>
    </g>
  </g>

  <!-- 6. 底部：装饰性动作流 (Action Log Space) -->
  <g transform="translate(250, 600)">
    <rect width="700" height="60" rx="4" fill="#1E293B" fill-opacity="0.3" stroke="#3B82F6" stroke-opacity="0.2" />
    <text x="20" y="35" font-family="Monaco" font-size="12" fill="#94A3B8">
      [LOG] <tspan fill="#38BDF8">14:30:05</tspan> | SYSTEM INITIALIZED... 
      [LOG] <tspan fill="#10B981">14:30:10</tspan> | VIDEO STREAM ESTABLISHED.
    </text>
    <!-- 装饰性闪烁点 -->
    <circle cx="680" cy="30" r="3" fill="#0EA5E9">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </circle>
  </g>

</svg>