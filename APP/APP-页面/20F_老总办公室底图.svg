<svg width="750" height="1000" viewBox="0 0 750 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景底色：浅灰色，模拟工位图背景 -->
  <rect width="750" height="1000" fill="#F4F6F8"/>
  
  <!-- 办公室主体边框 -->
  <rect x="50" y="50" width="650" height="850" rx="8" fill="white" stroke="#333333" stroke-width="3"/>
  
  <!-- 顶部窗户标识（用于挂载窗帘图标） -->
  <line x1="150" y1="50" x2="600" y2="50" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <text x="375" y="40" font-family="PingFang SC, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">落地窗</text>

  <!-- ==================== 办公区 (Executive Desk Area) ==================== -->
  <g id="Desk_Area">
    <!-- 大班台 L型 -->
    <path d="M450 150 H650 V400 H550 V250 H450 V150Z" fill="#F1F5F9" stroke="#333333" stroke-width="2"/>
    <!-- 总裁椅 -->
    <circle cx="580" cy="220" r="25" fill="white" stroke="#333333" stroke-width="2"/>
    <path d="M555 220 Q555 195 580 195 Q605 195 605 220" fill="none" stroke="#333333" stroke-width="2"/>
    <!-- 文字标注 -->
    <text x="550" y="320" font-family="PingFang SC" font-size="18" fill="#94A3B8">办公区</text>
  </g>

  <!-- ==================== 接待区 (Sofa Area) ==================== -->
  <g id="Reception_Area">
    <!-- 三人沙发 -->
    <rect x="100" y="150" width="60" height="180" rx="4" fill="#F1F5F9" stroke="#333333" stroke-width="2"/>
    <!-- 茶几 -->
    <rect x="180" y="180" width="80" height="120" rx="4" fill="white" stroke="#333333" stroke-width="2"/>
    <!-- 单人沙发 x2 -->
    <rect x="280" y="150" width="60" height="60" rx="4" fill="#F1F5F9" stroke="#333333" stroke-width="2"/>
    <rect x="280" y="270" width="60" height="60" rx="4" fill="#F1F5F9" stroke="#333333" stroke-width="2"/>
    <!-- 文字标注 -->
    <text x="180" y="350" font-family="PingFang SC" font-size="18" fill="#94A3B8">接待区</text>
  </g>

  <!-- ==================== 展示/储物区 (Bookshelf) ==================== -->
  <g id="Storage_Area">
    <rect x="50" y="750" width="650" height="50" fill="#F1F5F9" stroke="#333333" stroke-width="2"/>
    <text x="375" y="782" font-family="PingFang SC" font-size="16" fill="#94A3B8" text-anchor="middle">书柜/展示墙</text>
  </g>

  <!-- ==================== 入口 (Entrance) ==================== -->
  <g id="Entrance">
    <path d="M100 900 L180 900" stroke="white" stroke-width="8"/>
    <path d="M100 900 L140 860" stroke="#333333" stroke-width="2"/>
    <text x="130" y="930" font-family="PingFang SC" font-size="16" fill="#333333">入口门</text>
  </g>

  <!-- 房间名称标注 -->
  <rect x="300" y="500" width="150" height="40" rx="20" fill="#333333"/>
  <text x="375" y="528" font-family="PingFang SC" font-size="20" fill="white" font-weight="bold" text-anchor="middle">总裁办公室</text>

</svg>