<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景底色 -->
  <rect width="1200" height="800" fill="#F8FAFC"/>
  
  <!-- 标题与边框 -->
  <rect x="20" y="20" width="1160" height="760" rx="10" stroke="#E2E8F0" stroke-width="2" fill="white"/>
  <text x="50" y="60" font-family="Arial, sans-serif" font-size="24" fill="#64748B" font-weight="bold">18F 智慧卫生间平面布局图</text>

  <!-- ==================== 男卫生间区域 (Left) ==================== -->
  <g id="Male_Restroom">
    <!-- 区域标注 -->
    <rect x="50" y="100" width="500" height="650" rx="8" stroke="#3B82F6" stroke-width="2" stroke-dasharray="8 4" fill="#F0F7FF"/>
    <text x="70" y="140" font-family="Arial, sans-serif" font-size="20" fill="#3B82F6" font-weight="bold">男卫生间 (10 舱位)</text>
    
    <!-- 洗手台区域 -->
    <rect x="420" y="200" width="100" height="450" rx="4" fill="#E2E8F0"/>
    <text x="435" y="425" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" writing-mode="tb">公共洗手区</text>

    <!-- 10个隔间 (左侧5个，右侧5个) -->
    <!-- 左排 -->
    <g id="Male_Stalls_Left">
      <rect x="80" y="200" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="80" y="290" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="80" y="380" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="80" y="470" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="80" y="560" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
    </g>
    <!-- 右排 -->
    <g id="Male_Stalls_Right">
      <rect x="170" y="200" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="170" y="290" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="170" y="380" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="170" y="470" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="170" y="560" width="80" height="80" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
    </g>
    
    <text x="130" y="670" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">请将探测器图标拖拽至方框内</text>
  </g>

  <!-- ==================== 女卫生间区域 (Right) ==================== -->
  <g id="Female_Restroom">
    <!-- 区域标注 -->
    <rect x="650" y="100" width="500" height="650" rx="8" stroke="#EC4899" stroke-width="2" stroke-dasharray="8 4" fill="#FFF1F2"/>
    <text x="670" y="140" font-family="Arial, sans-serif" font-size="20" fill="#EC4899" font-weight="bold">女卫生间 (8 舱位)</text>
    
    <!-- 洗手台区域 -->
    <rect x="680" y="200" width="100" height="450" rx="4" fill="#E2E8F0"/>
    <text x="695" y="425" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" writing-mode="tb">公共洗手区</text>

    <!-- 8个隔间 (2列 x 4排) -->
    <g id="Female_Stalls">
      <rect x="850" y="200" width="100" height="90" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="970" y="200" width="100" height="90" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      
      <rect x="850" y="310" width="100" height="90" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="970" y="310" width="100" height="90" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      
      <rect x="850" y="420" width="100" height="90" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="970" y="420" width="100" height="90" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      
      <rect x="850" y="530" width="100" height="90" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
      <rect x="970" y="530" width="100" height="90" rx="4" stroke="#CBD5E1" fill="white" stroke-width="2"/>
    </g>
    
    <text x="960" y="670" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">请将探测器图标拖拽至方框内</text>
  </g>

  <!-- 装饰线条：代表入口 -->
  <path d="M50 700 L100 700" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
  <text x="60" y="730" font-family="Arial, sans-serif" font-size="12" fill="#64748B">入口</text>
  
  <path d="M1100 700 L1150 700" stroke="#EC4899" stroke-width="6" stroke-linecap="round"/>
  <text x="1110" y="730" font-family="Arial, sans-serif" font-size="12" fill="#64748B">入口</text>

</svg>