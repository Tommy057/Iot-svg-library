<svg width="750" height="1500" viewBox="0 0 750 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- iOS 极柔和投影 -->
    <filter id="ios-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" />
      <feOffset dx="0" dy="4" />
      <feFlood flood-color="#000000" flood-opacity="0.08" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <!-- 陶瓷质感渐变 -->
    <linearGradient id="fixture-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F2F2F7" />
    </linearGradient>

    <!-- 【写实拟物：蹲便器】 -->
    <symbol id="real-squat">
      <rect x="25" y="5" width="40" height="70" rx="12" fill="url(#fixture-grad)" stroke="#D1D1D6" stroke-width="0.8" />
      <path d="M30 15 h30 M30 25 h30 M30 35 h30" stroke="#C7C7CC" stroke-width="1" opacity="0.4" />
      <ellipse cx="45" cy="55" rx="10" ry="12" fill="#AEAEB2" opacity="0.3" />
    </symbol>

    <!-- 【写实拟物：马桶】 -->
    <symbol id="real-sit">
      <path d="M30 5 Q30 0 45 0 L60 0 Q75 0 75 5 L75 50 Q75 65 52.5 65 L37.5 65 Q30 65 30 50 Z" fill="url(#fixture-grad)" stroke="#D1D1D6" stroke-width="0.8" />
      <rect x="35" y="3" width="25" height="10" rx="2" fill="#D1D1D6" />
      <ellipse cx="52.5" cy="40" rx="12" ry="16" fill="white" stroke="#D1D1D6" />
    </symbol>

    <!-- 【男-蹲-无人】 -->
    <symbol id="cell-m-sq-0">
      <rect width="90" height="150" rx="20" fill="white" stroke="#F2F2F7" stroke-width="1" />
      <!-- 核心状态圆 -->
      <circle cx="45" cy="55" r="32" fill="#34C759" />
      <!-- 男生剪影 -->
      <circle cx="45" cy="48" r="7" fill="white" />
      <rect x="34" y="58" width="22" height="15" rx="3" fill="white" />
      <!-- 底部写实组件 -->
      <g transform="translate(0, 100)">
        <use href="#real-squat" />
        <text x="70" y="45" fill="#8E8E93" font-size="12" font-weight="bold">蹲</text>
      </g>
    </symbol>

    <!-- 【女-坐-有人】 -->
    <symbol id="cell-f-si-1">
      <rect width="90" height="150" rx="20" fill="white" stroke="#F2F2F7" stroke-width="1" />
      <circle cx="45" cy="55" r="32" fill="#FF3B30" />
      <!-- 女生剪影 (大裙摆) -->
      <circle cx="45" cy="48" r="7" fill="white" />
      <path d="M30 73 L60 73 L52 58 L38 58 Z" fill="white" />
      <!-- 底部写实组件 -->
      <g transform="translate(0, 100)">
        <use href="#real-sit" />
        <text x="70" y="45" fill="#5856D6" font-size="12" font-weight="bold">坐</text>
      </g>
    </symbol>
  </defs>

  <rect width="750" height="1500" fill="#F2F2F7" />

  <!-- 一层详情展示 -->
  <g transform="translate(25, 40)" filter="url(#ios-soft)">
    <rect width="700" height="900" rx="40" fill="white" />
    <text x="35" y="60" font-family="Arial" font-size="30" font-weight="bold">一层大厅 (1F)</text>
    
    <!-- 7列格栅排列 -->
    <g transform="translate(35, 100)">
      <text fill="#007AFF" font-size="12" font-weight="bold" letter-spacing="1">MALE SECTION</text>
      <g transform="translate(0, 20)">
        <use href="#cell-m-sq-0" x="0" /> <use href="#cell-m-sq-0" x="92" /> <use href="#cell-f-si-1" x="184" transform="translate(0,0)" />
        <use href="#cell-m-sq-0" x="276" /> <use href="#cell-m-sq-0" x="368" /> <use href="#cell-m-sq-0" x="460" />
        <use href="#cell-m-sq-0" x="552" />
      </g>
    </g>

    <g transform="translate(35, 450)">
      <text fill="#FF2D55" font-size="12" font-weight="bold" letter-spacing="1">FEMALE SECTION</text>
      <g transform="translate(0, 20)">
        <use href="#cell-f-si-1" x="0" /> <use href="#cell-f-si-1" x="92" /> <use href="#cell-f-si-1" x="184" />
        <use href="#cell-f-si-1" x="276" /> <use href="#cell-f-si-1" x="368" /> <use href="#cell-f-si-1" x="460" />
        <use href="#cell-f-si-1" x="552" />
      </g>
    </g>
  </g>
</svg>