<svg width="750" height="1000" viewBox="0 0 750 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 页面大背景 -->
  <rect width="750" height="1000" fill="#F4F7F9"/>
  
  <!-- ==================== 男卫生间大容器 ==================== -->
  <g id="Male_Restroom_Container">
    <!-- 背景白卡片 -->
    <rect x="30" y="30" width="690" height="420" rx="24" fill="white" />
    <!-- 蓝色页标 -->
    <path d="M30 54 C30 40.7452 40.7452 30 54 30 H180 V74 H30 V54 Z" fill="#3B82F6"/>
    <text x="50" y="60" font-family="PingFang SC, sans-serif" font-size="24" fill="white" font-weight="bold">男卫生间</text>
    
    <!-- 内部全留白，方便你自由拖拽 50x50 图标 -->
  </g>

  <!-- ==================== 女卫生间大容器 ==================== -->
  <g id="Female_Restroom_Container">
    <!-- 背景白卡片 -->
    <rect x="30" y="480" width="690" height="420" rx="24" fill="white" />
    <!-- 粉色页标 -->
    <path d="M30 504 C30 490.745 40.7452 480 54 480 H180 V524 H30 V504 Z" fill="#F43F5E"/>
    <text x="50" y="510" font-family="PingFang SC, sans-serif" font-size="24" fill="white" font-weight="bold">女卫生间</text>
    
    <!-- 内部全留白 -->
  </g>

  <!-- 底部装饰信息 -->
  <text x="375" y="960" font-family="PingFang SC, sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle">18F A区 · 智慧楼控环境监测</text>
</svg>