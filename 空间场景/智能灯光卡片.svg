<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景定义 (仅供预览使用) -->
  <defs>
    <!-- iOS 风格软阴影 -->
    <filter id="ios-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur" />
      <feOffset dx="0" dy="8" result="offsetblur" />
      <feFlood flood-color="#000000" flood-opacity="0.08" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- 开启状态蓝色渐变 -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5AC8FA" />
      <stop offset="100%" style="stop-color:#007AFF" />
    </linearGradient>
    
    <!-- 细腻白瓷渐变 -->
    <linearGradient id="white-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" />
      <stop offset="100%" style="stop-color:#FBFBFD" />
    </linearGradient>
  </defs>

  <!-- 背景底色 (模拟图纸) -->
  <rect width="800" height="400" fill="#F2F2F7" />

  <!-- ======================== -->
  <!-- 状态一：开启 (ON STATE)   -->
  <!-- ======================== -->
  <g transform="translate(80, 120)" filter="url(#ios-shadow)">
    <!-- 卡片主体 -->
    <rect width="300" height="130" rx="32" fill="url(#white-grad)" />
    <!-- 极细外描边 -->
    <rect width="300" height="130" rx="32" fill="none" stroke="rgba(0,0,0,0.03)" stroke-width="1" />
    
    <!-- 文字区 -->
    <text x="32" y="55" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="600">客厅吊灯</text>
    <text x="32" y="85" fill="#8E8E93" font-family="sans-serif" font-size="14" font-weight="400" letter-spacing="1">已开启</text>

    <!-- 交互按钮 (ON) -->
    <g transform="translate(205, 33)">
      <!-- 按钮发光底座 -->
      <circle cx="32" cy="32" r="32" fill="url(#blue-grad)" />
      <!-- 电源图标 -->
      <g transform="translate(18, 18)">
        <path d="M14 4v12M21.2 8.4a10.2 10.2 0 1 1-14.4 0" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" />
      </g>
    </g>
  </g>

  <!-- ======================== -->
  <!-- 状态二：关闭 (OFF STATE)  -->
  <!-- ======================== -->
  <g transform="translate(420, 120)" filter="url(#ios-shadow)">
    <!-- 卡片主体 -->
    <rect width="300" height="130" rx="32" fill="url(#white-grad)" />
    <!-- 极细外描边 -->
    <rect width="300" height="130" rx="32" fill="none" stroke="rgba(0,0,0,0.03)" stroke-width="1" />
    
    <!-- 文字区 -->
    <text x="32" y="55" fill="#1D1D1F" font-family="sans-serif" font-size="22" font-weight="600" opacity="0.6">玄关筒灯</text>
    <text x="32" y="85" fill="#8E8E93" font-family="sans-serif" font-size="14" font-weight="400" letter-spacing="1">已关闭</text>

    <!-- 交互按钮 (OFF) -->
    <g transform="translate(205, 33)">
      <!-- 按钮底座 -->
      <circle cx="32" cy="32" r="32" fill="#E9E9EB" />
      <!-- 电源图标 -->
      <g transform="translate(18, 18)">
        <path d="M14 4v12M21.2 8.4a10.2 10.2 0 1 1-14.4 0" fill="none" stroke="#8E8E93" stroke-width="3" stroke-linecap="round" />
      </g>
    </g>
  </g>
  
  <text x="400" y="340" text-anchor="middle" fill="#8E8E93" font-size="16">DASIOT High-End Design System | iOS Style</text>
</svg>