<svg width="470" height="300" viewBox="0 0 470 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ios-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="6" />
      <feFlood flood-color="#000000" flood-opacity="0.08" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- 卡片主体 -->
  <rect width="450" height="280" x="10" y="10" rx="36" fill="#FFFFFF" filter="url(#ios-shadow)" />

  <!-- 1. 标题与总开关 -->
  <g transform="translate(35, 45)">
    <text fill="#1D1D1F" font-family="sans-serif" font-size="22" font-weight="700">主卧空调</text>
    <text y="25" fill="#8E8E93" font-size="12">MASTER BEDROOM AC</text>
    
    <!-- 开关 Toggle -->
    <g transform="translate(340, -10)">
       <rect width="55" height="30" rx="15" fill="#34C759" /> <!-- 开启状态 -->
       <circle cx="40" cy="15" r="12" fill="white" filter="url(#ios-shadow)" />
    </g>
  </g>

  <!-- 2. 左侧：温度控制 -->
  <g transform="translate(35, 110)">
    <text x="55" y="65" text-anchor="middle" fill="#1D1D1F" font-family="Arial" font-size="60" font-weight="bold">26<tspan font-size="20" dy="-30">℃</tspan></text>
    
    <!-- 加减按钮 -->
    <g transform="translate(0, 85)">
       <rect width="110" height="40" rx="12" fill="#F2F2F7" />
       <path d="M25 20 L40 20 M75 20 L90 20 M82.5 12.5 L82.5 27.5" stroke="#1D1D1F" stroke-width="2.5" stroke-linecap="round" />
    </g>
  </g>

  <!-- 3. 右侧：模式选择 (图标组) -->
  <g transform="translate(180, 100)">
    <!-- 制冷 (Active) -->
    <circle cx="30" cy="30" r="28" fill="#007AFF" />
    <path d="M30 18 L30 42 M21 24 L39 36 M21 36 L39 24" stroke="white" stroke-width="2.5" />
    
    <!-- 制热 -->
    <circle cx="95" cy="30" r="28" fill="#F2F2F7" />
    <circle cx="95" cy="30" r="10" stroke="#8E8E93" stroke-width="2.5" fill="none" />
    
    <!-- 除湿 -->
    <circle cx="160" cy="30" r="28" fill="#F2F2F7" />
    
    <!-- 新风 -->
    <circle cx="225" cy="30" r="28" fill="#F2F2F7" />
  </g>

  <!-- 4. 右侧下部：风速快选按钮 -->
  <g transform="translate(180, 195)">
    <rect width="255" height="50" rx="18" fill="#F2F2F7" />
    
    <!-- 低风 -->
    <g transform="translate(5, 5)">
      <rect width="80" height="40" rx="14" fill="#FFFFFF" />
      <text x="40" y="25" text-anchor="middle" fill="#1D1D1F" font-size="13" font-weight="bold">低风</text>
    </g>
    <!-- 中风 -->
    <g transform="translate(87, 5)">
      <text x="40" y="25" text-anchor="middle" fill="#8E8E93" font-size="13">中风</text>
    </g>
    <!-- 高风 -->
    <g transform="translate(170, 5)">
      <text x="40" y="25" text-anchor="middle" fill="#8E8E93" font-size="13">高风</text>
    </g>
  </g>
</svg>