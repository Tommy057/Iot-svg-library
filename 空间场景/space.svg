<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" style="background: #020617;">
  <!-- [核心定义] 滤镜与材质库 -->
  <defs>
    <!-- 蓝宝石内发光滤镜 -->
    <filter id="sapphire-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur" />
      <feFlood flood-color="#1E40AF" flood-opacity="0.6" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- 3D 棱镜切面渐变 -->
    <linearGradient id="gem-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0.6" />
    </linearGradient>

    <!-- Q指令高光笔触 -->
    <symbol id="gem-highlight">
      <path d="M 5 2 Q 80 0 155 2" fill="none" stroke="white" stroke-opacity="0.4" stroke-width="1" />
    </symbol>
  </defs>

  <!-- [背景装饰] 全息网格 -->
  <g opacity="0.1">
    <path d="M 0 540 L 1920 540 M 960 0 L 960 1080" stroke="#3b82f6" stroke-width="1" />
    <circle cx="960" cy="540" r="400" fill="none" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="10 10" />
  </g>

  <!-- [左侧：核心控制器] Master Controller -->
  <g transform="translate(100, 240)">
    <!-- 控制器底座 -->
    <rect width="450" height="600" rx="20" fill="url(#gem-gradient)" stroke="#3b82f6" stroke-width="2" filter="url(#sapphire-glow)" />
    <text x="30" y="50" fill="#93c5fd" font-family="Arial" font-size="24" font-weight="bold">SPATIAL MASTER</text>
    <text x="30" y="80" fill="#60a5fa" font-family="Arial" font-size="12" opacity="0.8">DEVICE ID: DASIOT-CTRL-001</text>
    
    <!-- 中央核心宝石按钮 (全息拟态) -->
    <g transform="translate(125, 150)">
      <path d="M 100 0 L 200 60 L 160 180 L 40 180 L 0 60 Z" fill="#1e3a8a" stroke="#60a5fa" stroke-width="3" />
      <path d="M 100 0 L 100 60 M 0 60 L 100 60 L 200 60" stroke="#93c5fd" stroke-opacity="0.5" />
      <!-- Q 指令弧形动态高光 -->
      <path d="M 30 70 Q 100 50 170 70" fill="none" stroke="white" stroke-opacity="0.6">
        <animate attributeName="stroke-opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" />
      </path>
      <text x="100" y="220" text-anchor="middle" fill="#fff" font-size="18">全域场景激活</text>
    </g>

    <!-- 场景快速切换槽 -->
    <g transform="translate(30, 420)">
      <rect width="390" height="140" rx="10" fill="rgba(0,0,0,0.3)" stroke="#1e40af" />
      <circle cx="50" cy="40" r="15" fill="#f59e0b" /> <text x="80" y="45" fill="#fff" font-size="14">全开模式</text>
      <circle cx="50" cy="80" r="15" fill="#1e40af" /> <text x="80" y="85" fill="#fff" font-size="14">节能模式</text>
      <circle cx="50" cy="120" r="15" fill="#ef4444" /> <text x="80" y="125" fill="#fff" font-size="14">全关模式</text>
    </g>
  </g>

  <!-- [右侧：子设备矩阵] 9路灯光回路 -->
  <g transform="translate(650, 240)">
    <!-- 数据流连接线 -->
    <path d="M -100 300 Q 0 300 50 100 M -100 300 Q 0 300 50 300 M -100 300 Q 0 300 50 500" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.3" />
    
    <!-- 遍历生成 3x3 矩阵 (子设备卡片) -->
    <!-- 回路 01 - 03 -->
    <g transform="translate(0, 0)">
      <!-- 单个回路卡片模板 -->
      <g class="light-loop" transform="translate(0,0)">
        <rect width="300" height="160" rx="10" fill="rgba(30, 64, 175, 0.15)" stroke="#3b82f6" stroke-width="1" />
        <use href="#gem-highlight" x="70" y="5" />
        <text x="20" y="40" fill="#93c5fd" font-size="16">回路 01 - 客厅主灯</text>
        <circle cx="260" cy="35" r="8" fill="#1E40AF" filter="url(#sapphire-glow)" /> <!-- 状态指示: 蓝宝石 -->
        
        <!-- SDK 交互区域 (ani_factor 驱动点) -->
        <rect x="20" y="70" width="260" height="60" rx="30" fill="#0f172a" stroke="#1e40af" />
        <text x="150" y="105" text-anchor="middle" fill="#60a5fa" font-size="14">点击切换状态</text>
        <!-- 装饰性声呐环 -->
        <circle cx="50" cy="100" r="10" fill="none" stroke="#3b82f6" opacity="0.5">
            <animate attributeName="r" from="5" to="20" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="0.5" to="0" dur="2s" repeatCount="indefinite" />
        </circle>
      </g>
      
      <!-- 复制出的其他回路 (坐标偏移) -->
      <g transform="translate(350,0)">
        <rect width="300" height="160" rx="10" fill="rgba(30, 64, 175, 0.15)" stroke="#3b82f6" stroke-width="1" />
        <text x="20" y="40" fill="#93c5fd" font-size="16">回路 02 - 餐厅筒灯</text>
        <circle cx="260" cy="35" r="8" fill="#1E40AF" />
      </g>
      <g transform="translate(700,0)">
        <rect width="300" height="160" rx="10" fill="rgba(30, 64, 175, 0.15)" stroke="#3b82f6" stroke-width="1" />
        <text x="20" y="40" fill="#93c5fd" font-size="16">回路 03 - 走廊灯带</text>
        <circle cx="260" cy="35" r="8" fill="#F59E0B" filter="url(#sapphire-glow)" /> <!-- 琥珀金：开启中 -->
      </g>
    </g>

    <!-- 回路 04 - 06 -->
    <g transform="translate(0, 200)">
        <g transform="translate(0,0)"><rect width="300" height="160" rx="10" fill="rgba(30,64,175,0.15)" stroke="#3b82f6" /><text x="20" y="40" fill="#93c5fd">回路 04 - 卧室射灯</text></g>
        <g transform="translate(350,0)"><rect width="300" height="160" rx="10" fill="rgba(30,64,175,0.15)" stroke="#3b82f6" /><text x="20" y="40" fill="#93c5fd">回路 05 - 厨房射灯</text></g>
        <g transform="translate(700,0)"><rect width="300" height="160" rx="10" fill="rgba(30,64,175,0.15)" stroke="#3b82f6" /><text x="20" y="40" fill="#93c5fd">回路 06 - 阳台照明</text></g>
    </g>

    <!-- 回路 07 - 09 -->
    <g transform="translate(0, 400)">
        <g transform="translate(0,0)"><rect width="300" height="160" rx="10" fill="rgba(30,64,175,0.15)" stroke="#3b82f6" /><text x="20" y="40" fill="#93c5fd">回路 07 - 书房台灯</text></g>
        <g transform="translate(350,0)"><rect width="300" height="160" rx="10" fill="rgba(30,64,175,0.15)" stroke="#3b82f6" /><text x="20" y="40" fill="#93c5fd">回路 08 - 卫生间灯</text></g>
        <g transform="translate(700,0)"><rect width="300" height="160" rx="10" fill="rgba(30,64,175,0.15)" stroke="#3b82f6" /><text x="20" y="40" fill="#93c5fd">回路 09 - 景观灯光</text></g>
    </g>
  </g>

  <!-- [HUD 看板信息] -->
  <g transform="translate(1500, 50)">
    <path d="M 0 0 L 300 0 L 320 20 L 320 80 L 300 100 L 0 100 Z" fill="rgba(30, 64, 175, 0.2)" stroke="#3b82f6" />
    <text x="20" y="40" fill="#93c5fd" font-size="14">当前负载: 1.2kW</text>
    <text x="20" y="70" fill="#93c5fd" font-size="14">在线回路: 09 / 09</text>
  </g>
</svg>