<svg width="470" height="320" viewBox="0 0 470 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ios-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="8" />
      <feFlood flood-color="#000000" flood-opacity="0.08" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- 卡片背景 -->
  <rect width="450" height="300" x="10" y="10" rx="40" fill="#FFFFFF" filter="url(#ios-shadow)" />

  <!-- 1. 顶部：名称与总开关 -->
  <g transform="translate(40, 50)">
    <text fill="#1D1D1F" font-family="sans-serif" font-size="22" font-weight="700">主卧空调</text>
    <text y="25" fill="#8E8E93" font-size="12" font-weight="500" letter-spacing="1">MASTER AC UNIT</text>
    
    <!-- 总开关 (iOS Toggle) -->
    <g transform="translate(330, -10)">
       <rect width="60" height="32" rx="16" fill="#34C759" /> <!-- 开启色 -->
       <circle cx="44" cy="16" r="13" fill="white" filter="url(#ios-shadow)" />
    </g>
  </g>

  <!-- 2. 左侧：温度调节区 -->
  <g transform="translate(40, 120)">
    <text x="60" y="55" text-anchor="middle" fill="#1D1D1F" font-family="Arial" font-size="64" font-weight="bold">26<tspan font-size="20" dy="-35">℃</tspan></text>
    
    <!-- 加减控制组 -->
    <g transform="translate(0, 85)">
       <rect width="120" height="48" rx="16" fill="#F2F2F7" />
       <!-- 减号 -->
       <rect x="25" y="23" width="16" height="3" rx="1.5" fill="#1D1D1F" />
       <!-- 分隔线 -->
       <rect x="60" y="12" width="1" height="24" fill="#D1D1D6" />
       <!-- 加号 -->
       <path d="M85 24 L101 24 M93 16 L93 32" stroke="#1D1D1F" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>

  <!-- 3. 右侧：模式矩阵 (带名称) -->
  <g transform="translate(190, 105)">
    <!-- 模式-制冷 (Active) -->
    <g>
      <circle cx="30" cy="30" r="28" fill="#007AFF" />
      <path d="M30 20 L30 40 M23 25 L37 35 M23 35 L37 25" stroke="white" stroke-width="2.5" stroke-linecap="round" />
      <text x="30" y="75" text-anchor="middle" fill="#007AFF" font-size="11" font-weight="bold">制冷</text>
    </g>
    
    <!-- 模式-制热 -->
    <g transform="translate(80, 0)">
      <circle cx="30" cy="30" r="28" fill="#F2F2F7" />
      <path d="M30 22 A8 8 0 1 1 30 38 A8 8 0 1 1 30 22" fill="none" stroke="#8E8E93" stroke-width="2.5" />
      <text x="30" y="75" text-anchor="middle" fill="#8E8E93" font-size="11">制热</text>
    </g>

    <!-- 模式-除湿 -->
    <g transform="translate(160, 0)">
      <circle cx="30" cy="30" r="28" fill="#F2F2F7" />
      <path d="M30 20 C25 30 22 35 22 40 A8 8 0 0 0 38 40 C38 35 35 30 30 20" fill="none" stroke="#8E8E93" stroke-width="2.5" />
      <text x="30" y="75" text-anchor="middle" fill="#8E8E93" font-size="11">除湿</text>
    </g>

    <!-- 模式-新风 -->
    <g transform="translate(240, 0)">
      <circle cx="30" cy="30" r="28" fill="#F2F2F7" />
      <path d="M30 22 L30 38 M22 30 L38 30" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round" />
      <text x="30" y="75" text-anchor="middle" fill="#8E8E93" font-size="11">新风</text>
    </g>
  </g>

  <!-- 4. 右侧下部：风速分段选择 -->
  <g transform="translate(190, 205)">
    <rect width="245" height="52" rx="18" fill="#F2F2F7" />
    <!-- 低风 -->
    <g transform="translate(4, 4)">
       <rect width="77" height="44" rx="14" fill="#FFFFFF" filter="url(#ios-shadow)" />
       <text x="38.5" y="27" text-anchor="middle" fill="#1D1D1F" font-size="13" font-weight="bold">低风</text>
    </g>
    <!-- 中风 -->
    <g transform="translate(85, 4)">
       <text x="38.5" y="27" text-anchor="middle" fill="#8E8E93" font-size="13">中风</text>
    </g>
    <!-- 高风 -->
    <g transform="translate(166, 4)">
       <text x="38.5" y="27" text-anchor="middle" fill="#8E8E93" font-size="13">高风</text>
    </g>
  </g>
</svg>