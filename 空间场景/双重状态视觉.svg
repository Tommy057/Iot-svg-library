<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- iOS 标准软阴影 -->
    <filter id="ios-shadow-pro" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="8" />
      <feFlood flood-color="#000000" flood-opacity="0.07" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    
    <!-- 开启态：状态条渐变 -->
    <linearGradient id="bar-on" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AC8FA" />
      <stop offset="100%" stop-color="#007AFF" />
    </linearGradient>

    <!-- 按钮开启渐变 -->
    <linearGradient id="btn-on" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#007AFF" />
      <stop offset="100%" stop-color="#0056B3" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="300" fill="#F2F2F7" />

  <!-- 【开启状态卡片】 -->
  <g transform="translate(60, 80)" filter="url(#ios-shadow-pro)">
    <!-- 主体卡片 -->
    <rect width="320" height="140" rx="28" fill="#FFFFFF" />
    
    <!-- 1. 颜色指示条：左侧 6px 状态条 -->
    <path d="M 28 0 Q 0 0 0 28 L 0 112 Q 0 140 28 140 L 6 140 L 6 0 Z" fill="url(#bar-on)" />

    <!-- 2. 文字区域 -->
    <text x="35" y="60" fill="#1D1D1F" font-family="sans-serif" font-size="22" font-weight="600">客厅主灯</text>
    <text x="35" y="95" fill="#007AFF" font-family="sans-serif" font-size="14" font-weight="500">RUNNING · 已开启</text>

    <!-- 3. 右侧交互按钮 -->
    <g transform="translate(225, 38)">
      <!-- 背后微光 (增加高级感) -->
      <circle cx="32" cy="32" r="40" fill="#007AFF" opacity="0.08" />
      <circle cx="32" cy="32" r="32" fill="url(#btn-on)" />
      <!-- 电源图标 -->
      <path d="M32 20 L32 32 M42 26 A14 14 0 1 1 22 26" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>

  <!-- 【关闭状态卡片】 -->
  <g transform="translate(420, 80)" filter="url(#ios-shadow-pro)">
    <!-- 主体卡片 -->
    <rect width="320" height="140" rx="28" fill="#FFFFFF" />
    
    <!-- 1. 颜色指示条：灰色 -->
    <path d="M 28 0 Q 0 0 0 28 L 0 112 Q 0 140 28 140 L 6 140 L 6 0 Z" fill="#D1D1D6" />

    <!-- 2. 文字区域 -->
    <text x="35" y="60" fill="#1D1D1F" font-family="sans-serif" font-size="22" font-weight="600" opacity="0.5">走廊射灯</text>
    <text x="35" y="95" fill="#8E8E93" font-family="sans-serif" font-size="14" font-weight="400">STANDBY · 已关闭</text>

    <!-- 3. 右侧交互按钮 -->
    <g transform="translate(225, 38)">
      <circle cx="32" cy="32" r="32" fill="#F2F2F7" stroke="#E5E5EA" stroke-width="1" />
      <!-- 电源图标 -->
      <path d="M32 20 L32 32 M42 26 A14 14 0 1 1 22 26" fill="none" stroke="#C7C7CC" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>
</svg>