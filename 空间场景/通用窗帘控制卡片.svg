<svg width="400" height="280" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ios-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="6" />
      <feFlood flood-color="#000000" flood-opacity="0.08" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- 卡片背景 -->
  <rect width="380" height="260" x="10" y="10" rx="36" fill="#FFFFFF" filter="url(#ios-shadow)" />

  <!-- 1. 顶部状态 -->
  <g transform="translate(35, 45)">
    <text fill="#1D1D1F" font-family="sans-serif" font-size="20" font-weight="700">南侧窗帘 01</text>
    <text y="25" fill="#8E8E93" font-size="12" font-weight="500">当前位置: <tspan fill="#007AFF" font-weight="bold">75%</tspan></text>
  </g>

  <!-- 2. 指令按键区 (上、停、下) -->
  <g transform="translate(35, 100)">
    <!-- 上升 -->
    <g>
      <circle cx="40" cy="40" r="40" fill="#F2F2F7" />
      <path d="M30 45 L40 35 L50 45" fill="none" stroke="#1D1D1F" stroke-width="3" stroke-linecap="round" />
      <text x="40" y="95" text-anchor="middle" fill="#8E8E93" font-size="10">上升</text>
    </g>
    <!-- 停止 -->
    <g transform="translate(115, 0)">
      <circle cx="40" cy="40" r="40" fill="#F2F2F7" />
      <rect x="30" y="30" width="20" height="20" rx="4" fill="#1D1D1F" />
      <text x="40" y="95" text-anchor="middle" fill="#8E8E93" font-size="10">停止</text>
    </g>
    <!-- 下降 -->
    <g transform="translate(230, 0)">
      <circle cx="40" cy="40" r="40" fill="#F2F2F7" />
      <path d="M30 35 L40 45 L50 35" fill="none" stroke="#1D1D1F" stroke-width="3" stroke-linecap="round" />
      <text x="40" y="95" text-anchor="middle" fill="#8E8E93" font-size="10">下降</text>
    </g>
  </g>

  <!-- 3. 滑动调节区 -->
  <g transform="translate(35, 220)">
    <!-- 背景条 -->
    <rect width="310" height="12" rx="6" fill="#F2F2F7" />
    <!-- 填充条 (绑定设定百分比) -->
    <rect width="230" height="12" rx="6" fill="#007AFF" />
    <!-- 滑块 -->
    <circle cx="230" cy="6" r="16" fill="#FFFFFF" stroke="#007AFF" stroke-width="3" />
  </g>
</svg>