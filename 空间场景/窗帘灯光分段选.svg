<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ios-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="6" />
      <feFlood flood-color="#000000" flood-opacity="0.08" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- 背景色 -->
  <rect width="1920" height="1080" fill="#F2F2F7" />

  <!-- [1. 左侧：空间场景控制器] -->
  <g transform="translate(40, 40)">
    <rect width="320" height="1000" rx="40" fill="#FFFFFF" filter="url(#ios-shadow)" />
    <rect x="110" y="60" width="100" height="100" rx="25" fill="#007AFF" />
    <path d="M135 100 L185 100 M135 115 L185 115 M135 130 L160 130" stroke="white" stroke-width="4" stroke-linecap="round" />
    <g transform="translate(40, 220)">
      <text fill="#1D1D1F" font-size="26" font-weight="bold">核心控制器</text>
      <text y="35" fill="#8E8E93" font-size="14" letter-spacing="1">IOS-CORE-MASTER</text>
      <g transform="translate(0, 100)">
        <text fill="#8E8E93" font-size="12">IP 地址</text><text y="30" fill="#1D1D1F" font-size="18" font-weight="600">192.168.1.105</text>
        <text y="80" fill="#8E8E93" font-size="12">设备编码</text><text y="110" fill="#1D1D1F" font-size="18" font-weight="600">DASIOT-2024-X1</text>
        <text y="160" fill="#8E8E93" font-size="12">在线子设备</text><text y="190" fill="#34C759" font-size="24" font-weight="bold">24 <tspan font-size="14" fill="#8E8E93">Units</tspan></text>
      </g>
    </g>
    <g transform="translate(30, 750)">
      <rect width="260" height="60" rx="20" fill="#007AFF" /><text x="130" y="37" text-anchor="middle" fill="#FFFFFF" font-weight="bold">全域开启模式</text>
      <rect y="80" width="260" height="60" rx="20" fill="#F2F2F7" /><text x="130" y="117" text-anchor="middle" fill="#1D1D1F">晚间影院模式</text>
    </g>
  </g>

  <!-- [2. 右侧上半：灯光系统 (5x3 矩阵)] -->
  <g transform="translate(400, 40)">
    <text fill="#8E8E93" font-size="16" font-weight="bold" letter-spacing="2">LIGHTING SYSTEM (15)</text>
    <!-- 仅绘制前几个作为示例布局 -->
    <g transform="translate(0, 30)">
       <g transform="translate(0,0)">
         <rect width="280" height="120" rx="28" fill="#FFFFFF" filter="url(#ios-shadow)" />
         <text x="25" y="45" fill="#1D1D1F" font-weight="bold">01. 会客区吊灯</text>
         <circle cx="240" cy="60" r="28" fill="#007AFF" />
         <path d="M232 55 L240 65 L248 55" fill="none" stroke="white" stroke-width="2" />
       </g>
       <g transform="translate(300,0)">
         <rect width="280" height="120" rx="28" fill="#FFFFFF" filter="url(#ios-shadow)" />
         <text x="25" y="45" fill="#1D1D1F" font-weight="bold">02. 吧台氛围灯</text>
         <circle cx="240" cy="60" r="28" fill="#F2F2F7" /> <!-- 关闭状态 -->
       </g>
       <!-- ... 其它灯光卡片 ... -->
    </g>
  </g>

  <!-- [3. 右侧下半：窗帘系统 (3x3 矩阵 - 快选模式)] -->
  <g transform="translate(400, 480)">
    <text fill="#8E8E93" font-size="16" font-weight="bold" letter-spacing="2">CURTAIN SYSTEM (9)</text>
    
    <!-- 窗帘超级卡片 (3x3 布局，高度略高于灯光) -->
    <g transform="translate(0, 30)">
      <!-- 01. 窗帘设备 -->
      <g transform="translate(0, 0)">
        <rect width="480" height="260" rx="36" fill="#FFFFFF" filter="url(#ios-shadow)" />
        <text x="30" y="50" fill="#1D1D1F" font-size="20" font-weight="bold">01. 南向落地大窗帘</text>
        
        <!-- 状态指示与读百分比 -->
        <g transform="translate(30, 85)">
           <rect width="60" height="70" rx="4" fill="none" stroke="#E5E5EA" stroke-width="2" />
           <rect width="60" height="45" rx="4" fill="#007AFF" opacity="0.4" /> <!-- 动态高度 -->
           <text x="75" y="40" fill="#007AFF" font-size="28" font-weight="bold">75%</text>
           <text x="75" y="65" fill="#8E8E93" font-size="12">CURRENT POSITION</text>
        </g>

        <!-- 动作控制区 (分段式快选) -->
        <g transform="translate(260, 90)">
           <!-- 上升按钮 (指令 1) -->
           <g>
             <circle cx="0" cy="0" r="28" fill="#F2F2F7" />
             <path d="M-8 4 L0 -4 L8 4" fill="none" stroke="#1D1D1F" stroke-width="3" stroke-linecap="round" />
             <text x="0" y="45" text-anchor="middle" fill="#8E8E93" font-size="10">上升</text>
           </g>
           <!-- 停止按钮 (指令 2) -->
           <g transform="translate(90, 0)">
             <circle cx="0" cy="0" r="28" fill="#F2F2F7" />
             <rect x="-10" y="-10" width="20" height="20" rx="4" fill="#1D1D1F" />
             <text x="0" y="45" text-anchor="middle" fill="#8E8E93" font-size="10">停止</text>
           </g>
           <!-- 下降按钮 (指令 0) -->
           <g transform="translate(180, 0)">
             <circle cx="0" cy="0" r="28" fill="#F2F2F7" />
             <path d="M-8 -4 L0 4 L8 -4" fill="none" stroke="#1D1D1F" stroke-width="3" stroke-linecap="round" />
             <text x="0" y="45" text-anchor="middle" fill="#8E8E93" font-size="10">下降</text>
           </g>
        </g>

        <!-- 百分比快选按钮区 -->
        <g transform="translate(30, 210)">
           <!-- 25% -->
           <g>
             <rect width="80" height="32" rx="16" fill="#F2F2F7" />
             <text x="40" y="20" text-anchor="middle" fill="#1D1D1F" font-size="12" font-weight="600">25%</text>
           </g>
           <!-- 50% -->
           <g transform="translate(90, 0)">
             <rect width="80" height="32" rx="16" fill="#F2F2F7" />
             <text x="40" y="20" text-anchor="middle" fill="#1D1D1F" font-size="12" font-weight="600">50%</text>
           </g>
           <!-- 75% -->
           <g transform="translate(180, 0)">
             <rect width="80" height="32" rx="16" fill="#F2F2F7" />
             <text x="40" y="20" text-anchor="middle" fill="#1D1D1F" font-size="12" font-weight="600">75%</text>
           </g>
           <!-- 100% -->
           <g transform="translate(270, 0)">
             <rect width="80" height="32" rx="16" fill="#F2F2F7" />
             <text x="40" y="20" text-anchor="middle" fill="#1D1D1F" font-size="12" font-weight="600">100%</text>
           </g>
        </g>
      </g>
      <!-- ... 复制 3x3 矩阵 ... -->
    </g>
  </g>
</svg>