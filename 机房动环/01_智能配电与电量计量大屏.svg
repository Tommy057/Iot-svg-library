<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
    <rect width="1600" height="900" fill="#0B1120" />
    <g transform="translate(40, 40)">
        <text x="0" y="0" fill="#0EA5E9" font-size="28" font-weight="bold">智能配电与电量计量系统</text>
        <path d="M 0 15 L 1520 15" stroke="#0EA5E9" stroke-width="1" opacity="0.3" />
    </g>

    <!-- 1.3.6 电量仪：总进线参数 -->
    <g transform="translate(40, 100)">
        <rect width="480" height="740" rx="10" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" />
        <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">总进线电量仪 (1.3.6)</text>
        <g transform="translate(20, 60)">
            <text y="0" fill="#475569" font-size="12">三相电压 (V)</text>
            <text y="35" fill="#BAE6FD" font-size="24">Ua: 230.5  Ub: 231.2  Uc: 229.8</text>
            <text y="80" fill="#475569" font-size="12">三相电流 (A)</text>
            <text y="115" fill="#0EA5E9" font-size="24">Ia: 45.2   Ib: 44.8   Ic: 46.1</text>
            <text y="160" fill="#475569" font-size="12">总有功功率 (kW)</text>
            <text y="195" fill="#10B981" font-size="36" font-weight="bold">124.52</text>
            <text y="240" fill="#475569" font-size="12">累计电能 (kWH)</text>
            <text y="275" fill="#BAE6FD" font-size="28">85241.6</text>
        </g>
    </g>

    <!-- 1.3.7 智能配电柜：支路状态 -->
    <g transform="translate(540, 100)">
        <rect width="480" height="740" rx="10" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" />
        <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">智能配电柜支路监控 (1.3.7)</text>
        <g transform="translate(20, 60)">
            <!-- 模拟 120 个支路中的关键显示 -->
            <rect width="130" height="60" rx="4" fill="rgba(16, 185, 129, 0.1)" stroke="#10B981" />
            <text x="10" y="20" fill="#475569" font-size="11">支路 01 状态</text>
            <text x="10" y="45" fill="#10B981" font-size="14" font-weight="bold">闭合/正常</text>
            <!-- 支路电流 -->
            <text x="150" y="45" fill="#BAE6FD" font-size="12">电流: 12.5 A</text>
        </g>
    </g>

    <!-- 1.3.9 PDU 终端 -->
    <g transform="translate(1040, 100)">
        <rect width="520" height="740" rx="10" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" />
        <text x="20" y="35" fill="#BAE6FD" font-size="16" font-weight="bold">PDU 终端监测 (1.3.9)</text>
        <g transform="translate(20, 60)">
            <text y="0" fill="#475569" font-size="12">PDU 总电流</text>
            <text y="40" fill="#0EA5E9" font-size="32" font-weight="bold">16.42 A</text>
            <text y="80" fill="#475569" font-size="12">A/B/C 三组负载百分比</text>
            <rect y="100" width="400" height="20" rx="10" fill="#0F172A" />
            <rect y="100" width="180" height="20" rx="10" fill="#10B981" />
            <text x="410" y="115" fill="#10B981" font-size="14">45%</text>
        </g>
    </g>
</svg>