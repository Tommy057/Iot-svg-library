<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>I Got Love - For DuoDuo</title>
    <style>
        /* 酷炫字体与背景 */
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 50px; background: rgba(0,0,0,0.7); 
            border: 2px solid #ff007b; color: #ff007b;
            cursor: pointer; font-size: 24px; font-weight: bold;
            z-index: 100; transition: all 0.3s;
            box-shadow: 0 0 15px #ff007b;
            border-radius: 50px;
        }
        #start-btn:hover { background: #ff007b; color: #fff; box-shadow: 0 0 30px #ff007b; }

        #overlay-text {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: rgba(255, 128, 171, 0.6); letter-spacing: 8px; font-size: 16px;
            text-transform: uppercase; pointer-events: none;
        }

        #loading-msg {
            position: absolute; top: 60%; width: 100%; text-align: center;
            color: #fff; font-size: 12px; opacity: 0.5;
        }
    </style>
</head>
<body>
    <button id="start-btn">开启：I GOT LOVE 空间</button>
    <div id="loading-msg">确保 song.mp3 与此文件在同一文件夹</div>
    <div id="overlay-text">TUANZI ❤️ DUODUO | EXPERIMENTAL VISUALS</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, analyser, sound, particles;
    const PARTICLE_COUNT = 10000; // 增加粒子数量，更震撼
    const startBtn = document.getElementById('start-btn');

    // 初始化 3D 场景
    function initScene() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 120;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 创建粒子系统
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const originalPositions = new Float32Array(PARTICLE_COUNT * 3);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const r = 50;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            
            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);
            
            originalPositions[i * 3] = positions[i * 3];
            originalPositions[i * 3 + 1] = positions[i * 3 + 1];
            originalPositions[i * 3 + 2] = positions[i * 3 + 2];
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.userData.originalPos = originalPositions; // 存储原始位置用于回弹

        const mat = new THREE.PointsMaterial({
            size: 0.7,
            transparent: true,
            blending: THREE.AdditiveBlending,
            color: 0xff007b,
            opacity: 0.8
        });

        particles = new THREE.Points(geo, mat);
        scene.add(particles);

        window.addEventListener('resize', onWindowResize);
    }

    // 音频加载与分析
    function setupAudio() {
        const listener = new THREE.AudioListener();
        camera.add(listener);

        sound = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();

        // 路径请确保正确，注意大小写
        audioLoader.load('./song.mp3', (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
            sound.setVolume(0.8);
            console.log("音频加载成功");
            startBtn.innerText = "进入：团子与朵朵的空间";
        }, 
        (xhr) => { console.log((xhr.loaded / xhr.total * 100) + '% loaded'); },
        (err) => { 
            console.error("加载失败:", err); 
            startBtn.innerText = "song.mp3 加载失败";
        });

        analyser = new THREE.AudioAnalyser(sound, 256);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        if (analyser) {
            const data = analyser.getFrequencyData();
            const avg = analyser.getAverageFrequency();
            const posAttr = particles.geometry.attributes.position;
            const orig = particles.geometry.userData.originalPos;

            // 1. 根据音频数据让粒子“炸裂”
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
                const ratio = data[i % 128] / 255;
                
                // 向外扩张力
                const force = 1 + (ratio * (avg / 50));
                posAttr.array[ix] = orig[ix] * force;
                posAttr.array[iy] = orig[iy] * force;
                posAttr.array[iz] = orig[iz] * force;
            }
            posAttr.needsUpdate = true;

            // 2. 镜头随低音晃动 (摄像机震动)
            camera.position.z = 120 + Math.sin(Date.now() * 0.01) * (avg / 5);
            
            // 3. 颜色随节奏在 玫红 和 宝蓝 之间切换
            particles.material.color.setHSL(0.9 - (avg / 300), 1, 0.5);
        }

        particles.rotation.y += 0.002;
        particles.rotation.x += 0.001;
        renderer.render(scene, camera);
    }

    // 点击按钮开始
    startBtn.addEventListener('click', () => {
        if (!sound) return;
        
        // 关键：解锁音频上下文
        if (sound.context.state === 'suspended') {
            sound.context.resume();
        }

        if (sound.buffer) {
            sound.play();
            startBtn.style.display = 'none';
            document.getElementById('loading-msg').style.display = 'none';
            console.log("播放开始");
        } else {
            alert("音乐还在加载，请稍等几秒...");
        }
    });

    // 启动
    initScene();
    setupAudio();
    animate();

</script>
</body>
</html>
