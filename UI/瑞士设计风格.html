<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 / FOREVER - 团子与朵朵的海报</title>
    <style>
        /* 导入瑞士排版必备字体 (系统自带 Helvetica/Arial 作为后备) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --cream-white: #F5F5F1;  /* 奶油白 */
            --deep-grey: #1A1A1A;    /* 深沉灰 */
            --accent-blue: #002FA7;  /* 克莱因蓝 */
            --accent-pink: #FFB7C5;  /* 樱花粉 (可选) */
            --active-accent: var(--accent-blue); /* 当前激活色 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #dcdcdc;
            font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px;
        }

        /* 海报主体 */
        .poster {
            width: 500px;
            height: 700px;
            background-color: var(--cream-white);
            color: var(--deep-grey);
            position: relative;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            display: grid;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
        }

        /* 模拟纸张纹理噪声 */
        .poster::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 顶部导航层级 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-top: 4px solid var(--deep-grey);
            padding-top: 10px;
            z-index: 2;
        }

        .serial-number {
            font-weight: 900;
            font-size: 42px;
            line-height: 0.9;
            letter-spacing: -2px;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* 核心视觉区域：高斯模糊照片 */
        .main-visual {
            position: relative;
            margin: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .photo-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* 底层原图 */
        .photo-base {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            opacity: 0.2;
        }

        /* 核心艺术层：高斯模糊+色彩叠加 */
        .photo-artistic {
            position: absolute;
            top: 15%; left: 15%;
            width: 70%; height: 70%;
            object-fit: cover;
            filter: blur(25px) brightness(1.1);
            opacity: 0.8;
            mix-blend-mode: multiply; /* 艺术融合模式 */
        }

        .color-overlay {
            position: absolute;
            top: 15%; left: 15%;
            width: 70%; height: 70%;
            background-color: var(--active-accent);
            mix-blend-mode: overlay;
            opacity: 0.6;
        }

        /* 底部清单排版 */
        footer {
            display: flex;
            flex-direction: column;
            gap: 5px;
            border-bottom: 4px solid var(--deep-grey);
            padding-bottom: 10px;
            z-index: 2;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .total-row {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* 控制台 */
        .controls {
            position: fixed;
            right: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover { background: #f0f0f0; }
    </style>
</head>
<body>

    <div class="poster" id="lovePoster">
        <header>
            <div class="serial-number">01 /<br>FOREVER</div>
            <div class="vertical-text">Memory Archive — 2026</div>
        </header>

        <div class="main-visual">
            <div class="photo-container">
                <!-- 你的照片 dd1.jpg -->
                <img src="dd1.jpg" class="photo-base" alt="DuoDuo">
                <img src="dd1.jpg" class="photo-artistic" alt="DuoDuo Blur">
                <div class="color-overlay"></div>
            </div>
        </div>

        <footer>
            <div class="item-row">
                <span>ITEM 01: FIRST SIGHT</span>
                <span>2023.05.20</span>
            </div>
            <div class="item-row">
                <span>ITEM 02: 10,000 TIMES OF "I LOVE YOU"</span>
                <span>★ ★ ★ ★ ★</span>
            </div>
            <div class="item-row">
                <span>ITEM 03: UNLIMITED ADVENTURES</span>
                <span>∞ IN PROGRESS</span>
            </div>
            <div class="total-row">
                <span>TOTAL COST</span>
                <span>A LIFETIME</span>
            </div>
        </footer>
    </div>

    <div class="controls">
        <p style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">切换点睛色:</p>
        <button onclick="changeColor('#002FA7')">克莱因蓝</button>
        <button onclick="changeColor('#FFB7C5')">樱花粉</button>
        <button onclick="changeColor('#1A1A1A')">深邃黑</button>
        <hr>
        <p style="font-size: 11px; color: #666;">将 dd1.jpg 放入同目录即可显示</p>
    </div>

    <script>
        function changeColor(color) {
            document.documentElement.style.setProperty('--active-accent', color);
        }

        // 提示：你可以使用 html2canvas 库来增加一个一键保存图片的功能
        // 为了保持代码简洁，这里建议直接使用 Mac 的 Cmd+Shift+4 截取中间的海报部分
        // 因为瑞士设计的比例在屏幕观看也非常完美。
    </script>
</body>
</html>
