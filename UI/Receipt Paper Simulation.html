<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D Pro Receipt UI - Physics Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #dcdcdc; font-family: 'Courier New', Courier, monospace; }
        #ui-overlay {
            position: absolute; top: 20px; left: 20px; color: #333;
            pointer-events: none; user-select: none;
        }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <h2 style="margin:0;">THERMAL PRINTER SIM v2.0</h2>
        <p class="hint">左键抓取揉捏 | 顶端自动对齐 | 实时物理模拟</p>
    </div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- 核心配置 ---
    const CONFIG = {
        w: 12, h: 24,
        segW: 18, segH: 36,
        gravity: -0.6,
        friction: 0.97,
        stiffness: 1.2,
        iterations: 18,
        windStrength: 0.04,
        isPrinting: true,
        printProgress: 0 // 0 到 1
    };

    let scene, camera, renderer, clock;
    let particles = [];
    let constraints = [];
    let clothGeometry, clothMesh;
    let grabbedParticle = null;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();

    // --- 1. 物理引擎类 ---
    class Particle {
        constructor(x, y, z) {
            this.pos = new THREE.Vector3(x, y, z);
            this.oldPos = new THREE.Vector3(x, y, z);
            this.initPos = new THREE.Vector3(x, y, z);
            this.acc = new THREE.Vector3(0, 0, 0);
            this.fixed = false;
        }
        update(dt2) {
            if (this.fixed) return;
            let vel = this.pos.clone().sub(this.oldPos).multiplyScalar(CONFIG.friction);
            this.oldPos.copy(this.pos);
            this.pos.add(vel).add(this.acc.multiplyScalar(dt2));
            this.acc.set(0, 0, 0);
        }
    }

    class Constraint {
        constructor(p1, p2, dist) {
            this.p1 = p1; this.p2 = p2; this.dist = dist;
        }
        solve() {
            let diff = this.p1.pos.clone().sub(this.p2.pos);
            let curDist = diff.length();
            if (curDist === 0) return;
            let factor = (curDist - this.dist) / curDist * 0.5 * CONFIG.stiffness;
            let offset = diff.multiplyScalar(factor);
            if (!this.p1.fixed) this.p1.pos.sub(offset);
            if (!this.p2.fixed) this.p2.pos.add(offset);
        }
    }

    // --- 2. 贴图生成 (热敏纸样式) ---
    function createReceiptCanvas() {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 1024;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 512, 1024);
        
        // 头部
        ctx.fillStyle = '#000'; ctx.textAlign = 'center';
        ctx.font = 'bold 40px Courier New'; ctx.fillText('GPU-ACCEL SHOP', 256, 80);
        ctx.font = '20px Courier New'; ctx.fillText('TERMINAL: WEBGL-01', 256, 120);
        
        // 虚线
        ctx.setLineDash([10, 10]); ctx.beginPath(); ctx.moveTo(40, 150); ctx.lineTo(472, 150); ctx.stroke();

        // 购物清单
        const items = [
            ["Default Cube", "1.00", "$0.00"],
            ["Normal Vector (Fresh)", "3.0", "$45.00"],
            ["Ray Tracing Shadows", "1080", "$89.99"],
            ["Stack Overflow Copy", "1", "$250.00"],
            ["Unused Variables", "42", "$0.10"],
            ["Memory Leak (Small)", "1", "$15.00"],
            ["Coffee (Black)", "2", "$9.50"],
            ["Deadlock Fix", "0.5", "$500.00"]
        ];

        let y = 220;
        ctx.textAlign = 'left'; ctx.setLineDash([]);
        items.forEach(item => {
            ctx.font = 'bold 22px Courier New';
            ctx.fillText(item[0], 40, y);
            ctx.font = '18px Courier New';
            ctx.textAlign = 'right';
            ctx.fillText(`${item[1]} x ${item[2]}`, 470, y + 25);
            ctx.textAlign = 'left';
            y += 70;
        });

        // 二维码区域
        ctx.fillRect(180, 800, 150, 150);
        ctx.font = '14px Courier New'; ctx.textAlign = 'center';
        ctx.fillText('SCAN TO FIX ARTIFACTS', 256, 980);

        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = 16;
        return tex;
    }

    // --- 3. 初始化场景 ---
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xcccccc);

        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 45);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        // 灯光
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 20, 10);
        light.castShadow = true;
        light.shadow.mapSize.width = 1024;
        light.shadow.mapSize.height = 1024;
        scene.add(light);

        // 打印机槽 (视觉约束器)
        const slotGeo = new THREE.BoxGeometry(CONFIG.w + 1, 0.5, 0.8);
        const slotMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.1, metalness: 0.8 });
        const slot = new THREE.Mesh(slotGeo, slotMat);
        slot.position.set(0, 15.2, 0); // 放在顶端
        scene.add(slot);

        // 物理系统初始化
        createPhysics();

        // 渲染网格
        clothGeometry = new THREE.PlaneGeometry(CONFIG.w, CONFIG.h, CONFIG.segW, CONFIG.segH);
        const clothMat = new THREE.MeshStandardMaterial({
            map: createReceiptCanvas(),
            side: THREE.DoubleSide,
            roughness: 0.4,
            metalness: 0.05,
        });
        clothMesh = new THREE.Mesh(clothGeometry, clothMat);
        clothMesh.castShadow = true;
        clothMesh.receiveShadow = true;
        scene.add(clothMesh);

        // 事件
        window.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', () => grabbedParticle = null);
        window.addEventListener('resize', onResize);

        animate();
    }

    function createPhysics() {
        const dx = CONFIG.w / CONFIG.segW;
        const dy = CONFIG.h / CONFIG.segH;

        // 粒子：从上往下创建
        for (let j = 0; j <= CONFIG.segH; j++) {
            for (let i = 0; i <= CONFIG.segW; i++) {
                // 初始点全部堆叠在顶部槽位，等待“打印”出来
                const p = new Particle(i * dx - CONFIG.w/2, 15, 0);
                p.initPos.set(i * dx - CONFIG.w/2, 15 - j * dy, 0);
                if (j === 0) p.fixed = true; // 整条顶边绝对固定
                particles.push(p);
            }
        }

        // 约束
        for (let j = 0; j <= CONFIG.segH; j++) {
            for (let i = 0; i <= CONFIG.segW; i++) {
                let idx = j * (CONFIG.segW + 1) + i;
                // 结构约束
                if (i < CONFIG.segW) constraints.push(new Constraint(particles[idx], particles[idx+1], dx));
                if (j < CONFIG.segH) constraints.push(new Constraint(particles[idx], particles[idx+(CONFIG.segW+1)], dy));
                // 弯曲约束 (纸张挺度的核心)
                if (i < CONFIG.segW - 1) constraints.push(new Constraint(particles[idx], particles[idx+2], dx * 2));
                if (j < CONFIG.segH - 1) constraints.push(new Constraint(particles[idx], particles[idx+(CONFIG.segW+1)*2], dy * 2));
            }
        }
    }

    function onDown(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(clothMesh);
        if (hits.length > 0) {
            let p = hits[0].point;
            let bestDist = Infinity;
            particles.forEach(pt => {
                let d = pt.pos.distanceTo(p);
                if (d < bestDist) { bestDist = d; grabbedParticle = pt; }
            });
        }
    }

    function onMove(e) {
        if (!grabbedParticle) return;
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -grabbedParticle.pos.z);
        const target = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, target);
        grabbedParticle.pos.copy(target);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const dt2 = Math.pow(Math.min(clock.getDelta(), 0.03), 2);
        const time = Date.now() * 0.001;

        // 1. 打印逻辑 (逐渐释放粒子到其初始高度)
        if (CONFIG.isPrinting) {
            CONFIG.printProgress += 0.008;
            if (CONFIG.printProgress >= 1) CONFIG.isPrinting = false;
        }

        // 2. 物理更新
        particles.forEach((p, i) => {
            if (p.fixed) return;

            // 模拟打印展开：如果还没打印到这一行，粒子紧跟前一行
            const row = Math.floor(i / (CONFIG.segW + 1));
            const rowProgress = row / CONFIG.segH;
            
            if (rowProgress > CONFIG.printProgress) {
                // 还没打印出来的行，保持在槽口附近抖动
                p.pos.y = 15; 
                p.oldPos.copy(p.pos);
            } else {
                // 应用重力
                p.acc.add(new THREE.Vector3(0, CONFIG.gravity, 0));
                // 应用环境风力
                const wind = Math.sin(time + p.pos.y * 0.3) * CONFIG.windStrength;
                p.acc.add(new THREE.Vector3(wind, 0, wind * 0.2));
                
                p.update(dt2);
            }
        });

        if (grabbedParticle) grabbedParticle.acc.set(0, 0, 0);

        // 3. 约束迭代 (多次迭代保证刚性)
        for (let n = 0; n < CONFIG.iterations; n++) {
            constraints.forEach(c => c.solve());
            // 防御性编程：再次强制顶边粒子回位
            for(let i=0; i<=CONFIG.segW; i++) {
                particles[i].pos.copy(particles[i].initPos);
            }
        }

        // 4. 同步到网格
        const posAttr = clothGeometry.attributes.position;
        for (let i = 0; i < particles.length; i++) {
            posAttr.setXYZ(i, particles[i].pos.x, particles[i].pos.y, particles[i].pos.z);
        }
        posAttr.needsUpdate = true;
        clothGeometry.computeVertexNormals();

        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
