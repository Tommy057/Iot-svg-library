<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D Interactive Physics Receipt</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e0e0e0; font-family: sans-serif; }
        #instructions {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none; color: #666; font-size: 14px;
            background: rgba(255,255,255,0.7); padding: 10px; border-radius: 5px;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="instructions">
    <b>GL-MART 交互小票</b><br>
    • 鼠标左键：抓取并揉捏小票<br>
    • 物理特性：顶部全固定，Verlet 约束系统
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';

/**
 * 物理参数配置
 */
const CONF = {
    SEG_W: 16,
    SEG_H: 32,
    WIDTH: 4,
    HEIGHT: 8,
    GRAVITY: -0.015,
    FRICTION: 0.98,
    ITERATIONS: 10,
    STIFFNESS: 0.8,
    BENDING: 0.5
};

// --- 初始化场景 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, -2, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// 灯光
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 5, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

// --- 创建小票贴图 (Canvas) ---
function createReceiptTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');

    // 背景
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 装饰线条
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(20, 140); ctx.lineTo(492, 140); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20, 850); ctx.lineTo(492, 850); ctx.stroke();
    ctx.setLineDash([]);

    // 文字内容
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.font = 'bold 40px Courier New';
    ctx.fillText('*** GL-MART ***', 256, 80);
    ctx.font = '18px Courier New';
    ctx.fillText('Order #777-WEBGL-2024', 256, 110);

    ctx.textAlign = 'left';
    ctx.font = '22px Courier New';
    const items = [
        ['Overdraw Headache', '1', '$99.00'],
        ['Baked Normals (Fresh)', '500g', '$12.50'],
        ['Draw Call Coffee', '3', '$15.00'],
        ['Non-Manifold Geometry', '1', '-$5.00'],
        ['Global Illumination', '99', '$0.00'],
        ['Z-Fighting Insurance', '1', '$42.00'],
        ['Useless Polygons', '12k', '$1.99'],
        ['Infinite Loop Donut', '2', '$8.88']
    ];

    let y = 200;
    items.forEach(item => {
        ctx.fillText(item[0], 40, y);
        ctx.textAlign = 'right';
        ctx.fillText(item[2], 470, y);
        ctx.textAlign = 'left';
        y += 40;
    });

    ctx.font = 'bold 30px Courier New';
    ctx.fillText('TOTAL: $174.37', 40, 800);
    
    // 条形码模拟
    ctx.fillStyle = '#000';
    for(let i=0; i<40; i++) {
        const w = Math.random() * 8 + 2;
        ctx.fillRect(100 + i*8, 880, w, 60);
    }
    ctx.textAlign = 'center';
    ctx.font = '14px Courier New';
    ctx.fillText('SCAN TO FIX ARTIFACTS', 256, 960);

    const tex = new THREE.CanvasTexture(canvas);
    tex.anisotropy = 16;
    return tex;
}

// --- 物理系统初始化 ---
const geometry = new THREE.PlaneGeometry(CONF.WIDTH, CONF.HEIGHT, CONF.SEG_W, CONF.SEG_H);
const material = new THREE.MeshPhysicalMaterial({
    map: createReceiptTexture(),
    side: THREE.DoubleSide,
    roughness: 0.4,
    metalness: 0.0,
    clearcoat: 0.3,
    clearcoatRoughness: 0.2,
    emissive: new THREE.Color(0x111111)
});
const mesh = new THREE.Mesh(geometry, material);
mesh.castShadow = true;
mesh.receiveShadow = true;
scene.add(mesh);

const particles = [];
const constraints = [];
const posAttr = geometry.attributes.position;

// 生成粒子
for (let i = 0; i < posAttr.count; i++) {
    const v = new THREE.Vector3().fromBufferAttribute(posAttr, i);
    const isFixed = (v.y === CONF.HEIGHT / 2); // 顶部边缘 y 最大，全固定
    particles.push({
        pos: v.clone(),
        oldPos: v.clone(),
        vel: new THREE.Vector3(),
        fixed: isFixed,
        mass: 1
    });
}

// 添加约束辅助函数
function addConstraint(a, b, stiffness) {
    const dist = particles[a].pos.distanceTo(particles[b].pos);
    constraints.push({ a, b, dist, stiffness });
}

// 构建物理网格约束
for (let y = 0; y <= CONF.SEG_H; y++) {
    for (let x = 0; x <= CONF.SEG_W; x++) {
        const idx = y * (CONF.SEG_W + 1) + x;
        // 结构约束 (相邻粒子)
        if (x < CONF.SEG_W) addConstraint(idx, idx + 1, CONF.STIFFNESS);
        if (y < CONF.SEG_H) addConstraint(idx, idx + (CONF.SEG_W + 1), CONF.STIFFNESS);
        
        // 剪切约束 (斜向，防扭曲)
        if (x < CONF.SEG_W && y < CONF.SEG_H) {
            addConstraint(idx, idx + (CONF.SEG_W + 1) + 1, CONF.STIFFNESS);
            addConstraint(idx + 1, idx + (CONF.SEG_W + 1), CONF.STIFFNESS);
        }

        // 弯曲约束 (跨级，模拟纸张刚性)
        if (x < CONF.SEG_W - 1) addConstraint(idx, idx + 2, CONF.BENDING);
        if (y < CONF.SEG_H - 1) addConstraint(idx, idx + 2 * (CONF.SEG_W + 1), CONF.BENDING);
    }
}

// --- 交互系统 ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let draggedParticleIdx = -1;

window.addEventListener('mousedown', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(mesh);
    if (intersects.length > 0) {
        // 找到最近的非固定粒子
        const face = intersects[0].face;
        const indices = [face.a, face.b, face.c];
        let minDist = Infinity;
        indices.forEach(idx => {
            const d = intersects[0].point.distanceTo(particles[idx].pos);
            if (d < minDist && !particles[idx].fixed) {
                minDist = d;
                draggedParticleIdx = idx;
            }
        });
        isDragging = true;
    }
});

window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

window.addEventListener('mouseup', () => {
    isDragging = false;
    draggedParticleIdx = -1;
});

// --- 物理更新循环 ---
function updatePhysics() {
    // 1. Verlet 积分
    particles.forEach((p, i) => {
        if (p.fixed) return;

        // 处理抓取
        if (isDragging && i === draggedParticleIdx) {
            const target = new THREE.Vector3();
            // 将鼠标屏幕坐标映射到 3D 空间
            const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z; // 简化平面投影
            const pos = camera.position.clone().add(dir.multiplyScalar(distance));
            
            p.pos.lerp(pos, 0.2); // 平滑跟随
        } else {
            // 普通重力与惯性
            const temp = p.pos.clone();
            p.vel.subVectors(p.pos, p.oldPos).multiplyScalar(CONF.FRICTION);
            p.pos.add(p.vel);
            p.pos.y += CONF.GRAVITY;
            p.oldPos.copy(temp);
        }
    });

    // 2. 满足约束 (多次迭代以增加硬度)
    for (let n = 0; n < CONF.ITERATIONS; n++) {
        constraints.forEach(c => {
            const p1 = particles[c.a];
            const p2 = particles[c.b];
            
            const diff = new THREE.Vector3().subVectors(p2.pos, p1.pos);
            const currentDist = diff.length();
            const error = (currentDist - c.dist) / currentDist;
            const correction = diff.multiplyScalar(error * 0.5 * c.stiffness);

            if (!p1.fixed) p1.pos.add(correction);
            if (!p2.fixed) p2.pos.sub(correction);
        });
    }

    // 3. 同步到渲染模型
    const positions = mesh.geometry.attributes.position.array;
    particles.forEach((p, i) => {
        positions[i * 3] = p.pos.x;
        positions[i * 3 + 1] = p.pos.y;
        positions[i * 3 + 2] = p.pos.z;
    });
    mesh.geometry.attributes.position.needsUpdate = true;
    mesh.geometry.computeVertexNormals(); // 必须重新计算法线以保证光影正确
}

// --- 渲染循环 ---
function animate() {
    requestAnimationFrame(animate);
    updatePhysics();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();

</script>
</body>
</html>
