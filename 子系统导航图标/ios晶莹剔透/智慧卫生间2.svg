<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 背景：粉白渐变 (完全对标源文件) -->
    <linearGradient id="bg_gradient_light" x1="100" y1="100" x2="924" y2="924" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="0.4" stop-color="#FFF0F3" />
      <stop offset="1" stop-color="#FFD1DC" />
    </linearGradient>

    <!-- 2. 蓝宝石球体渐变 (完全对标源文件) -->
    <radialGradient id="gem_gradient_light" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(90) scale(400)">
      <stop stop-color="#7DF9FF" /> 
      <stop offset="0.6" stop-color="#0072FF" /> 
      <stop offset="1" stop-color="#002060" />   
    </radialGradient>

    <!-- 3. 玻璃高光 (完全对标源文件) -->
    <linearGradient id="shine_light" x1="512" y1="232" x2="512" y2="532" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- 4. 阴影滤镜 -->
    <filter id="shadow_light" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="30" />
      <feOffset dx="0" dy="30" result="offsetblur"/>
      <feFlood flood-color="#0055FF" flood-opacity="0.4"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="240" fill="url(#bg_gradient_light)"/>
  <rect x="10" y="10" width="1004" height="1004" rx="230" stroke="white" stroke-opacity="0.6" stroke-width="4"/>

  <!-- 图标主体 -->
  <g filter="url(#shadow_light)">
    
    <!-- 蓝色玻璃球 -->
    <circle cx="512" cy="512" r="320" fill="url(#gem_gradient_light)"/>
    
    <!-- 内部核心图标：WC男女符号 + 激光扫描线 -->
    <g transform="translate(512, 512)">
      
      <!-- 男士符号 -->
      <g transform="translate(-140, -110)">
        <circle cx="60" cy="50" r="45" fill="white"/>
        <path d="M10 110 C 10 100, 110 100, 110 110 L 110 240 L 10 240 Z" fill="white" opacity="0.9"/>
      </g>
      
      <!-- 中间分割线 (虚线感) -->
      <rect x="-5" y="-30" width="10" height="230" rx="5" fill="white" opacity="0.3"/>
      
      <!-- 女士符号 -->
      <g transform="translate(20, -110)">
        <circle cx="60" cy="50" r="45" fill="white"/>
        <path d="M60 110 L 0 240 H 120 L 60 110 Z" fill="white" opacity="0.9"/>
      </g>

      <!-- 核心：激光探测扫描线 (横跨符号，体现激光检测) -->
      <!-- 这一行亮青色的线代表激光雷达的扫描平面 -->
      <rect x="-180" y="20" width="360" height="10" rx="5" fill="#7DF9FF">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
      </rect>
      <!-- 扫描光晕 -->
      <rect x="-180" y="15" width="360" height="20" rx="10" fill="#7DF9FF" opacity="0.3" />

      <!-- 顶部传感器发射波束 -->
      <path d="M-60 -160 Q 0 -220 60 -160" stroke="white" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.6"/>

    </g>

    <!-- 能量中心光晕 -->
    <circle cx="512" cy="512" r="160" fill="white" fill-opacity="0.12"/>

    <!-- 玻璃表面质感 -->
    <ellipse cx="512" cy="352" rx="220" ry="140" fill="url(#shine_light)"/>
    <circle cx="512" cy="512" r="310" stroke="white" stroke-opacity="0.15" stroke-width="10"/>
    
    <!-- 底部反光 -->
    <path d="M350 682 Q 512 782 674 682" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="10" stroke-linecap="round"/>

  </g>
</svg>