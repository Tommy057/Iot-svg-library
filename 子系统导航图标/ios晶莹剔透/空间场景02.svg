<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：完全复刻源文件 -->
    <linearGradient id="bg_gradient_light" x1="100" y1="100" x2="924" y2="924" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="0.4" stop-color="#FFF0F3" />
      <stop offset="1" stop-color="#FFD1DC" />
    </linearGradient>

    <!-- 蓝宝石材质：完全复刻源文件颜色 -->
    <radialGradient id="gem_gradient_light" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 480) rotate(90) scale(400)">
      <stop stop-color="#7DF9FF" /> 
      <stop offset="0.6" stop-color="#0072FF" /> 
      <stop offset="1" stop-color="#002060" />   
    </radialGradient>

    <!-- 玻璃高光 -->
    <linearGradient id="shine_light" x1="512" y1="250" x2="512" y2="550" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- 蓝色投影 -->
    <filter id="shadow_light" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="30" />
      <feOffset dx="0" dy="30" result="offsetblur"/>
      <feFlood flood-color="#0055FF" flood-opacity="0.4"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="240" fill="url(#bg_gradient_light)"/>
  <rect x="10" y="10" width="1004" height="1004" rx="230" stroke="white" stroke-opacity="0.6" stroke-width="4"/>

  <g filter="url(#shadow_light)">
    <!-- 形状变化：不再是圆，采用圆角方盘形状，呼应“信息发布”图标 -->
    <rect x="232" y="280" width="560" height="480" rx="80" fill="url(#gem_gradient_light)"/>
    
    <!-- 内部子图标：灯光、空调、窗帘的抽象组合（白色纯净风格） -->
    <g transform="translate(512, 520)">
      <!-- 灯泡 -->
      <circle cx="-130" cy="-60" r="40" fill="white" opacity="0.9"/>
      <rect x="-145" cy="-20" width="30" height="10" rx="2" fill="white"/>
      <!-- 雪花/空调 -->
      <path d="M100 -100 V -20 M60 -60 H 140 M70 -90 L 130 -30 M130 -90 L 70 -30" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <!-- 窗帘 -->
      <rect x="-80" y="60" width="160" height="10" rx="5" fill="white"/>
      <path d="M-60 80 V 160 M60 80 V 160" stroke="white" stroke-width="12" stroke-linecap="round" stroke-opacity="0.8"/>
    </g>

    <!-- 玻璃表面质感 -->
    <rect x="232" y="280" width="560" height="240" rx="80" fill="url(#shine_light)" opacity="0.6"/>
    <rect x="242" y="290" width="540" height="460" rx="70" stroke="white" stroke-opacity="0.1" stroke-width="10"/>
  </g>
</svg>