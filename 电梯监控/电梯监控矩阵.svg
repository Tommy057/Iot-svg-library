<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. 背景层：深空蓝 + 20px 科技网格 -->
    <rect width="1600" height="900" fill="#0B1120" />
    <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(14, 165, 233, 0.05)" stroke-width="1"/>
        </pattern>
        
        <!-- 毛玻璃容器滤镜 -->
        <filter id="glass-blur">
            <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
        </filter>
        
        <!-- 3. 3D 拟物阴影 (Claymorphism) -->
        <filter id="clay-shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
            <feDropShadow dx="-2" dy="-2" stdDeviation="4" flood-color="rgba(255,255,255,0.05)"/>
        </filter>
        
        <!-- 霓虹发光 -->
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <rect width="1600" height="900" fill="url(#grid)" />

    <!-- 2. 标题栏：全息 HUD 线条 -->
    <g transform="translate(40, 30)">
        <text x="0" y="20" fill="#0EA5E9" font-family="Arial" font-weight="bold" font-size="24" filter="url(#neon-glow)">ELEVATOR SURVEILLANCE MATRIX</text>
        <text x="0" y="45" fill="#475569" font-family="Arial" font-size="12">SYSTEM STATUS: OPTIMAL | 60 ACTIVE NODES</text>
        <path d="M 0 60 L 400 60 L 420 40" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.6" />
    </g>

    <!-- 3. 监控矩阵 (10x6 演示部分) -->
    <!-- 我们这里绘制前几个作为范例，展示三种状态：正常、告警、离线 -->
    <g transform="translate(40, 100)">
        <!-- 循环渲染逻辑展示 -->
        <!-- 第一行：正常运行 -->
        <g id="cells">
            <!-- 单元格生成器范例 -->
            <rect x="0" y="0" width="140" height="90" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" filter="url(#clay-shadow)"/>
            <text x="10" y="20" fill="#BAE6FD" font-family="Arial" font-size="10">LIFT-01</text>
            <!-- 模拟视频画面 -->
            <rect x="5" y="25" width="130" height="55" rx="4" fill="#000" opacity="0.6"/>
            <!-- 全息扫描线 -->
            <line x1="5" y1="40" x2="135" y2="40" stroke="#0EA5E9" stroke-width="1" opacity="0.8">
                <animate attributeName="y1" values="25;80;25" dur="3s" repeatCount="indefinite" />
                <animate attributeName="y2" values="25;80;25" dur="3s" repeatCount="indefinite" />
            </line>
            <!-- HUD 四角 -->
            <path d="M 5 35 L 5 25 L 15 25" fill="none" stroke="#0EA5E9" stroke-width="1"/>
            
            <!-- 单元格 02 (告警演示) -->
            <g transform="translate(155, 0)">
                <rect x="0" y="0" width="140" height="90" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#EF4444" stroke-width="2" filter="url(#clay-shadow)"/>
                <text x="10" y="20" fill="#EF4444" font-family="Arial" font-size="10" font-weight="bold">LIFT-02 [ALARM]</text>
                <rect x="5" y="25" width="130" height="55" rx="4" fill="#EF4444" opacity="0.2"/>
                <!-- 红色扫描线 -->
                <line x1="5" y1="25" x2="135" y2="25" stroke="#EF4444" stroke-width="2">
                    <animate attributeName="y1" values="25;80;25" dur="1s" repeatCount="indefinite" />
                    <animate attributeName="y2" values="25;80;25" dur="1s" repeatCount="indefinite" />
                </line>
            </g>

            <!-- 单元格 03 (离线演示) -->
            <g transform="translate(310, 0)">
                <rect x="0" y="0" width="140" height="90" rx="8" fill="rgba(15, 23, 42, 0.9)" stroke="#475569" stroke-width="1"/>
                <!-- 斜纹遮罩模拟离线 -->
                <defs>
                    <pattern id="diagonalHatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <line x1="0" y1="0" x2="0" y2="10" stroke="#475569" stroke-width="1" />
                    </pattern>
                </defs>
                <rect x="5" y="25" width="130" height="55" rx="4" fill="url(#diagonalHatch)" opacity="0.5"/>
                <text x="10" y="20" fill="#475569" font-family="Arial" font-size="10">LIFT-03 [OFFLINE]</text>
            </g>
            
            <!-- 更多单元格占位 (快速平铺展示规模) -->
            <g transform="translate(465, 0)">
                 <rect x="0" y="0" width="140" height="90" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
                 <text x="10" y="20" fill="#BAE6FD" font-family="Arial" font-size="10" opacity="0.5">LIFT-04</text>
            </g>
            <g transform="translate(620, 0)">
                 <rect x="0" y="0" width="140" height="90" rx="8" fill="rgba(30, 41, 59, 0.7)" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
            </g>
            <!-- ...以此类推平铺至60个 -->
        </g>
    </g>

    <!-- 4. 右侧人工干预控制面板 (Claymorphism Style) -->
    <g transform="translate(1380, 100)">
        <text x="0" y="-10" fill="#BAE6FD" font-family="Arial" font-size="14" font-weight="bold">COMMAND CENTER</text>
        
        <!-- 拟物化按钮：紧急锁定 -->
        <g transform="translate(0, 20)">
            <rect width="180" height="50" rx="25" fill="#EF4444" filter="url(#clay-shadow)" />
            <!-- 按钮高光边缘 -->
            <ellipse cx="90" cy="15" rx="60" ry="10" fill="white" opacity="0.2" />
            <text x="90" y="32" fill="white" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">EMERGENCY LOCK</text>
        </g>
        
        <!-- 拟物化按钮：人工标记告警 -->
        <g transform="translate(0, 90)">
            <rect width="180" height="50" rx="25" fill="#F59E0B" filter="url(#clay-shadow)" />
            <ellipse cx="90" cy="15" rx="60" ry="10" fill="white" opacity="0.2" />
            <text x="90" y="32" fill="white" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">MANUAL ALARM</text>
        </g>

        <!-- 拟物化按钮：状态解除 -->
        <g transform="translate(0, 160)">
            <rect width="180" height="50" rx="25" fill="#10B981" filter="url(#clay-shadow)" />
            <ellipse cx="90" cy="15" rx="60" ry="10" fill="white" opacity="0.2" />
            <text x="90" y="32" fill="white" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">RESET SYSTEM</text>
        </g>

        <!-- 选中项详情全息框 -->
        <g transform="translate(0, 250)">
            <rect width="180" height="240" rx="12" fill="rgba(14, 165, 233, 0.1)" stroke="#0EA5E9" stroke-dasharray="4 2" />
            <text x="90" y="30" fill="#0EA5E9" font-family="Arial" font-size="12" text-anchor="middle">TARGET SELECTION</text>
            <text x="90" y="120" fill="#475569" font-family="Arial" font-size="10" text-anchor="middle">NO ACTIVE SELECTION</text>
        </g>
    </g>

    <!-- 底部全息装饰 -->
    <path d="M 40 860 L 1560 860" stroke="#0EA5E9" stroke-width="1" opacity="0.3" stroke-dasharray="10 5" />
</svg>