<svg width="640" height="380" viewBox="0 0 640 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ios_soft_shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="rgba(0,0,0,0.06)"/>
    </filter>
  </defs>

  <!-- 1. 主面板卡片 -->
  <rect width="640" height="380" rx="40" fill="white" filter="url(#ios_soft_shadow)"/>
  <rect x="0.5" y="0.5" width="639" height="379" rx="39.5" stroke="rgba(0,0,0,0.03)"/>

  <!-- 标题区 -->
  <g transform="translate(30, 30)">
    <rect width="4" height="20" rx="2" fill="#007AFF"/>
    <text x="14" y="16" font-family="PingFang SC" font-size="18" font-weight="600" fill="#1D1D1F">电梯运行概况统计</text>
  </g>

  <!-- 2. 统计卡片网格 -->

  <!-- [1] 设备总数 (蓝 - iOS Stack Style) -->
  <g transform="translate(30, 75)">
    <rect width="180" height="120" rx="30" fill="#F0F7FF"/>
    <!-- 图标 -->
    <rect x="25" y="32" width="18" height="18" rx="5" stroke="#007AFF" stroke-width="2.5" fill="#007AFF" fill-opacity="0.15"/>
    <rect x="34" y="41" width="18" height="18" rx="5" stroke="#007AFF" stroke-width="2.5" fill="white"/>
    <text x="155" y="65" text-anchor="end" font-family="Arial" font-size="36" font-weight="bold" fill="#1D1D1F">26</text>
    <text x="155" y="95" text-anchor="end" font-family="PingFang SC" font-size="13" fill="#8E8E93">设备总数</text>
  </g>

  <!-- [2] 正在运行 (绿 - Dynamic Arrow) -->
  <g transform="translate(230, 75)">
    <rect width="180" height="120" rx="30" fill="#F0F9F4"/>
    <!-- 图标 -->
    <circle cx="40" cy="45" r="14" fill="#34C759" fill-opacity="0.1"/>
    <path d="M34 45L40 39L46 45M40 39V51" stroke="#34C759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="155" y="65" text-anchor="end" font-family="Arial" font-size="36" font-weight="bold" fill="#1D1D1F">14</text>
    <text x="155" y="95" text-anchor="end" font-family="PingFang SC" font-size="13" fill="#8E8E93">正在运行</text>
  </g>

  <!-- [3] 静止待机 (灰 - Apple Watch Clock) -->
  <g transform="translate(430, 75)">
    <rect width="180" height="120" rx="30" fill="#F5F5F7"/>
    <!-- 图标 -->
    <circle cx="40" cy="45" r="14" stroke="#8E8E93" stroke-width="2.5" fill="#8E8E93" fill-opacity="0.1"/>
    <path d="M40 37V45H46" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="155" y="65" text-anchor="end" font-family="Arial" font-size="36" font-weight="bold" fill="#1D1D1F">10</text>
    <text x="155" y="95" text-anchor="end" font-family="PingFang SC" font-size="13" fill="#8E8E93">静止待机</text>
  </g>

  <!-- [4] 一般故障 (红 - Warning Shield) -->
  <g transform="translate(30, 225)">
    <rect width="180" height="120" rx="30" fill="#FFF2F2"/>
    <!-- 图标 -->
    <path d="M40 32L54 54C55 56 54 58 52 58H28C26 58 25 56 26 54L40 32Z" fill="#FF3B30" fill-opacity="0.1" stroke="#FF3B30" stroke-width="2.5" stroke-linejoin="round"/>
    <rect x="38.5" y="42" width="3" height="7" rx="1.5" fill="#FF3B30"/>
    <circle cx="40" cy="53" r="1.5" fill="#FF3B30"/>
    <text x="155" y="65" text-anchor="end" font-family="Arial" font-size="36" font-weight="bold" fill="#FF3B30">1</text>
    <text x="155" y="95" text-anchor="end" font-family="PingFang SC" font-size="13" fill="#8E8E93">一般故障</text>
  </g>

  <!-- [5] 检修维护 (橙 - Service Tool) -->
  <g transform="translate(230, 225)">
    <rect width="180" height="120" rx="30" fill="#FFF8F2"/>
    <!-- 图标 -->
    <circle cx="36" cy="41" r="7" stroke="#FF9500" stroke-width="2.5" fill="#FF9500" fill-opacity="0.1"/>
    <path d="M42 47L52 57M48 44L52 48" stroke="#FF9500" stroke-width="3" stroke-linecap="round"/>
    <text x="155" y="65" text-anchor="end" font-family="Arial" font-size="36" font-weight="bold" fill="#1D1D1F">1</text>
    <text x="155" y="95" text-anchor="end" font-family="PingFang SC" font-size="13" fill="#8E8E93">检修维护</text>
  </g>

  <!-- [6] 通讯异常 (紫 - Wireless Slash) -->
  <g transform="translate(430, 225)">
    <rect width="180" height="120" rx="30" fill="#FBF5FF"/>
    <!-- 图标 -->
    <path d="M30 52C30 46 34 42 40 42C46 42 50 46 50 52" stroke="#AF52DE" stroke-width="2.5" stroke-linecap="round" fill="#AF52DE" fill-opacity="0.1"/>
    <path d="M24 45C24 36 31 29 40 29C49 29 56 36 56 45" stroke="#AF52DE" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M28 32L52 58" stroke="#AF52DE" stroke-width="2.5" stroke-linecap="round"/>
    <text x="155" y="65" text-anchor="end" font-family="Arial" font-size="36" font-weight="bold" fill="#AF52DE">0</text>
    <text x="155" y="95" text-anchor="end" font-family="PingFang SC" font-size="13" fill="#8E8E93">通讯异常</text>
  </g>
</svg>