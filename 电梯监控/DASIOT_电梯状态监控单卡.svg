<svg width="220" height="110" viewBox="0 0 220 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="card_inner_shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.05)"/>
    </filter>
  </defs>

  <!-- 卡片底板：极简雅致白 -->
  <rect width="220" height="110" rx="24" fill="white" filter="url(#card_inner_shadow)"/>
  <rect x="0.5" y="0.5" width="219" height="109" rx="23.5" stroke="#E5E7EB"/>

  <!-- 1. 左侧：楼层信息区 -->
  <g transform="translate(16, 16)">
    <text y="12" font-family="PingFang SC" font-size="10" fill="#8E8E93">当前所处楼层</text>
    <!-- 楼层数值：当前/总层 -->
    <text y="50" font-family="Arial" font-size="28" font-weight="bold" fill="#1D1D1F">
      <tspan fill="#007AFF">18</tspan><tspan fill="#8E8E93" font-size="16"> /35</tspan>
    </text>
    <!-- 电梯类型标签 -->
    <rect y="65" width="60" height="18" rx="4" fill="#F2F2F7"/>
    <text x="30" y="78" text-anchor="middle" font-family="PingFang SC" font-size="10" fill="#48484A">低区客梯</text>
  </g>

  <!-- 2. 右侧：电梯动态图标区 -->
  <g transform="translate(140, 15)">
    <!-- 电梯井道背景 -->
    <rect width="50" height="80" rx="4" fill="#F8F9FA"/>
    <rect x="0.5" y="0.5" width="49" height="79" rx="3.5" stroke="#D1D1D6" stroke-dasharray="2 2"/>
    
    <!-- 电梯轿厢图标 (动态位置：根据楼层高度百分比偏移) -->
    <!-- runState 32: 运行中(蓝), 0: 停止(灰) -->
    <rect x="5" y="30" width="40" height="30" rx="2" fill="#007AFF" fill-opacity="0.9"/>
    
    <!-- 门缝线 (runState 1: 开门时，这两条线向两侧移开) -->
    <line x1="25" y1="35" x2="25" y2="55" stroke="white" stroke-width="1"/>
    
    <!-- 运行方向箭头 (runDirection) -->
    <!-- 上行箭头 (runDirection == 1) -->
    <path d="M25 5 L30 12 H20 Z" fill="#007AFF"/> 
    <!-- 下行箭头 (runDirection == 2) -->
    <path d="M25 75 L30 68 H20 Z" fill="#E5E7EB"/> <!-- 灰色表示未激活 -->
  </g>

  <!-- 故障警告遮罩 (如果 faultState == 1，显示此层) -->
  <!-- <rect width="220" height="110" rx="24" fill="#FF3B30" fill-opacity="0.1" stroke="#FF3B30" stroke-width="2"/> -->
</svg>