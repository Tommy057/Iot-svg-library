<svg width="1100" height="900" viewBox="0 0 1100 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 纯净阴影 -->
    <filter id="cleanShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset in="blur" dx="0" dy="3" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 2. 状态宝石核心渐变 -->
    <!-- 🟢 运行态渐变 -->
    <linearGradient id="gemRun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- ⚪ 停止态渐变 -->
    <linearGradient id="gemStop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <!-- 🔴 故障态渐变 -->
    <linearGradient id="gemError" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>

  <!-- 背景底板 -->
  <rect width="1100" height="900" fill="#F8FAFC"/>
  
  <!-- 标题与网格 -->
  <text x="50" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#1E293B">BA风机组件库 - 全状态配色矩阵</text>
  <text x="50" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#64748B">纯净白风格 (Clean White) / HT for Web 兼容扁平版</text>

  <!-- 列标题 -->
  <text x="250" y="130" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#059669">运行状态 (Run)</text>
  <text x="550" y="130" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#64748B">停止状态 (Stop)</text>
  <text x="850" y="130" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#DC2626">故障状态 (Error)</text>

  <line x1="50" y1="150" x2="1050" y2="150" stroke="#E2E8F0" stroke-width="2"/>


  <!-- ================================================================================== -->
  <!-- ROW 1: 送风机 (Supply Fan) - 轴流式 3大叶片 -->
  <!-- ================================================================================== -->
  <text x="50" y="270" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#334155">送风机</text>
  <text x="50" y="290" font-family="sans-serif" font-size="12" fill="#94A3B8">Supply Fan</text>

  <!-- 1.1 送风机 - 运行 (绿) -->
  <g transform="translate(250, 270)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <circle cx="0" cy="0" r="26" fill="#ECFDF5" stroke="none"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="1.2s" repeatCount="indefinite"/>
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(0)"/>
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(120)"/>
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(240)"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="url(#gemRun)"/>
    <circle cx="-3" cy="-3" r="3" fill="#FFFFFF" opacity="0.8"/>
    
    <!-- 悬浮标签 -->
    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">SF-Run</text>
  </g>

  <!-- 1.2 送风机 - 停止 (灰) -->
  <g transform="translate(550, 270)">
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="0" cy="0" r="26" fill="#F8FAFC" stroke="none"/>
    <g>
      <!-- 无动画 -->
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(0)"/>
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(120)"/>
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(240)"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="url(#gemStop)"/>
    <circle cx="-3" cy="-3" r="3" fill="#FFFFFF" opacity="0.8"/>
    
    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">SF-Stop</text>
  </g>

  <!-- 1.3 送风机 - 故障 (红) -->
  <g transform="translate(850, 270)">
    <!-- 红色警示晕 -->
    <circle cx="0" cy="0" r="36" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5">
        <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="32" fill="#FFFFFF" stroke="#EF4444" stroke-width="2"/>
    
    <g>
      <!-- 故障卡顿动画 -->
      <animateTransform attributeName="transform" type="rotate" values="-3 0 0; 3 0 0; -3 0 0" dur="0.15s" repeatCount="indefinite"/>
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(0)"/>
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(120)"/>
      <path d="M 0 0 C 10 -26 28 -20 28 -2 C 28 10 12 12 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(240)"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="url(#gemError)"/>
    <!-- 故障叉号 -->
    <path d="M-3.5 -3.5 L3.5 3.5 M-3.5 3.5 L3.5 -3.5" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    
    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#DC2626">SF-Error</text>
  </g>

  <line x1="50" y1="380" x2="1050" y2="380" stroke="#F1F5F9" stroke-width="1"/>


  <!-- ================================================================================== -->
  <!-- ROW 2: 排风机 (Exhaust Fan) - 离心蜗壳式 6小叶片 -->
  <!-- ================================================================================== -->
  <text x="50" y="500" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#334155">排风机</text>
  <text x="50" y="520" font-family="sans-serif" font-size="12" fill="#94A3B8">Exhaust Fan</text>

  <!-- 2.1 排风机 - 运行 (绿) -->
  <g transform="translate(250, 500)">
    <!-- 蜗壳外形 (统一为白色线框) -->
    <path d="M -10 -28 A 28 28 0 1 0 30 12 V -28 H -10 Z" fill="#FFFFFF" stroke="#10B981" stroke-width="2" stroke-linejoin="round"/>
    <rect x="-15" y="-33" width="50" height="5" fill="#10B981"/> 
    <circle cx="2" cy="12" r="20" fill="#ECFDF5" stroke="#34D399" stroke-width="1.5"/>
    
    <!-- 离心扇叶转动 -->
    <g transform="translate(2, 12)">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="0.8s" repeatCount="indefinite"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#10B981" opacity="0.8" transform="rotate(0)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#10B981" opacity="0.8" transform="rotate(60)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#10B981" opacity="0.8" transform="rotate(120)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#10B981" opacity="0.8" transform="rotate(180)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#10B981" opacity="0.8" transform="rotate(240)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#10B981" opacity="0.8" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="8" fill="url(#gemRun)"/>
        <circle cx="-2" cy="-2" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    </g>

    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">EF-Run</text>
  </g>

  <!-- 2.2 排风机 - 停止 (灰) -->
  <g transform="translate(550, 500)">
    <path d="M -10 -28 A 28 28 0 1 0 30 12 V -28 H -10 Z" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" stroke-linejoin="round"/>
    <rect x="-15" y="-33" width="50" height="5" fill="#94A3B8"/> 
    <circle cx="2" cy="12" r="20" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    
    <g transform="translate(2, 12)">
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#64748B" opacity="0.7" transform="rotate(0)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#64748B" opacity="0.7" transform="rotate(60)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#64748B" opacity="0.7" transform="rotate(120)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#64748B" opacity="0.7" transform="rotate(180)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#64748B" opacity="0.7" transform="rotate(240)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#64748B" opacity="0.7" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="8" fill="url(#gemStop)"/>
        <circle cx="-2" cy="-2" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    </g>

    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">EF-Stop</text>
  </g>

  <!-- 2.3 排风机 - 故障 (红) -->
  <g transform="translate(850, 500)">
    <!-- 红色警示晕 -->
    <circle cx="2" cy="12" r="28" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5">
        <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <path d="M -10 -28 A 28 28 0 1 0 30 12 V -28 H -10 Z" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" stroke-linejoin="round"/>
    <rect x="-15" y="-33" width="50" height="5" fill="#EF4444"/> 
    <circle cx="2" cy="12" r="20" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="1.5"/>
    
    <g transform="translate(2, 12)">
        <animateTransform attributeName="transform" type="rotate" values="-5 0 0; 5 0 0; -5 0 0" dur="0.1s" repeatCount="indefinite"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#EF4444" opacity="0.85" transform="rotate(0)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#EF4444" opacity="0.85" transform="rotate(60)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#EF4444" opacity="0.85" transform="rotate(120)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#EF4444" opacity="0.85" transform="rotate(180)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#EF4444" opacity="0.85" transform="rotate(240)"/>
        <path d="M 0 0 Q 12 -6 18 3 L 8 5 Z" fill="#EF4444" opacity="0.85" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="8" fill="url(#gemError)"/>
        <path d="M-2.5 -2.5 L2.5 2.5 M-2.5 2.5 L2.5 -2.5" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#DC2626">EF-Error</text>
  </g>

  <line x1="50" y1="610" x2="1050" y2="610" stroke="#F1F5F9" stroke-width="1"/>


  <!-- ================================================================================== -->
  <!-- ROW 3: 加压风机 (Pressurization) - 涵道式直叶片 -->
  <!-- ================================================================================== -->
  <text x="50" y="730" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#334155">加压风机</text>
  <text x="50" y="750" font-family="sans-serif" font-size="12" fill="#94A3B8">Pressurize Fan</text>

  <!-- 3.1 加压风机 - 运行 (绿) -->
  <g transform="translate(250, 730)">
    <circle cx="0" cy="0" r="30" fill="#FFFFFF" stroke="#10B981" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#6EE7B7" stroke-width="1.5"/> <!-- 双层壳体暗示高压 -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="0.8s" repeatCount="indefinite"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(0)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(60)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(120)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(180)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(240)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#10B981" opacity="0.85" transform="rotate(300)"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="url(#gemRun)"/>
    <circle cx="-3" cy="-3" r="3" fill="#FFFFFF" opacity="0.8"/>
    
    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">PF-Run</text>
  </g>

  <!-- 3.2 加压风机 - 停止 (灰) -->
  <g transform="translate(550, 730)">
    <circle cx="0" cy="0" r="30" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>
    <g>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(0)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(60)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(120)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(180)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(240)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#94A3B8" opacity="0.7" transform="rotate(300)"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="url(#gemStop)"/>
    <circle cx="-3" cy="-3" r="3" fill="#FFFFFF" opacity="0.8"/>
    
    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">PF-Stop</text>
  </g>

  <!-- 3.3 加压风机 - 故障 (红) -->
  <g transform="translate(850, 730)">
    <circle cx="0" cy="0" r="36" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5">
        <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="30" fill="#FFFFFF" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#FCA5A5" stroke-width="1.5"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-4 0 0; 4 0 0; -4 0 0" dur="0.1s" repeatCount="indefinite"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(0)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(60)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(120)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(180)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(240)"/>
      <path d="M 0 0 C 6 -20 16 -18 16 -2 C 16 6 8 8 0 0 Z" fill="#EF4444" opacity="0.85" transform="rotate(300)"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="url(#gemError)"/>
    <path d="M-3.5 -3.5 L3.5 3.5 M-3.5 3.5 L3.5 -3.5" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    
    <rect x="-35" y="45" width="70" height="22" rx="11" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5" filter="url(#cleanShadow)"/>
    <text x="0" y="60" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#DC2626">PF-Error</text>
  </g>

</svg>