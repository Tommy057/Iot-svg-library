<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 纯净卡片阴影 (Clean Shadow) -->
    <filter id="cleanShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="4" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 2. 状态宝石核心渐变 -->
    <linearGradient id="gemGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="gemGrey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <linearGradient id="gemRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>

    <linearGradient id="donutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- 3. 风机图元模板 (Map Nodes) -->
    
    <!-- 🟢 送风机 (抽象涡轮) -->
    <g id="fan-supply">
      <!-- 顺时针旋转内环 -->
      <circle cx="0" cy="0" r="16" fill="none" stroke="#10B981" stroke-width="2.5" stroke-dasharray="20 10">
         <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- 逆时针旋转外环 -->
      <circle cx="0" cy="0" r="22" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="8 15" opacity="0.6">
         <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <!-- 宝石核心 -->
      <circle cx="0" cy="0" r="10" fill="url(#gemGreen)"/>
      <circle cx="-2" cy="-2" r="3" fill="#FFFFFF" opacity="0.8"/>
    </g>

    <!-- ⚪ 排风机 (抽象蜗壳) -->
    <g id="fan-exhaust">
      <!-- 极简离心外壳线条 -->
      <path d="M 0 -12 A 14 14 0 0 0 0 16 A 18 18 0 0 0 18 -2 L 18 -18" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 0 -12 A 22 22 0 0 0 0 24 A 26 26 0 0 0 26 -2 L 26 -18" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <!-- 宝石核心 (静止) -->
      <circle cx="0" cy="0" r="10" fill="url(#gemGrey)"/>
      <circle cx="-2" cy="-2" r="3" fill="#FFFFFF" opacity="0.8"/>
    </g>

    <!-- 🔴 加压风机 (警示双环) -->
    <g id="fan-pressurize">
      <g>
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
        <!-- 高压警示外环 -->
        <circle cx="0" cy="0" r="22" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-dasharray="6 6"/>
        <circle cx="0" cy="0" r="16" fill="none" stroke="#EF4444" stroke-width="1.5"/>
      </g>
      <!-- 宝石核心 (带故障叉号) -->
      <circle cx="0" cy="0" r="10" fill="url(#gemRed)"/>
      <path d="M-3 -3 L3 3 M-3 3 L3 -3" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- ========================================== -->
  <!-- 极简底板 (建筑平面图示意) -->
  <!-- ========================================== -->
  <rect width="1200" height="700" fill="#F8FAFC"/>
  <g stroke="#E2E8F0" stroke-width="2" fill="none">
    <rect x="40" y="40" width="780" height="620" rx="20" fill="#FFFFFF" filter="url(#cleanShadow)"/>
    <!-- 模拟主风管或走廊走向 -->
    <path d="M 100 120 L 700 120 M 100 350 L 700 350 M 100 580 L 700 580" stroke-width="8" stroke="#F1F5F9" stroke-linecap="round"/>
    <line x1="400" y1="120" x2="400" y2="580" stroke-width="8" stroke="#F1F5F9" stroke-linecap="round"/>
  </g>

  <!-- ================================================================================== -->
  <!-- 左侧平面图区域：撒点设备 (Map Nodes Overlay) -->
  <!-- ================================================================================== -->
  <g transform="translate(0, 0)">
    
    <!-- === 送风机组 (Supply - Running) === -->
    <g transform="translate(200, 120)">
        <use href="#fan-supply" x="0" y="0"/>
        <rect x="-35" y="28" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5"/>
        <text x="0" y="43" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">SF-01</text>
    </g>
    <g transform="translate(600, 120)">
        <use href="#fan-supply" x="0" y="0"/>
        <rect x="-35" y="28" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5"/>
        <text x="0" y="43" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">SF-02</text>
    </g>
    <g transform="translate(250, 350)">
        <use href="#fan-supply" x="0" y="0"/>
        <rect x="-35" y="28" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5"/>
        <text x="0" y="43" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">SF-03</text>
    </g>

    <!-- === 排风机组 (Exhaust - Stopped) === -->
    <g transform="translate(150, 580)">
        <use href="#fan-exhaust" x="0" y="0"/>
        <rect x="-35" y="32" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
        <text x="0" y="47" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">EF-01</text>
    </g>
    <g transform="translate(500, 580)">
        <use href="#fan-exhaust" x="0" y="0"/>
        <rect x="-35" y="32" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
        <text x="0" y="47" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">EF-02</text>
    </g>
    <g transform="translate(550, 350)">
        <use href="#fan-exhaust" x="0" y="0"/>
        <rect x="-35" y="32" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1.5"/>
        <text x="0" y="47" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">EF-03</text>
    </g>

    <!-- === 加压风机组 (Pressurize - Error) === -->
    <g transform="translate(400, 240)">
        <use href="#fan-pressurize" x="0" y="0"/>
        <rect x="-35" y="28" width="70" height="22" rx="11" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5"/>
        <text x="0" y="43" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#DC2626">PF-01</text>
    </g>
    <g transform="translate(400, 460)">
        <use href="#fan-pressurize" x="0" y="0"/>
        <rect x="-35" y="28" width="70" height="22" rx="11" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5"/>
        <text x="0" y="43" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#DC2626">PF-02</text>
    </g>

  </g>

  <!-- ================================================================================== -->
  <!-- 右侧悬浮 UI 面板 (Right Dashboards) -->
  <!-- ================================================================================== -->
  
  <g transform="translate(860, 40)">
    
    <!-- ================= 1. 状态图例说明面板 (Legend Panel) ================= -->
    <g transform="translate(0, 0)">
        <rect width="300" height="235" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cleanShadow)"/>
        
        <text x="150" y="35" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1E293B">风机状态图例</text>
        <line x1="20" y1="50" x2="280" y2="50" stroke="#F1F5F9" stroke-width="1"/>
        
        <!-- 送风/运行 -->
        <g transform="translate(20, 65)">
            <rect width="260" height="46" rx="12" fill="#ECFDF5"/>
            <g transform="translate(25, 23)"><use href="#fan-supply" transform="scale(0.8)"/></g>
            <text x="55" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#065F46">送风机 (正常运行)</text>
            <text x="55" y="36" font-family="sans-serif" font-size="10" fill="#059669">Supply Fan - Running</text>
        </g>

        <!-- 排风/停止 -->
        <g transform="translate(20, 120)">
            <rect width="260" height="46" rx="12" fill="#F8FAFC"/>
            <g transform="translate(25, 23)"><use href="#fan-exhaust" transform="scale(0.8)"/></g>
            <text x="55" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#334155">排风机 (已停止)</text>
            <text x="55" y="36" font-family="sans-serif" font-size="10" fill="#64748B">Exhaust Fan - Stopped</text>
        </g>

        <!-- 加压/故障 -->
        <g transform="translate(20, 175)">
            <rect width="260" height="46" rx="12" fill="#FEF2F2"/>
            <g transform="translate(25, 23)"><use href="#fan-pressurize" transform="scale(0.8)"/></g>
            <text x="55" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#991B1B">加压风机 (故障)</text>
            <text x="55" y="36" font-family="sans-serif" font-size="10" fill="#DC2626">Pressurize Fan - Error</text>
        </g>
    </g>

    <!-- ================= 2. 区域设备概览面板 (Overview Panel) ================= -->
    <g transform="translate(0, 295)">
        <rect width="300" height="260" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cleanShadow)"/>
        
        <text x="150" y="35" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1E293B">设备运行概览</text>
        <line x1="20" y1="50" x2="280" y2="50" stroke="#F1F5F9" stroke-width="1"/>

        <!-- 总量概览块 -->
        <g transform="translate(20, 65)">
            <rect width="260" height="85" rx="12" fill="#EFF6FF"/>
            
            <text x="20" y="30" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#3B82F6">风机设备总数</text>
            <text x="20" y="70" font-family="'Microsoft YaHei', sans-serif" font-size="42" font-weight="bold" fill="#2563EB">45</text>
            <text x="75" y="70" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#60A5FA">台</text>

            <!-- 运行率环形图 -->
            <g transform="translate(200, 42)">
                <circle cx="0" cy="0" r="30" fill="#FFFFFF" stroke="#E0E7FF" stroke-width="6"/>
                <!-- 进度 80% (30*2*3.14 = 188.5, 188.5*0.8 = 150) -->
                <circle cx="0" cy="0" r="30" fill="none" stroke="url(#donutGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="150 188.5" transform="rotate(-90)"/>
                
                <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">80%</text>
                <text x="0" y="18" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#64748B">运行率</text>
            </g>
        </g>

        <!-- 底部数据拆分块 (三等分) -->
        <g transform="translate(20, 165)">
            <!-- 运行 -->
            <rect width="80" height="75" rx="8" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5"/>
            <circle cx="40" cy="20" r="4" fill="#10B981"/>
            <text x="40" y="40" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B">运行</text>
            <text x="40" y="65" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#059669">36</text>

            <!-- 停止 -->
            <g transform="translate(90, 0)">
                <rect width="80" height="75" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
                <circle cx="40" cy="20" r="4" fill="#94A3B8"/>
                <text x="40" y="40" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B">停止</text>
                <text x="40" y="65" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#64748B">8</text>
            </g>

            <!-- 故障 -->
            <g transform="translate(180, 0)">
                <rect width="80" height="75" rx="8" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5"/>
                <circle cx="40" cy="20" r="4" fill="#EF4444"/>
                <text x="40" y="40" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B">故障</text>
                <text x="40" y="65" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#DC2626">1</text>
            </g>
        </g>
    </g>

  </g>
</svg>