<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 纯净卡片阴影 (Clean Shadow) -->
    <filter id="cleanShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset in="blur" dx="0" dy="3" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 2. 发光宝石核心渐变 -->
    <linearGradient id="gemGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="gemGrey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <linearGradient id="gemRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>

    <linearGradient id="donutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- 3. 扇叶基础形状 (Blades) -->
    <!-- 大号扫掠形扇叶 (用于送风机) -->
    <path id="blade-large" d="M 0 0 C 8 -20 22 -16 22 -2 C 22 8 10 10 0 0 Z"/>
    <!-- 小号离心扇叶 (用于排风机) -->
    <path id="blade-mini" d="M 0 0 Q 10 -5 14 2 L 6 4 Z"/>
    <!-- 密集直扇叶 (用于加压风机) -->
    <path id="blade-straight" d="M 0 0 C 4 -16 12 -14 12 -2 C 12 5 6 6 0 0 Z"/>


    <!-- 4. 风机图元模板 (Map Nodes) -->
    
    <!-- 🟢 送风机 (轴流风机, 3叶片) - 运行 -->
    <g id="fan-supply">
      <!-- 外框圈 -->
      <circle cx="0" cy="0" r="24" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
      <circle cx="0" cy="0" r="20" fill="#ECFDF5" stroke="none"/>
      
      <!-- 旋转扇叶 -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="1.2s" repeatCount="indefinite"/>
        <use href="#blade-large" x="0" y="0" fill="#10B981" opacity="0.85" transform="rotate(0)"/>
        <use href="#blade-large" x="0" y="0" fill="#10B981" opacity="0.85" transform="rotate(120)"/>
        <use href="#blade-large" x="0" y="0" fill="#10B981" opacity="0.85" transform="rotate(240)"/>
      </g>
      
      <!-- 宝石核心 -->
      <circle cx="0" cy="0" r="8" fill="url(#gemGreen)"/>
      <circle cx="-2" cy="-2" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    </g>

    <!-- ⚪ 排风机 (离心蜗壳风机) - 停止 -->
    <g id="fan-exhaust">
      <!-- 蜗壳外形 (清晰的几何线框) -->
      <path d="M -8 -22 A 22 22 0 1 0 24 10 V -22 H -8 Z" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" stroke-linejoin="round"/>
      <rect x="-12" y="-26" width="40" height="4" fill="#94A3B8"/> <!-- 法兰出风口 -->
      
      <circle cx="2" cy="10" r="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
      
      <!-- 内部离心小扇叶 (静止) -->
      <g transform="translate(2, 10)">
        <use href="#blade-mini" x="0" y="0" fill="#64748B" opacity="0.7" transform="rotate(0)"/>
        <use href="#blade-mini" x="0" y="0" fill="#64748B" opacity="0.7" transform="rotate(60)"/>
        <use href="#blade-mini" x="0" y="0" fill="#64748B" opacity="0.7" transform="rotate(120)"/>
        <use href="#blade-mini" x="0" y="0" fill="#64748B" opacity="0.7" transform="rotate(180)"/>
        <use href="#blade-mini" x="0" y="0" fill="#64748B" opacity="0.7" transform="rotate(240)"/>
        <use href="#blade-mini" x="0" y="0" fill="#64748B" opacity="0.7" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="6" fill="url(#gemGrey)"/>
        <circle cx="-1.5" cy="-1.5" r="2" fill="#FFFFFF" opacity="0.8"/>
      </g>
    </g>

    <!-- 🔴 加压风机 (厚重管流风机, 6叶片) - 故障报警 -->
    <g id="fan-pressurize">
      <!-- 报警红晕背景 -->
      <circle cx="0" cy="0" r="26" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5">
         <animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/>
      </circle>
      <!-- 双层厚壳外框 -->
      <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#EF4444" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="#FCA5A5" stroke-width="1"/>
      
      <!-- 密集扇叶 (卡顿报警) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-5 0 0; 5 0 0; -5 0 0" dur="0.15s" repeatCount="indefinite"/>
        <use href="#blade-straight" x="0" y="0" fill="#EF4444" opacity="0.9" transform="rotate(0)"/>
        <use href="#blade-straight" x="0" y="0" fill="#EF4444" opacity="0.9" transform="rotate(60)"/>
        <use href="#blade-straight" x="0" y="0" fill="#EF4444" opacity="0.9" transform="rotate(120)"/>
        <use href="#blade-straight" x="0" y="0" fill="#EF4444" opacity="0.9" transform="rotate(180)"/>
        <use href="#blade-straight" x="0" y="0" fill="#EF4444" opacity="0.9" transform="rotate(240)"/>
        <use href="#blade-straight" x="0" y="0" fill="#EF4444" opacity="0.9" transform="rotate(300)"/>
      </g>
      
      <!-- 宝石核心 + 故障 X -->
      <circle cx="0" cy="0" r="8" fill="url(#gemRed)"/>
      <path d="M-2.5 -2.5 L2.5 2.5 M-2.5 2.5 L2.5 -2.5" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- ========================================== -->
  <!-- 极简平面底板 -->
  <!-- ========================================== -->
  <rect width="1200" height="700" fill="#F8FAFC"/>
  <g stroke="#E2E8F0" stroke-width="2" fill="none">
    <!-- 建筑轮廓 -->
    <rect x="40" y="40" width="780" height="620" rx="20" fill="#FFFFFF" filter="url(#cleanShadow)"/>
    <!-- 模拟主通风管道网络 (浅色半透明，不干扰图标) -->
    <path d="M 100 120 L 700 120 M 100 350 L 700 350 M 100 580 L 700 580" stroke-width="12" stroke="#F1F5F9" stroke-linecap="round"/>
    <line x1="400" y1="120" x2="400" y2="580" stroke-width="12" stroke="#F1F5F9" stroke-linecap="round"/>
  </g>

  <!-- ================================================================================== -->
  <!-- 左侧平面图区域：设备撒点 (Map Nodes Overlay) -->
  <!-- ================================================================================== -->
  <g transform="translate(0, 0)">
    
    <!-- === 送风机组 (Supply - Running) === -->
    <g transform="translate(200, 120)">
        <use href="#fan-supply" x="0" y="0"/>
        <!-- 悬浮药丸标签 -->
        <rect x="-35" y="32" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5"/>
        <text x="0" y="47" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">SF-01</text>
    </g>
    <g transform="translate(600, 120)">
        <use href="#fan-supply" x="0" y="0"/>
        <rect x="-35" y="32" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5"/>
        <text x="0" y="47" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">SF-02</text>
    </g>
    <g transform="translate(250, 350)">
        <use href="#fan-supply" x="0" y="0"/>
        <rect x="-35" y="32" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5"/>
        <text x="0" y="47" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#059669">SF-03</text>
    </g>

    <!-- === 排风机组 (Exhaust - Stopped) === -->
    <g transform="translate(150, 580)">
        <use href="#fan-exhaust" x="0" y="0"/>
        <rect x="-35" y="36" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
        <text x="0" y="51" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">EF-01</text>
    </g>
    <g transform="translate(500, 580)">
        <use href="#fan-exhaust" x="0" y="0"/>
        <rect x="-35" y="36" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
        <text x="0" y="51" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">EF-02</text>
    </g>
    <g transform="translate(550, 350)">
        <use href="#fan-exhaust" x="0" y="0"/>
        <rect x="-35" y="36" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
        <text x="0" y="51" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#64748B">EF-03</text>
    </g>

    <!-- === 加压风机组 (Pressurize - Error) === -->
    <g transform="translate(400, 240)">
        <use href="#fan-pressurize" x="0" y="0"/>
        <rect x="-35" y="32" width="70" height="22" rx="11" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5"/>
        <text x="0" y="47" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#DC2626">PF-01</text>
    </g>
    <g transform="translate(400, 460)">
        <use href="#fan-pressurize" x="0" y="0"/>
        <rect x="-35" y="32" width="70" height="22" rx="11" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5"/>
        <text x="0" y="47" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#DC2626">PF-02</text>
    </g>

  </g>

  <!-- ================================================================================== -->
  <!-- 右侧悬浮 UI 面板 (Right Dashboards) -->
  <!-- ================================================================================== -->
  
  <g transform="translate(860, 40)">
    
    <!-- ================= 1. 状态图例说明面板 (Legend Panel) ================= -->
    <g transform="translate(0, 0)">
        <rect width="300" height="235" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cleanShadow)"/>
        
        <text x="150" y="35" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1E293B">风机图例说明</text>
        <line x1="20" y1="50" x2="280" y2="50" stroke="#F1F5F9" stroke-width="1"/>
        
        <!-- 送风/运行 -->
        <g transform="translate(20, 65)">
            <rect width="260" height="46" rx="12" fill="#ECFDF5"/>
            <!-- 放置一个小一号的风机图标作为图例 -->
            <g transform="translate(25, 23)"><use href="#fan-supply" transform="scale(0.7)"/></g>
            <text x="55" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#065F46">正常运行</text>
            <text x="55" y="36" font-family="sans-serif" font-size="10" fill="#059669">Supply Fan - Running</text>
        </g>

        <!-- 排风/停止 -->
        <g transform="translate(20, 120)">
            <rect width="260" height="46" rx="12" fill="#F8FAFC"/>
            <g transform="translate(25, 23)"><use href="#fan-exhaust" transform="scale(0.7)"/></g>
            <text x="55" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#334155">停止待机</text>
            <text x="55" y="36" font-family="sans-serif" font-size="10" fill="#64748B">Exhaust Fan - Stopped</text>
        </g>

        <!-- 加压/故障 -->
        <g transform="translate(20, 175)">
            <rect width="260" height="46" rx="12" fill="#FEF2F2"/>
            <g transform="translate(25, 23)"><use href="#fan-pressurize" transform="scale(0.7)"/></g>
            <text x="55" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#991B1B">故障离线</text>
            <text x="55" y="36" font-family="sans-serif" font-size="10" fill="#DC2626">Pressurize Fan - Error</text>
        </g>
    </g>

    <!-- ================= 2. 区域设备概览面板 (Overview Panel) ================= -->
    <g transform="translate(0, 295)">
        <rect width="300" height="260" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cleanShadow)"/>
        
        <text x="150" y="35" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#1E293B">楼层风机概览</text>
        <line x1="20" y1="50" x2="280" y2="50" stroke="#F1F5F9" stroke-width="1"/>

        <!-- 总量概览块 -->
        <g transform="translate(20, 65)">
            <rect width="260" height="85" rx="12" fill="#EFF6FF"/>
            
            <text x="20" y="30" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#3B82F6">风机设备总数</text>
            <text x="20" y="70" font-family="'Microsoft YaHei', sans-serif" font-size="42" font-weight="bold" fill="#2563EB">45</text>
            <text x="75" y="70" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#60A5FA">台</text>

            <!-- 在线率环形图 -->
            <g transform="translate(200, 42)">
                <circle cx="0" cy="0" r="30" fill="#FFFFFF" stroke="#E0E7FF" stroke-width="6"/>
                <circle cx="0" cy="0" r="30" fill="none" stroke="url(#donutGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="150 188.5" transform="rotate(-90)"/>
                
                <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">80%</text>
                <text x="0" y="18" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#64748B">运行率</text>
            </g>
        </g>

        <!-- 底部数据拆分块 -->
        <g transform="translate(20, 165)">
            <!-- 运行 -->
            <rect width="80" height="75" rx="8" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5"/>
            <circle cx="40" cy="20" r="4" fill="#10B981"/>
            <text x="40" y="40" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B">运行</text>
            <text x="40" y="65" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#059669">36</text>

            <!-- 停止 -->
            <g transform="translate(90, 0)">
                <rect width="80" height="75" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
                <circle cx="40" cy="20" r="4" fill="#94A3B8"/>
                <text x="40" y="40" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B">停止</text>
                <text x="40" y="65" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#64748B">8</text>
            </g>

            <!-- 故障 -->
            <g transform="translate(180, 0)">
                <rect width="80" height="75" rx="8" fill="#FFF1F2" stroke="#FECACA" stroke-width="1.5"/>
                <circle cx="40" cy="20" r="4" fill="#EF4444"/>
                <text x="40" y="40" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#64748B">故障</text>
                <text x="40" y="65" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#DC2626">1</text>
            </g>
        </g>
    </g>

  </g>
</svg>