<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 基础滤镜 -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 宝石发光 -->
    <filter id="glowGreen"><feGaussianBlur stdDeviation="2.5"/><feComposite in="SourceGraphic" operator="over"/></filter>
    <filter id="glowRed"><feGaussianBlur stdDeviation="2.5"/><feComposite in="SourceGraphic" operator="over"/></filter>

    <!-- 标题背景区分 -->
    <linearGradient id="gradAlarm" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FEF2F2"/><stop offset="100%" stop-color="#FEE2E2"/></linearGradient>
    <linearGradient id="gradNormal" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#F1F5F9"/></linearGradient>
  </defs>

  <!-- 1. 全局大背景 -->
  <rect width="1920" height="1080" fill="#F0F2F5" />

  <!-- 🚀 2. 顶部全局中枢面板 (Top Hub) -->
  <g transform="translate(40, 30)" filter="url(#softShadow)">
    <rect width="1840" height="120" rx="16" fill="#FFFFFF" />
    <rect width="6" height="40" x="40" y="40" rx="3" fill="#0F172A" />
    <text x="65" y="70" font-family="'Microsoft YaHei'" font-size="28" font-weight="bold" fill="#0F172A">全域通风机组中枢面板</text>
    <text x="65" y="95" font-family="'Microsoft YaHei'" font-size="14" fill="#64748B">Centralized HVAC &amp; Ventilation Monitoring System</text>
    
    <!-- 全局统计列 -->
    <g transform="translate(550, 45)">
      <text x="0" y="0" font-size="12" fill="#94A3B8">系统总数 (Total Units)</text>
      <text x="0" y="40" font-size="36" font-weight="bold" fill="#0F172A">456</text>
      
      <text x="300" y="0" font-size="12" fill="#94A3B8">正常运行 (Online / Running)</text>
      <text x="300" y="40" font-size="36" font-weight="bold" fill="#10B981">439</text>
      
      <text x="600" y="0" font-size="12" fill="#94A3B8">待机或停止 (Standby / Off)</text>
      <text x="600" y="40" font-size="36" font-weight="bold" fill="#64748B">12</text>
    </g>

    <!-- 顶部紧急告警块 -->
    <g transform="translate(1560, 35)">
      <rect width="250" height="50" rx="25" fill="#FEF2F2" stroke="#EF4444" stroke-width="1" />
      <circle cx="25" cy="25" r="5" fill="#EF4444" filter="url(#glowRed)" />
      <text x="45" y="32" font-size="20" font-weight="bold" fill="#B91C1C">5 <tspan font-size="14" font-weight="normal">台设备触发故障</tspan></text>
    </g>
  </g>

  <!-- 🚀 3. 空间卡片矩阵 (4x2 Grid) -->
  <!-- 第一排：地面楼宇 -->
  <g transform="translate(40, 180)">
    
    <!-- [卡片 1: 研发大楼 - 告警态] -->
    <g transform="translate(0, 0)" filter="url(#softShadow)">
      <rect width="440" height="380" rx="16" fill="#FFFFFF" />
      <path d="M0,16 Q0,0 16,0 L424,0 Q440,0 440,16 L440,60 L0,60 Z" fill="url(#gradAlarm)" />
      <!-- 黑金空间图标 -->
      <rect x="20" y="12" width="36" height="36" rx="8" fill="#0F172A" />
      <circle cx="38" cy="30" r="4" fill="#EF4444" filter="url(#glowRed)" />
      <text x="70" y="38" font-size="20" font-weight="bold" fill="#0F172A">研发大楼 (R&amp;D)</text>
      <rect x="365" y="15" width="60" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.5" stroke="#EF4444" />
      <text x="395" y="32" text-anchor="middle" font-size="11" fill="#EF4444" font-weight="bold">告警</text>

      <!-- 内部数据行 (宝石光晕行) -->
      <g transform="translate(20, 75)">
        <!-- SF 行 - 异常 -->
        <g transform="translate(0, 10)">
          <rect width="400" height="70" rx="35" fill="#FFFFFF" stroke="#FEE2E2" stroke-width="1.5" />
          <circle cx="35" cy="35" r="28" fill="#0F172A" />
          <text x="35" y="40" text-anchor="middle" font-size="10" fill="#94A3B8" font-weight="bold">SF</text>
          <text x="85" y="25" font-size="10" fill="#94A3B8">总数</text><text x="85" y="50" font-size="18" font-weight="bold" fill="#1E293B">32</text>
          <text x="165" y="25" font-size="10" fill="#94A3B8">运行</text><text x="165" y="50" font-size="18" font-weight="bold" fill="#10B981">30</text>
          <text x="245" y="25" font-size="10" fill="#94A3B8">故障</text><text x="245" y="50" font-size="18" font-weight="bold" fill="#EF4444">2</text>
          <rect x="305" y="20" width="80" height="30" rx="15" fill="#EF4444" />
          <text x="345" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">2 故障</text>
        </g>
        <!-- EF 行 - 正常 -->
        <g transform="translate(0, 95)">
          <rect width="400" height="70" rx="35" fill="#F8FAFC" />
          <circle cx="35" cy="35" r="28" fill="#0F172A" />
          <text x="35" y="40" text-anchor="middle" font-size="10" fill="#94A3B8" font-weight="bold">EF</text>
          <text x="85" y="50" font-size="18" font-weight="bold">36 <tspan font-size="12" fill="#10B981">/ 36 / 0</tspan></text>
          <rect x="305" y="20" width="80" height="30" rx="15" fill="#ECFDF5" />
          <text x="345" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">正常</text>
        </g>
        <!-- PF 行 - 正常 -->
        <g transform="translate(0, 180)">
          <rect width="400" height="70" rx="35" fill="#F8FAFC" />
          <circle cx="35" cy="35" r="28" fill="#0F172A" />
          <text x="35" y="40" text-anchor="middle" font-size="10" fill="#94A3B8" font-weight="bold">PF</text>
          <text x="345" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">正常</text>
        </g>
      </g>
    </g>

    <!-- [卡片 2: 员工宿舍 - 正常态] -->
    <g transform="translate(465, 0)" filter="url(#softShadow)">
      <rect width="440" height="380" rx="16" fill="#FFFFFF" />
      <path d="M0,16 Q0,0 16,0 L424,0 Q440,0 440,16 L440,60 L0,60 Z" fill="#F0FDF4" />
      <rect x="20" y="12" width="36" height="36" rx="8" fill="#0F172A" />
      <circle cx="38" cy="30" r="4" fill="#10B981" filter="url(#glowGreen)" />
      <text x="70" y="38" font-size="20" font-weight="bold" fill="#0F172A">员工宿舍 (Dorm)</text>
      <text x="220" y="230" text-anchor="middle" fill="#94A3B8">列表内容同上...</text>
    </g>

    <!-- [卡片 3: 综合大楼] -->
    <g transform="translate(930, 0)" filter="url(#softShadow)">
      <rect width="440" height="380" rx="16" fill="#FFFFFF" />
      <path d="M0,16 Q0,0 16,0 L424,0 Q440,0 440,16 L440,60 L0,60 Z" fill="#F5F3FF" />
      <text x="70" y="38" font-size="20" font-weight="bold" fill="#0F172A">综合大楼 (Complex)</text>
    </g>

    <!-- [卡片 4: 生产厂房 - 多重告警态] -->
    <g transform="translate(1395, 0)" filter="url(#softShadow)">
      <rect width="440" height="380" rx="16" fill="#FFFFFF" />
      <path d="M0,16 Q0,0 16,0 L424,0 Q440,0 440,16 L440,60 L0,60 Z" fill="url(#gradAlarm)" />
      <text x="70" y="38" font-size="20" font-weight="bold" fill="#0F172A">生产厂房 (Factory)</text>
    </g>
  </g>

  <!-- 第二排：地下区域 -->
  <g transform="translate(40, 590)">
    <!-- BMF, B1F, B2F, B3F 依次排列 -->
    <!-- BMF 卡片 -->
    <g transform="translate(0, 0)" filter="url(#softShadow)">
      <rect width="440" height="380" rx="16" fill="#FFFFFF" />
      <path d="M0,16 Q0,0 16,0 L424,0 Q440,0 440,16 L440,60 L0,60 Z" fill="#EFF6FF" />
      <rect x="20" y="12" width="36" height="36" rx="8" fill="#0F172A" />
      <circle cx="38" cy="30" r="4" fill="#10B981" />
      <text x="70" y="38" font-size="20" font-weight="bold" fill="#0F172A">BMF 地下夹层</text>
    </g>
    
    <!-- B2F 告警态示例 -->
    <g transform="translate(930, 0)" filter="url(#softShadow)">
      <rect width="440" height="380" rx="16" fill="#FFFFFF" />
      <path d="M0,16 Q0,0 16,0 L424,0 Q440,0 440,16 L440,60 L0,60 Z" fill="#EFF6FF" />
      <rect x="20" y="12" width="36" height="36" rx="8" fill="#0F172A" />
      <circle cx="38" cy="30" r="4" fill="#EF4444" />
      <text x="70" y="38" font-size="20" font-weight="bold" fill="#0F172A">B2F 地下二层</text>
      <rect x="365" y="15" width="60" height="24" rx="12" fill="#FFFFFF" stroke="#EF4444" />
      <text x="395" y="32" text-anchor="middle" font-size="11" fill="#EF4444" font-weight="bold">告警</text>
    </g>
  </g>
</svg>