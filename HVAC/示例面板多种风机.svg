<svg width="300" height="420" viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 1. 纯净阴影 -->
    <filter id="cleanShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset in="blur" dx="0" dy="4" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 2. 状态宝石渐变 -->
    <linearGradient id="gemGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="gemGrey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <linearGradient id="gemRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    
    <!-- 科技蓝渐变 (用于设备类型图标) -->
    <linearGradient id="gemBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- ========================================== -->
  <!-- 主面板容器 -->
  <!-- ========================================== -->
  <rect x="10" y="10" width="280" height="400" rx="16" fill="#FFFFFF" fill-opacity="0.95" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cleanShadow)"/>
  
  <!-- 顶部标题栏 -->
  <path d="M 10 26 A 16 16 0 0 1 26 10 L 274 10 A 16 16 0 0 1 290 26 L 290 50 L 10 50 Z" fill="#F8FAFC"/>
  <line x1="10" y1="50" x2="290" y2="50" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="25" y="22" width="4" height="16" rx="2" fill="#3B82F6"/>
  <text x="38" y="35" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" fill="#1E293B">综合图例说明</text>
  <text x="240" y="35" font-family="sans-serif" font-size="12" fill="#94A3B8">Legend</text>

  <!-- ========================================== -->
  <!-- Section 1: 形状 = 设备类型 (Shape = Type) -->
  <!-- ========================================== -->
  <text x="25" y="75" font-family="'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#64748B">1. 图形类型 (Device Type)</text>

  <!-- 1.1 送风机 (轴流形状) -->
  <g transform="translate(25, 95)">
    <!-- 科技蓝中性图标 -->
    <g transform="translate(15, 15)">
        <circle cx="0" cy="0" r="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
        <path d="M 0 0 C 4 -12 12 -9 12 -1 C 12 4 6 5 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(0)"/>
        <path d="M 0 0 C 4 -12 12 -9 12 -1 C 12 4 6 5 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(120)"/>
        <path d="M 0 0 C 4 -12 12 -9 12 -1 C 12 4 6 5 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(240)"/>
        <circle cx="0" cy="0" r="4" fill="url(#gemBlue)"/>
    </g>
    <text x="45" y="15" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#1E293B">送风机</text>
    <text x="45" y="30" font-family="sans-serif" font-size="11" fill="#64748B">Supply Fan (轴流式)</text>
  </g>

  <!-- 1.2 排风机 (蜗壳形状) -->
  <g transform="translate(25, 145)">
    <g transform="translate(15, 15)">
        <!-- 缩小版蜗壳 -->
        <path d="M -6 -16 A 16 16 0 1 0 18 8 V -16 H -6 Z" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" stroke-linejoin="round"/>
        <rect x="-10" y="-19" width="30" height="3" fill="#3B82F6"/>
        <circle cx="2" cy="8" r="10" fill="#FFFFFF" stroke="#93C5FD" stroke-width="1"/>
        <circle cx="2" cy="8" r="4" fill="url(#gemBlue)"/>
    </g>
    <text x="45" y="15" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#1E293B">排风机</text>
    <text x="45" y="30" font-family="sans-serif" font-size="11" fill="#64748B">Exhaust Fan (离心式)</text>
  </g>

  <!-- 1.3 加压风机 (多叶片形状) -->
  <g transform="translate(25, 195)">
    <g transform="translate(15, 15)">
        <circle cx="0" cy="0" r="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
        <circle cx="0" cy="0" r="11" fill="none" stroke="#93C5FD" stroke-width="1"/>
        <!-- 6叶片 -->
        <path d="M 0 0 C 2 -10 6 -8 6 -1 C 6 2 3 3 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(0)"/>
        <path d="M 0 0 C 2 -10 6 -8 6 -1 C 6 2 3 3 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(60)"/>
        <path d="M 0 0 C 2 -10 6 -8 6 -1 C 6 2 3 3 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(120)"/>
        <path d="M 0 0 C 2 -10 6 -8 6 -1 C 6 2 3 3 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(180)"/>
        <path d="M 0 0 C 2 -10 6 -8 6 -1 C 6 2 3 3 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(240)"/>
        <path d="M 0 0 C 2 -10 6 -8 6 -1 C 6 2 3 3 0 0 Z" fill="#3B82F6" opacity="0.8" transform="rotate(300)"/>
        <circle cx="0" cy="0" r="4" fill="url(#gemBlue)"/>
    </g>
    <text x="45" y="15" font-family="'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#1E293B">加压风机</text>
    <text x="45" y="30" font-family="sans-serif" font-size="11" fill="#64748B">Pressurize Fan (涵道式)</text>
  </g>

  <line x1="25" y1="245" x2="275" y2="245" stroke="#F1F5F9" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- ========================================== -->
  <!-- Section 2: 颜色 = 运行状态 (Color = Status) -->
  <!-- ========================================== -->
  <text x="25" y="270" font-family="'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#64748B">2. 颜色状态 (Status Color)</text>

  <!-- 2.1 运行 (Run) -->
  <g transform="translate(25, 285)">
    <rect x="0" y="0" width="250" height="34" rx="6" fill="#ECFDF5"/>
    <circle cx="15" cy="17" r="6" fill="url(#gemGreen)"/>
    <!-- 微光呼吸波纹 -->
    <circle cx="15" cy="17" r="6" fill="none" stroke="#10B981" stroke-width="1.5">
       <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
       <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="35" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#065F46">正常运行 (Run)</text>
  </g>

  <!-- 2.2 停止 (Stop) -->
  <g transform="translate(25, 325)">
    <rect x="0" y="0" width="250" height="34" rx="6" fill="#F8FAFC"/>
    <circle cx="15" cy="17" r="6" fill="url(#gemGrey)"/>
    <circle cx="15" cy="17" r="4" fill="#FFFFFF" opacity="0.5"/>
    <text x="35" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#475569">停止待机 (Stop)</text>
  </g>

  <!-- 2.3 故障 (Error) -->
  <g transform="translate(25, 365)">
    <rect x="0" y="0" width="250" height="34" rx="6" fill="#FEF2F2"/>
    <circle cx="15" cy="17" r="6" fill="url(#gemRed)">
       <animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <!-- 故障红叉 -->
    <path d="M 13 15 L 17 19 M 13 19 L 17 15" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <text x="35" y="22" font-family="'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#991B1B">故障报警 (Error)</text>
  </g>

</svg>