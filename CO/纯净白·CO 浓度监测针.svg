<svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 柔和阴影 -->
        <filter id="pin_shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feOffset dx="0" dy="2" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <!-- 晶钻渐变 (默认绿色) -->
        <radialGradient id="ppm_gem_green" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#6EE7B7" />
            <stop offset="100%" stop-color="#10B981" />
        </radialGradient>
    </defs>

    <!-- 1. 底部定位引脚 (指向坐标点) -->
    <path d="M80 115 L74 95 L86 95 Z" fill="#94A3B8" opacity="0.6" />
    <circle cx="80" cy="115" r="3" fill="#64748B" />

    <!-- 2. 悬浮全息面板 -->
    <rect x="10" y="10" width="140" height="85" rx="12" fill="rgba(255, 255, 255, 0.9)" stroke="#E2E8F0" stroke-width="1" filter="url(#pin_shadow)" />
    
    <!-- 3. 顶部：位置名称 -->
    <text x="80" y="32" font-family="Arial-Bold" font-size="14" fill="#334155" text-anchor="middle" font-weight="bold">地下车库 B1-01</text>
    <line x1="25" y1="40" x2="135" y2="40" stroke="#F1F5F9" stroke-width="1" />

    <!-- 4. 中部：浓度宝石读数 -->
    <g transform="translate(30, 50)">
        <!-- 宝石底座 -->
        <rect width="100" height="35" rx="17.5" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1" />
        <!-- 核心浓度球 -->
        <circle cx="18" cy="17.5" r="12" fill="url(#ppm_gem_green)">
            <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
        </circle>
        <!-- PPM 数值 -->
        <text x="65" y="23" font-family="Arial Black" font-size="18" fill="#1E293B" text-anchor="middle">35</text>
        <text x="110" y="22" font-family="Arial" font-size="9" fill="#64748B" text-anchor="middle">ppm</text>
    </g>
</svg>