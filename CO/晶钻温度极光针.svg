<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 1. 强力霓虹发光 (蓝色版) -->
        <filter id="ultra_glow_blue" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <!-- 2. 柔和投影 -->
        <filter id="soft_drop" x="-20%" y="-20%" width="150%" height="150%">
            <feGaussianBlur stdDeviation="3" />
            <feOffset dx="0" dy="4" />
            <feFlood flood-color="rgba(0,0,0,0.1)" />
            <feComposite in="SourceGraphic" operator="over" />
        </filter>

        <!-- 3. 蓝宝石晶钻渐变 -->
        <radialGradient id="gem_sapphire" cx="50%" cy="35%" r="80%">
            <stop offset="0%" stop-color="#60A5FA" />
            <stop offset="70%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#1E3A8A" />
        </radialGradient>

        <!-- 4. 蓝色极光束渐变 -->
        <linearGradient id="laser_beam_blue" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
        </linearGradient>
    </defs>

    <!-- 【第一层：底部落点】(蓝色极光) -->
    <g transform="translate(60, 150)">
        <ellipse cx="0" cy="0" rx="12" ry="4" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8">
            <animate attributeName="rx" values="8;18;8" dur="1.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite" />
        </ellipse>
        <circle cx="0" cy="0" r="4" fill="#60A5FA" filter="url(#ultra_glow_blue)">
            <animate attributeName="r" values="3;6;3" dur="1s" repeatCount="indefinite" />
        </circle>
        <path d="M-2 -100 L2 -100 L1 0 L-1 0 Z" fill="url(#laser_beam_blue)" opacity="0.7" />
    </g>

    <!-- 【第二层：悬浮菱形晶体】 -->
    <g filter="url(#soft_drop)">
        <!-- 白色衬底菱形 -->
        <rect x="30" y="20" width="60" height="60" rx="8" fill="white" transform="rotate(45, 60, 50)" />
        <!-- 蓝宝石主菱形 -->
        <rect x="34" y="24" width="52" height="52" rx="6" fill="url(#gem_sapphire)" transform="rotate(45, 60, 50)" />
        
        <!-- 温度数值 (极大化) -->
        <text x="60" y="58" font-family="Arial Black" font-size="22" fill="white" text-anchor="middle">24.5</text>
        <text x="60" y="74" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">℃</text>
        
        <!-- 顶部晶钻反光 (折线形，配合菱形边缘) -->
        <path d="M45 35 L60 25 L75 35" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.3" />
    </g>

    <!-- 【第三层：标签位】 -->
    <g transform="translate(60, 105)">
        <rect x="-35" y="0" width="70" height="18" rx="4" fill="rgba(30, 41, 59, 0.8)" />
        <text x="0" y="13" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">T-ROOM-01</text>
    </g>
</svg>