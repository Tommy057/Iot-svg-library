<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 1. 强力霓虹发光 (用于底部落点) -->
        <filter id="ultra_glow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <!-- 2. 柔和投影 (让图标从白底跳出来) -->
        <filter id="soft_drop" x="-20%" y="-20%" width="150%" height="150%">
            <feGaussianBlur stdDeviation="3" />
            <feOffset dx="0" dy="4" />
            <feFlood flood-color="rgba(0,0,0,0.15)" />
            <feComposite in2="SourceGraphic" operator="over" />
        </filter>

        <!-- 3. 翡翠晶钻渐变 -->
        <radialGradient id="gem_emerald" cx="50%" cy="35%" r="80%">
            <stop offset="0%" stop-color="#34D399" />
            <stop offset="70%" stop-color="#10B981" />
            <stop offset="100%" stop-color="#064E3B" />
        </radialGradient>

        <!-- 4. 极光束渐变 -->
        <linearGradient id="laser_beam" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#10B981" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#10B981" stop-opacity="0" />
        </linearGradient>
    </defs>

    <!-- 【第一层：底部落点】(最亮的部分) -->
    <g transform="translate(60, 150)">
        <!-- 地面能量圈 -->
        <ellipse cx="0" cy="0" rx="12" ry="4" fill="none" stroke="#10B981" stroke-width="2" opacity="0.8">
            <animate attributeName="rx" values="8;18;8" dur="1.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite" />
        </ellipse>
        <!-- 激光落点核心 (亮瞎眼效果) -->
        <circle cx="0" cy="0" r="4" fill="#34D399" filter="url(#ultra_glow)">
            <animate attributeName="r" values="3;6;3" dur="1s" repeatCount="indefinite" />
        </circle>
        <!-- 垂直导向光束 -->
        <path d="M-2 -100 L2 -100 L1 0 L-1 0 Z" fill="url(#laser_beam)" opacity="0.7" />
    </g>

    <!-- 【第二层：悬浮数值球】 -->
    <g filter="url(#soft_drop)">
        <!-- 白色衬底 (防止背景干扰) -->
        <circle cx="60" cy="50" r="42" fill="white" />
        <!-- 晶钻主球 -->
        <circle cx="60" cy="50" r="38" fill="url(#gem_emerald)" />
        
        <!-- 数值 (针对你的图纸，再次加大) -->
        <text x="60" y="58" font-family="Arial Black" font-size="24" fill="white" text-anchor="middle">61.38</text>
        <text x="60" y="74" font-family="Arial" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ppm</text>
        
        <!-- 顶部高光弧线 -->
        <path d="M35 40 Q60 25 85 40" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3" />
    </g>

    <!-- 【第三层：标签位】(放在球体下方一点) -->
    <g transform="translate(60, 100)">
        <rect x="-35" y="0" width="70" height="18" rx="4" fill="rgba(30, 41, 59, 0.8)" />
        <text x="0" y="13" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">B012-1</text>
    </g>
</svg>