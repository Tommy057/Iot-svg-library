<svg width="100" height="140" viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 强化投影：让图标从白色底图上“跳”出来 -->
        <filter id="strong_shadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feOffset dx="0" dy="2" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <!-- 晶钻颜色 (正常态-翡翠) -->
        <radialGradient id="gem_green" cx="50%" cy="35%" r="80%">
            <stop offset="0%" stop-color="#10B981" />
            <stop offset="100%" stop-color="#064E3B" />
        </radialGradient>
    </defs>

    <!-- 1. 底部精确定位点 -->
    <circle cx="50" cy="135" r="4" fill="#334155" />
    <!-- 极细全息连接柱 (不遮挡墙体) -->
    <line x1="50" y1="135" x2="50" y2="100" stroke="#334155" stroke-width="1" stroke-dasharray="2 2" />

    <!-- 2. 核心数值球 (做大、显眼) -->
    <g filter="url(#strong_shadow)">
        <!-- 呼吸外环 -->
        <circle cx="50" cy="55" r="42" fill="white" stroke="#10B981" stroke-width="2">
            <animate attributeName="stroke-width" values="1;4;1" dur="2s" repeatCount="indefinite" />
            <animate attributeName="stroke-opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite" />
        </circle>
        <!-- 宝石底色 -->
        <circle cx="50" cy="55" r="35" fill="url(#gem_green)" />
        <!-- 顶部高光 -->
        <path d="M30 45 Q50 30 70 45" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.3" />
        
        <!-- PPM 数值 (极大化处理) -->
        <text x="50" y="62" font-family="Arial Black" font-size="28" fill="white" text-anchor="middle">35</text>
        <text x="50" y="78" font-family="Arial" font-size="10" fill="white" text-anchor="middle" opacity="0.8">ppm</text>
    </g>

    <!-- 3. 悬挂式位置名称 (窄条设计，减少遮挡) -->
    <rect x="10" y="100" width="80" height="20" rx="10" fill="rgba(30, 41, 59, 0.9)" />
    <text x="50" y="114" font-family="Arial-Bold" font-size="11" fill="white" text-anchor="middle">车库 B1-01</text>
</svg>