<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景层：网格铺满，显得系统很专业 -->
    <rect width="1600" height="900" fill="#0B1120" />
    <defs>
        <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(14, 165, 233, 0.07)" stroke-width="1"/>
        </pattern>
    </defs>
    <rect width="1600" height="900" fill="url(#grid)" />

    <!-- 1. 顶部：大标题 (一眼看到重点) -->
    <g transform="translate(50, 40)">
        <text x="0" y="20" fill="#0EA5E9" font-family="Microsoft YaHei" font-size="32" font-weight="bold">燃气安全运行实时监测中心</text>
        <path d="M 0 45 L 1500 45" stroke="#0EA5E9" stroke-width="2" opacity="0.4" />
        <!-- 动态呼吸灯：证明系统在线 -->
        <circle cx="1450" cy="15" r="6" fill="#10B981">
            <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
        </circle>
        <text x="1470" y="20" fill="#10B981" font-size="14">系统运行正常</text>
    </g>

    <!-- 2. 中央区：巨型全息图标 (填补空间，显得高级) -->
    <g transform="translate(800, 400)">
        <!-- 一个装饰性的全息圆环 -->
        <circle r="220" fill="none" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="10 10" opacity="0.2">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
        </circle>
        <!-- 中央燃气罐图标模拟 -->
        <rect x="-60" y="-80" width="120" height="160" rx="20" fill="rgba(14, 165, 233, 0.1)" stroke="#0EA5E9" stroke-width="3" />
        <text y="120" fill="#BAE6FD" font-size="20" font-weight="bold" text-anchor="middle">核心供气枢纽</text>
    </g>

    <!-- 3. 四个超大数据卡片 (业主最喜欢看大数字) -->
    
    <!-- 卡片 1: 压力 -->
    <g transform="translate(100, 150)">
        <rect width="320" height="200" rx="15" fill="rgba(30, 41, 59, 0.8)" stroke="#0EA5E9" stroke-width="2" />
        <text x="30" y="50" fill="#BAE6FD" font-size="22">总管道压力</text>
        <text x="30" y="130" fill="#0EA5E9" font-size="60" font-weight="bold">0.15</text>
        <text x="170" y="130" fill="#475569" font-size="24">MPa</text>
        <text x="30" y="170" fill="#10B981" font-size="16">● 压力状态：稳定</text>
    </g>

    <!-- 卡片 2: 流量 -->
    <g transform="translate(100, 450)">
        <rect width="320" height="200" rx="15" fill="rgba(30, 41, 59, 0.8)" stroke="#0EA5E9" stroke-width="2" />
        <text x="30" y="50" fill="#BAE6FD" font-size="22">瞬时流量</text>
        <text x="30" y="130" fill="#0EA5E9" font-size="60" font-weight="bold">425</text>
        <text x="160" y="130" fill="#475569" font-size="24">m³/h</text>
        <text x="30" y="170" fill="#10B981" font-size="16">● 流量状态：正常</text>
    </g>

    <!-- 卡片 3: 检测点 -->
    <g transform="translate(1180, 150)">
        <rect width="320" height="200" rx="15" fill="rgba(30, 41, 59, 0.8)" stroke="#0EA5E9" stroke-width="2" />
        <text x="30" y="50" fill="#BAE6FD" font-size="22">监测点位</text>
        <text x="30" y="130" fill="#10B981" font-size="60" font-weight="bold">12 / 12</text>
        <text x="30" y="170" fill="#10B981" font-size="16">● 全部点位在线</text>
    </g>

    <!-- 卡片 4: 泄漏告警 -->
    <g transform="translate(1180, 450)">
        <rect width="320" height="200" rx="15" fill="rgba(30, 41, 59, 0.8)" stroke="#0EA5E9" stroke-width="2" />
        <text x="30" y="50" fill="#BAE6FD" font-size="22">泄漏报警</text>
        <text x="30" y="130" fill="#10B981" font-size="60" font-weight="bold">无</text>
        <text x="30" y="170" fill="#10B981" font-size="16">● 监测环境安全</text>
    </g>

    <!-- 4. 底部：装饰性数据带 (解决底部太空，增加饱满感) -->
    <g transform="translate(50, 750)">
        <rect width="1500" height="100" rx="10" fill="rgba(14, 165, 233, 0.05)" stroke="rgba(14, 165, 233, 0.2)" />
        <g transform="translate(50, 60)">
            <text fill="#475569" font-size="18">今日总用气量：<tspan fill="#BAE6FD" font-weight="bold">1,245.8 m³</tspan></text>
            <text x="400" fill="#475569" font-size="18">本月总用气量：<tspan fill="#BAE6FD" font-weight="bold">42,850.4 m³</tspan></text>
            <text x="800" fill="#475569" font-size="18">安全运行天数：<tspan fill="#10B981" font-weight="bold">1,365 天</tspan></text>
            <text x="1200" fill="#475569" font-size="18">维护人员：<tspan fill="#BAE6FD">系统自动监测</tspan></text>
        </g>
    </g>

    <!-- 5. 装饰线条 (让页面看起来更“忙碌”、更专业) -->
    <path d="M 420 250 L 580 400 M 1180 250 L 1020 400" stroke="#0EA5E9" stroke-width="1" opacity="0.2" />
    <path d="M 420 550 L 580 400 M 1180 550 L 1020 400" stroke="#0EA5E9" stroke-width="1" opacity="0.2" />
</svg>